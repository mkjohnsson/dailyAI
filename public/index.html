<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyAI — En ny app varje dag</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    header p {
      color: #555;
      margin-top: 0.5rem;
      font-size: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover {
      border-color: #333;
      transform: translateY(-3px);
    }
    .emoji { font-size: 2.2rem; margin-bottom: 0.8rem; }
    .date { font-size: 0.7rem; color: #444; margin-bottom: 0.3rem; letter-spacing: 0.05em; }
    .name { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .desc { font-size: 0.82rem; color: #666; line-height: 1.45; }
    .empty { text-align: center; color: #333; padding: 6rem 0; font-size: 1.1rem; }
  </style>
</head>
<body>
  <header>
    <h1>✦ DailyAI</h1>
    <p>En ny AI-byggd app varje dag</p>
  </header>
  <div class="grid">
    
    <a href="/apps/2026-02-22/" class="card">
      <div class="emoji">🌙</div>
      <div class="date">2026-02-22</div>
      <div class="name">Söndagens Drömmaskin</div>
      <div class="desc">En generativ drömlandskapsmaskin för söndagen 22 februari 2026 — klicka för att skapa surrealistiska landskap som pulserar med ambient ljud</div>
    </a>
  </div>
</body>
</html>
