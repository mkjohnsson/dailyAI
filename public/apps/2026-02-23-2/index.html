<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turncoat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #88aacc;
    user-select: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    pointer-events: none;
  }
  #ui h1 {
    font-size: 18px;
    color: #5588bb;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #stats {
    font-size: 12px;
    line-height: 1.8;
    opacity: 0.8;
  }
  #stats span { font-weight: bold; }
  .stat-keepers { color: #44ddaa; }
  .stat-anomalies { color: #dd4466; }
  .stat-corrupted { color: #cc8822; }
  .stat-health { color: #5588bb; }
  #instructions {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.5;
    z-index: 10;
    line-height: 1.6;
  }
  #selected-info {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 10;
    font-size: 12px;
    background: rgba(10,10,20,0.85);
    border: 1px solid #334;
    padding: 12px 16px;
    border-radius: 4px;
    display: none;
    min-width: 180px;
  }
  #selected-info h3 { margin-bottom: 6px; font-size: 13px; }
  .corruption-bar {
    width: 100%;
    height: 8px;
    background: #1a1a2a;
    border-radius: 4px;
    margin: 6px 0;
    overflow: hidden;
  }
  .corruption-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.2s;
  }
  #sacrifice-btn {
    margin-top: 8px;
    padding: 6px 14px;
    background: #661122;
    color: #ff6677;
    border: 1px solid #882233;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    pointer-events: all;
  }
  #sacrifice-btn:hover { background: #882233; }
  #game-over {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    display: none;
  }
  #game-over h2 { font-size: 28px; color: #dd4466; margin-bottom: 10px; }
  #game-over p { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
  #restart-btn {
    padding: 8px 24px;
    background: #224;
    color: #88aacc;
    border: 1px solid #446;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  #restart-btn:hover { background: #336; }
</style>
</head>
<body>
<div id="ui">
  <h1>Turncoat</h1>
  <div id="stats">
    Keepers: <span class="stat-keepers" id="s-keepers">0</span><br>
    Anomalies: <span class="stat-anomalies" id="s-anomalies">0</span><br>
    Turned: <span class="stat-corrupted" id="s-corrupted">0</span><br>
    System Health: <span class="stat-health" id="s-health">100%</span><br>
    Time: <span id="s-time">0:00</span>
  </div>
</div>
<div id="selected-info">
  <h3 id="sel-title">Keeper</h3>
  <div>Corruption:</div>
  <div class="corruption-bar"><div class="corruption-fill" id="sel-corruption"></div></div>
  <div id="sel-status" style="font-size:11px;"></div>
  <div id="sel-kills" style="font-size:11px; margin-top:4px;"></div>
  <button id="sacrifice-btn">⚡ Sacrifice</button>
</div>
<div id="instructions">
  Click a keeper to inspect · Sacrifice the corrupted before they turn<br>
  Turned keepers spawn anomalies and attack others · Keep the ecosystem alive
</div>
<div id="game-over">
  <h2>System Collapsed</h2>
  <p id="go-text">All keepers have fallen.</p>
  <button id="restart-btn" onclick="restartGame()">Restart</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let keepers = [];
let anomalies = [];
let residues = [];
let explosions = [];
let selected = null;
let gameOver = false;
let startTime = Date.now();
let systemHealth = 100;

const KEEPER_COUNT = 8;
const INITIAL_ANOMALIES = 12;
const ANOMALY_SPAWN_RATE = 0.012;
const CORRUPTION_PER_CONSUME = 0.08;
const TURN_THRESHOLD = 1.0;
const KEEPER_SPEED = 1.2;
const ANOMALY_SPEED = 0.4;
const KEEPER_RADIUS = 14;
const ANOMALY_RADIUS = 6;
const CONSUME_DIST = 22;
const ATTACK_DIST = 28;
const DETECTION_RANGE = 160;

class Keeper {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.corruption = 0;
    this.turned = false;
    this.hp = 100;
    this.kills = 0;
    this.patrolAngle = Math.random() * Math.PI * 2;
    this.patrolTimer = 0;
    this.target = null;
    this.attackCooldown = 0;
    this.spawnCooldown = 0;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.id = Math.random().toString(36).substr(2, 5).toUpperCase();
    this.flashTimer = 0;
  }

  getColor() {
    if (this.turned) {
      return `hsl(${15 + Math.sin(Date.now()*0.005)*10}, 85%, ${45 + Math.sin(this.pulsePhase)*10}%)`;
    }
    const g = Math.floor(200 * (1 - this.corruption));
    const r = Math.floor(60 + 180 * this.corruption);
    const b = Math.floor(160 * (1 - this.corruption * 0.7));
    return `rgb(${r},${g},${b})`;
  }

  getGlowColor() {
    if (this.turned) return `rgba(220, 80, 30, 0.3)`;
    const alpha = 0.15 + this.corruption * 0.15;
    return `rgba(${60 + 160*this.corruption}, ${200*(1-this.corruption)}, ${160*(1-this.corruption)}, ${alpha})`;
  }

  update() {
    this.pulsePhase += 0.05;
    if (this.flashTimer > 0) this.flashTimer--;

    if (this.turned) {
      this.updateTurned();
    } else {
      this.updateNormal();
    }

    // Boundary
    const margin = 30;
    if (this.x < margin) this.vx += 0.15;
    if (this.x > W - margin) this.vx -= 0.15;
    if (this.y < margin) this.vy += 0.15;
    if (this.y > H - margin) this.vy -= 0.15;

    let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    let maxSpeed = this.turned ? KEEPER_SPEED * 0.9 : KEEPER_SPEED;
    if (speed > maxSpeed) {
      this.vx = (this.vx/speed) * maxSpeed;
      this.vy = (this.vy/speed) * maxSpeed;
    }

    this.x += this.vx;
    this.y += this.vy;
  }

  updateNormal() {
    // Find nearest anomaly
    let nearest = null;
    let nearDist = DETECTION_RANGE;
    for (let a of anomalies) {
      let d = dist(this, a);
      if (d < nearDist) { nearDist = d; nearest = a; }
    }

    if (nearest && nearDist < CONSUME_DIST) {
      // Consume
      anomalies.splice(anomalies.indexOf(nearest), 1);
      this.kills++;
      this.corruption = Math.min(1, this.corruption + CORRUPTION_PER_CONSUME);
      this.flashTimer = 8;

      // Leave residue
      residues.push({
        x: nearest.x, y: nearest.y,
        life: 120, maxLife: 120,
        color: nearest.color
      });

      // Check turn
      if (this.corruption >= TURN_THRESHOLD) {
        this.turned = true;
        this.spawnCooldown = 60;
        explosions.push({ x: this.x, y: this.y, r: 0, maxR: 60, life: 30, color: '#cc4400' });
      }
    } else if (nearest) {
      // Move toward anomaly
      let dx = nearest.x - this.x;
      let dy = nearest.y - this.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      this.vx += (dx/d) * 0.08;
      this.vy += (dy/d) * 0.08;
    } else {
      // Patrol
      this.patrolTimer++;
      if (this.patrolTimer > 120) {
        this.patrolAngle += (Math.random() - 0.5) * 1.5;
        this.patrolTimer = 0;
      }
      this.vx += Math.cos(this.patrolAngle) * 0.03;
      this.vy += Math.sin(this.patrolAngle) * 0.03;
    }

    // Avoid other keepers slightly
    for (let k of keepers) {
      if (k === this) continue;
      let d = dist(this, k);
      if (d < 50 && d > 0) {
        this.vx -= (k.x - this.x) / d * 0.04;
        this.vy -= (k.y - this.y) / d * 0.04;
      }
    }
  }

  updateTurned() {
    this.attackCooldown = Math.max(0, this.attackCooldown - 1);
    this.spawnCooldown = Math.max(0, this.spawnCooldown - 1);

    // Spawn anomalies
    if (this.spawnCooldown <= 0 && anomalies.length < 80) {
      let angle = Math.random() * Math.PI * 2;
      anomalies.push(new Anomaly(
        this.x + Math.cos(angle) * 20,
        this.y + Math.sin(angle) * 20
      ));
      this.spawnCooldown = 90 + Math.random() * 60;
    }

    // Find nearest healthy keeper to attack
    let nearest = null;
    let nearDist = DETECTION_RANGE * 1.2;
    for (let k of keepers) {
      if (k === this || k.turned) continue;
      let d = dist(this, k);
      if (d < nearDist) { nearDist = d; nearest = k; }
    }

    if (nearest) {
      let dx = nearest.x - this.x;
      let dy = nearest.y - this.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      this.vx += (dx/d) * 0.06;
      this.vy += (dy/d) * 0.06;

      if (d < ATTACK_DIST && this.attackCooldown <= 0) {
        nearest.hp -= 12;
        nearest.corruption = Math.min(1, nearest.corruption + 0.03);
        nearest.flashTimer = 10;
        this.attackCooldown = 30;
        explosions.push({ x: (this.x+nearest.x)/2, y: (this.y+nearest.y)/2, r: 0, maxR: 15, life: 12, color: '#dd4444' });
      }
    } else {
      // Wander menacingly
      this.patrolTimer++;
      if (this.patrolTimer > 80) {
        this.patrolAngle += (Math.random() - 0.5) * 2;
        this.patrolTimer = 0;
      }
      this.vx += Math.cos(this.patrolAngle) * 0.03;
      this.vy += Math.sin(this.patrolAngle) * 0.03;
    }
  }

  draw() {
    ctx.save();
    let pulse = 1 + Math.sin(this.pulsePhase) * 0.1;
    let r = KEEPER_RADIUS * pulse;

    // Glow
    let grad = ctx.createRadialGradient(this.x, this.y, r*0.5, this.x, this.y, r*3);
    grad.addColorStop(0, this.getGlowColor());
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*3, 0, Math.PI*2);
    ctx.fill();

    // Body - hexagonal shape
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      let angle = (Math.PI / 3) * i - Math.PI/6;
      let wobble = this.turned ? Math.sin(Date.now()*0.01 + i) * 2 : 0;
      let px = this.x + Math.cos(angle) * (r + wobble);
      let py = this.y + Math.sin(angle) * (r + wobble);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = this.flashTimer > 0 ? '#ffffff' : this.getColor();
    ctx.fill();
    ctx.strokeStyle = this.turned ? '#ff4422' : `rgba(100,220,180,${0.6 - this.corruption*0.4})`;
    ctx.lineWidth = this.turned ? 2 : 1.5;
    ctx.stroke();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*0.3, 0, Math.PI*2);
    ctx.fillStyle = this.turned ? '#ff6633' : `rgba(200,255,230,${0.7 - this.corruption*0.5})`;
    ctx.fill();

    // Health bar if damaged
    if (this.hp < 100) {
      let bw = 24;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(this.x - bw/2, this.y - r - 10, bw, 3);
      ctx.fillStyle = this.hp > 50 ? '#44dd88' : this.hp > 25 ? '#ddaa44' : '#dd4444';
      ctx.fillRect(this.x - bw/2, this.y - r - 10, bw * (this.hp/100), 3);
    }

    // Corruption indicator ring
    if (this.corruption > 0 && !this.turned) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 4, -Math.PI/2, -Math.PI/2 + Math.PI*2*this.corruption);
      ctx.strokeStyle = `rgba(220, 120, 30, ${0.4 + this.corruption*0.5})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Selection ring
    if (selected === this) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 8, 0, Math.PI*2);
      ctx.strokeStyle = '#88ccff';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

class Anomaly {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    let angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * ANOMALY_SPEED;
    this.vy = Math.sin(angle) * ANOMALY_SPEED;
    this.driftTimer = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.color = `hsl(${330 + Math.random()*40}, 70%, 55%)`;
    this.size = ANOMALY_RADIUS * (0.7 + Math.random()*0.6);
  }

  update() {
    this.phase += 0.04;
    this.driftTimer++;
    if (this.driftTimer > 60 + Math.random()*80) {
      let angle = Math.random() * Math.PI * 2;
      this.vx = Math.cos(angle) * ANOMALY_SPEED * (0.5 + Math.random());
      this.vy = Math.sin(angle) * ANOMALY_SPEED * (0.5 + Math.random());
      this.driftTimer = 0;
    }

    // Slight drift wobble
    this.vx += (Math.random()-0.5) * 0.02;
    this.vy += (Math.random()-0.5) * 0.02;

    // Boundary bounce
    if (this.x < 5 || this.x > W-5) this.vx *= -1;
    if (this.y < 5 || this.y > H-5) this.vy *= -1;

    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    let s = this.size * (1 + Math.sin(this.phase)*0.2);

    // Glow
    let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s*3);
    grad.addColorStop(0, 'rgba(220,50,80,0.15)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s*3, 0, Math.PI*2);
    ctx.fill();

    // Body - irregular shape
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      let angle = (Math.PI * 2 / 5) * i + this.phase * 0.5;
      let wobble = Math.sin(this.phase + i * 1.3) * 2;
      let px = this.x + Math.cos(angle) * (s + wobble);
      let py = this.y + Math.sin(angle) * (s + wobble);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = this.color;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function dist(a, b) {
  let dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

function initGame() {
  keepers = [];
  anomalies = [];
  residues = [];
  explosions = [];
  selected = null;
  gameOver = false;
  systemHealth = 100;
  startTime = Date.now();

  for (let i = 0; i < KEEPER_COUNT; i++) {
    keepers.push(new Keeper(
      100 + Math.random() * (W - 200),
      100 + Math.random() * (H - 200)
    ));
  }
  for (let i = 0; i < INITIAL_ANOMALIES; i++) {
    anomalies.push(new Anomaly(
      Math.random() * W,
      Math.random() * H
    ));
  }

  document.getElementById('game-over').style.display = 'none';
}

function sacrificeKeeper(keeper) {
  if (!keeper || keeper.turned) return;
  let idx = keepers.indexOf(keeper);
  if (idx < 0) return;

  explosions.push({
    x: keeper.x, y: keeper.y,
    r: 0, maxR: 50, life: 25,
    color: '#4488cc'
  });

  // Sacrifice purges nearby anomalies
  for (let i = anomalies.length - 1; i >= 0; i--) {
    if (dist(keeper, anomalies[i]) < 80) {
      residues.push({ x: anomalies[i].x, y: anomalies[i].y, life: 60, maxLife: 60, color: '#4488cc' });
      anomalies.splice(i, 1);
    }
  }

  keepers.splice(idx, 1);
  if (selected === keeper) {
    selected = null;
    document.getElementById('selected-info').style.display = 'none';
  }
}

// Click to select keepers
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  let mx = e.clientX, my = e.clientY;
  let found = null;
  for (let k of keepers) {
    if (dist({x:mx,y:my}, k) < KEEPER_RADIUS + 10) {
      found = k;
      break;
    }
  }
  selected = found;
  document.getElementById('selected-info').style.display = found ? 'block' : 'none';
});

document.getElementById('sacrifice-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (selected && !selected.turned) {
    sacrificeKeeper(selected);
  }
});

function updateUI() {
  let healthy = keepers.filter(k => !k.turned).length;
  let turned = keepers.filter(k => k.turned).length;

  document.getElementById('s-keepers').textContent = healthy;
  document.getElementById('s-anomalies').textContent = anomalies.length;
  document.getElementById('s-corrupted').textContent = turned;

  // System health based on ratio + anomaly count
  let targetHealth = Math.max(0, (healthy / (healthy + turned + 1)) * 100 - anomalies.length * 0.5);
  systemHealth += (targetHealth - systemHealth) * 0.02;
  document.getElementById('s-health').textContent = Math.round(systemHealth) + '%';
  document.getElementById('s-health').style.color =
    systemHealth > 60 ? '#44ddaa' : systemHealth > 30 ? '#ddaa44' : '#dd4466';

  let elapsed = Math.floor((Date.now() - startTime) / 1000);
  let min = Math.floor(elapsed / 60);
  let sec = String(elapsed % 60).padStart(2, '0');
  document.getElementById('s-time').textContent = `${min}:${sec}`;

  // Selected info
  if (selected && keepers.includes(selected)) {
    let si = document.getElementById('selected-info');
    si.style.display = 'block';
    document.getElementById('sel-title').textContent = selected.turned ? `⚠ TURNED [${selected.id}]` : `Keeper [${selected.id}]`;
    document.getElementById('sel-title').style.color = selected.turned ? '#dd4422' : '#44ddaa';

    let cf = document.getElementById('sel-corruption');
    cf.style.width = (selected.corruption * 100) + '%';
    let corrPct = selected.corruption;
    cf.style.background = corrPct < 0.3 ? '#44aa66' : corrPct < 0.6 ? '#aaaa44' : corrPct < 0.9 ? '#cc6622' : '#dd3333';

    let statusText = selected.turned ? 'HOSTILE — spawning anomalies' :
      selected.corruption > 0.8 ? '⚠ CRITICAL — near turning point' :
      selected.corruption > 0.5 ? 'Compromised — behavior erratic' :
      selected.corruption > 0.2 ? 'Tainted — still functional' : 'Clean — operating normally';
    document.getElementById('sel-status').textContent = statusText;
    document.getElementById('sel-status').style.color = selected.corruption > 0.8 ? '#dd4444' : '#88aacc';
    document.getElementById('sel-kills').textContent = `Consumed: ${selected.kills} | HP: ${Math.round(selected.hp)}`;

    let btn = document.getElementById('sacrifice-btn');
    btn.style.display = selected.turned ? 'none' : 'block';
    btn.textContent = selected.corruption > 0.5 ? '⚡ Sacrifice (purge area)' : '⚡ Sacrifice';
  } else if (selected && !keepers.includes(selected)) {
    selected = null;
    document.getElementById('selected-info').style.display = 'none';
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(30,40,60,0.3)';
  ctx.lineWidth = 0.5;
  let spacing = 40;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function loop() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  drawGrid();

  // Spawn anomalies
  if (!gameOver && Math.random() < ANOMALY_SPAWN_RATE && anomalies.length < 80) {
    // Spawn from edges
    let edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = 0; y = Math.random() * H; }
    else if (edge === 1) { x = W; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = 0; }
    else { x = Math.random() * W; y = H; }
    anomalies.push(new Anomaly(x, y));
  }

  // Update residues
  for (let i = residues.length - 1; i >= 0; i--) {
    residues[i].life--;
    if (residues[i].life <= 0) residues.splice(i, 1);
  }

  // Draw residues
  for (let r of residues) {
    let alpha = (r.life / r.maxLife) * 0.3;
    ctx.fillStyle = r.color || 'rgba(180,60,80,0.2)';
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 8 + (1 - r.life/r.maxLife) * 12, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Update & draw anomalies
  for (let a of anomalies) {
    a.update();
    a.draw();
  }

  // Update & draw keepers
  for (let i = keepers.length - 1; i >= 0; i--) {
    let k = keepers[i];
    k.update();
    if (k.hp <= 0) {
      explosions.push({ x: k.x, y: k.y, r: 0, maxR: 40, life: 20, color: k.turned ? '#cc4400' : '#44aacc' });
      // Dying turned keeper leaves anomalies
      if (k.turned) {
        for (let j = 0; j < 3; j++) {
          anomalies.push(new Anomaly(k.x + (Math.random()-0.5)*30, k.y + (Math.random()-0.5)*30));
        }
      }
      if (selected === k) {
        selected = null;
        document.getElementById('selected-info').style.display = 'none';
      }
      keepers.splice(i, 1);
      continue;
    }
    k.draw();
  }

  // Draw connections between keepers (faint network)
  ctx.strokeStyle = 'rgba(60,120,140,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < keepers.length; i++) {
    for (let j = i+1; j < keepers.length; j++) {
      let d = dist(keepers[i], keepers[j]);
      if (d < 200 && !keepers[i].turned && !keepers[j].turned) {
        ctx.beginPath();
        ctx.moveTo(keepers[i].x, keepers[i].y);
        ctx.lineTo(keepers[j].x, keepers[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw attack lines from turned keepers
  for (let k of keepers) {
    if (k.turned) {
      for (let k2 of keepers) {
        if (!k2.turned && dist(k, k2) < DETECTION_RANGE) {
          ctx.strokeStyle = `rgba(220,60,30,${0.1 + Math.sin(Date.now()*0.01)*0.05})`;
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 8]);
          ctx.beginPath();
          ctx.moveTo(k.x, k.y);
          ctx.lineTo(k2.x, k2.y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    }
  }

  // Update & draw explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    let e = explosions[i];
    e.r += (e.maxR - e.r) * 0.2;
    e.life--;
    let alpha = e.life / 30;
    ctx.strokeStyle = e.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  updateUI();

  // Check game over
  let healthyKeepers = keepers.filter(k => !k.turned).length;
  if (healthyKeepers === 0 && !gameOver) {
    gameOver = true;
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let min = Math.floor(elapsed / 60);
    let sec = String(elapsed % 60).padStart(2, '0');
    let turnedLeft = keepers.filter(k => k.turned).length;
    document.getElementById('go-text').textContent =
      turnedLeft > 0
        ? `All keepers have been corrupted or destroyed. ${turnedLeft} turned remain. Survived ${min}:${sec}.`
        : `The system has collapsed. No keepers remain. Survived ${min}:${sec}.`;
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('selected-info').style.display = 'none';
  }

  requestAnimationFrame(loop);
}

function restartGame() {
  initGame();
}

initGame();
loop();
</script>
