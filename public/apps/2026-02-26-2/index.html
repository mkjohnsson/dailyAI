<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barograph - Symptom Weather Journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
  color: #333;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  color: white;
  text-align: center;
  margin-bottom: 30px;
  font-size: 2.5em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
}

.location-setup {
  text-align: center;
}

.location-setup input {
  padding: 12px 20px;
  font-size: 16px;
  border: 2px solid #ddd;
  border-radius: 8px;
  width: 300px;
  margin-right: 10px;
}

.btn {
  padding: 12px 24px;
  font-size: 16px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s;
}

.btn:hover {
  background: #5568d3;
}

.btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.symptom-logger {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.symptom-input {
  display: flex;
  flex-direction: column;
}

.symptom-input label {
  font-weight: 600;
  margin-bottom: 8px;
  color: #555;
}

.slider-container {
  display: flex;
  align-items: center;
  gap: 10px;
}

input[type="range"] {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: #ddd;
  outline: none;
}

.slider-value {
  font-weight: bold;
  color: #667eea;
  width: 30px;
  text-align: center;
}

.log-entry {
  background: #f8f9fa;
  padding: 12px;
  border-radius: 6px;
  margin: 10px 0;
  border-left: 4px solid #667eea;
}

.log-date {
  font-weight: bold;
  color: #764ba2;
}

.weather-data {
  font-size: 0.9em;
  color: #666;
  margin-top: 5px;
}

.correlation-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.chart-container {
  background: white;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #eee;
}

.insight {
  background: #fff3cd;
  border-left: 4px solid #ffc107;
  padding: 15px;
  border-radius: 6px;
  margin: 10px 0;
}

.insight strong {
  color: #856404;
}

.forecast-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 8px;
  margin: 10px 0;
}

.risk-high {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

.risk-medium {
  background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
  color: #333;
}

.risk-low {
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  color: #333;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #667eea;
  font-size: 1.2em;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #667eea;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.hidden {
  display: none;
}

.error {
  background: #f8d7da;
  color: #721c24;
  padding: 15px;
  border-radius: 8px;
  border-left: 4px solid #f5c6cb;
}

h2 {
  color: #667eea;
  margin-bottom: 15px;
  border-bottom: 2px solid #eee;
  padding-bottom: 10px;
}

.stats {
  display: flex;
  gap: 20px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.stat-box {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 6px;
  flex: 1;
  min-width: 150px;
  text-align: center;
}

.stat-value {
  font-size: 2em;
  font-weight: bold;
  color: #667eea;
}

.stat-label {
  color: #666;
  margin-top: 5px;
}
</style>
</head>
<body>
<div class="container">
  <h1>⛅ Barograph</h1>
  
  <div class="card location-setup" id="locationCard">
    <h2>Set Your Location</h2>
    <input type="text" id="cityInput" placeholder="Enter your city name">
    <button class="btn" onclick="setLocation()">Set Location</button>
    <div id="locationError" class="error hidden"></div>
    <div id="locationLoading" class="hidden">
      <div class="spinner"></div>
      <p>Searching for location...</p>
    </div>
  </div>

  <div id="mainApp" class="hidden">
    <div class="card">
      <h2>Log Today's Symptoms</h2>
      <p style="color: #666; margin-bottom: 15px;">Rate your symptoms on a scale of 1-5 (1 = minimal, 5 = severe)</p>
      <div class="symptom-logger">
        <div class="symptom-input">
          <label>Pain Level</label>
          <div class="slider-container">
            <input type="range" min="1" max="5" value="3" id="painSlider" oninput="updateSliderValue('pain', this.value)">
            <span class="slider-value" id="painValue">3</span>
          </div>
        </div>
        <div class="symptom-input">
          <label>Fatigue</label>
          <div class="slider-container">
            <input type="range" min="1" max="5" value="3" id="fatigueSlider" oninput="updateSliderValue('fatigue', this.value)">
            <span class="slider-value" id="fatigueValue">3</span>
          </div>
        </div>
        <div class="symptom-input">
          <label>Brain Fog</label>
          <div class="slider-container">
            <input type="range" min="1" max="5" value="3" id="brainFogSlider" oninput="updateSliderValue('brainFog', this.value)">
            <span class="slider-value" id="brainFogValue">3</span>
          </div>
        </div>
        <div class="symptom-input">
          <label>Mood</label>
          <div class="slider-container">
            <input type="range" min="1" max="5" value="3" id="moodSlider" oninput="updateSliderValue('mood', this.value)">
            <span class="slider-value" id="moodValue">3</span>
          </div>
        </div>
      </div>
      <button class="btn" onclick="logSymptoms()" style="margin-top: 20px;">Log Entry</button>
      <div id="logLoading" class="hidden">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
      </div>
      <div id="logError" class="error hidden"></div>
    </div>

    <div class="card">
      <h2>Your Journal Entries</h2>
      <div id="logEntries"></div>
    </div>

    <div class="card" id="analysisCard" class="hidden">
      <h2>Pattern Analysis</h2>
      <div class="stats" id="statsContainer"></div>
      <div id="insights"></div>
      <div class="correlation-grid" id="correlationCharts"></div>
    </div>

    <div class="card" id="forecastCard" class="hidden">
      <h2>3-Day Risk Forecast</h2>
      <div id="forecastContainer"></div>
      <div id="forecastLoading" class="hidden">
        <div class="spinner"></div>
        <p>Generating personalized forecast...</p>
      </div>
    </div>
  </div>
</div>

<script>
let locationData = null;
let journalEntries = [];

// Load data from localStorage
function loadData() {
  const stored = localStorage.getItem('barographData');
  if (stored) {
    const data = JSON.parse(stored);
    locationData = data.location;
    journalEntries = data.entries || [];
    
    if (locationData) {
      document.getElementById('locationCard').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      displayEntries();
      if (journalEntries.length >= 3) {
        analyzePatterns();
        generateForecast();
      }
    }
  }
}

function saveData() {
  localStorage.setItem('barographData', JSON.stringify({
    location: locationData,
    entries: journalEntries
  }));
}

async function setLocation() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;
  
  document.getElementById('locationLoading').classList.remove('hidden');
  document.getElementById('locationError').classList.add('hidden');
  
  try {
    const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const data = await response.json();
    
    if (!data.results || data.results.length === 0) {
      throw new Error('City not found. Please try again.');
    }
    
    locationData = {
      name: data.results[0].name,
      country: data.results[0].country,
      latitude: data.results[0].latitude,
      longitude: data.results[0].longitude
    };
    
    saveData();
    document.getElementById('locationCard').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    
  } catch (error) {
    document.getElementById('locationError').textContent = error.message;
    document.getElementById('locationError').classList.remove('hidden');
  } finally {
    document.getElementById('locationLoading').classList.add('hidden');
  }
}

function updateSliderValue(type, value) {
  document.getElementById(`${type}Value`).textContent = value;
}

async function logSymptoms() {
  const symptoms = {
    pain: parseInt(document.getElementById('painSlider').value),
    fatigue: parseInt(document.getElementById('fatigueSlider').value),
    brainFog: parseInt(document.getElementById('brainFogSlider').value),
    mood: parseInt(document.getElementById('moodSlider').value)
  };
  
  document.getElementById('logLoading').classList.remove('hidden');
  document.getElementById('logError').classList.add('hidden');
  
  try {
    const today = new Date().toISOString().split('T')[0];
    
    // Fetch weather data for today
    const response = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${locationData.latitude}&longitude=${locationData.longitude}&hourly=temperature_2m,relative_humidity_2m,pressure_msl,wind_speed_10m&timezone=auto&start_date=${today}&end_date=${today}`
    );
    const weatherData = await response.json();
    
    // Calculate daily averages and pressure change
    const temps = weatherData.hourly.temperature_2m;
    const humidity = weatherData.hourly.relative_humidity_2m;
    const pressure = weatherData.hourly.pressure_msl;
    const wind = weatherData.hourly.wind_speed_10m;
    
    const avgTemp = temps.reduce((a, b) => a + b, 0) / temps.length;
    const avgHumidity = humidity.reduce((a, b) => a + b, 0) / humidity.length;
    const avgPressure = pressure.reduce((a, b) => a + b, 0) / pressure.length;
    const avgWind = wind.reduce((a, b) => a + b, 0) / wind.length;
    
    // Calculate 6-hour pressure change
    const pressureChange6h = pressure.length >= 6 ? 
      pressure[pressure.length - 1] - pressure[pressure.length - 6] : 0;
    
    const entry = {
      date: today,
      symptoms,
      weather: {
        temperature: avgTemp.toFixed(1),
        humidity: avgHumidity.toFixed(0),
        pressure: avgPressure.toFixed(1),
        wind: avgWind.toFixed(1),
        pressureChange6h: pressureChange6h.toFixed(1)
      }
    };
    
    // Remove existing entry for today if any
    journalEntries = journalEntries.filter(e => e.date !== today);
    journalEntries.unshift(entry);
    
    saveData();
    displayEntries();
    
    if (journalEntries.length >= 3) {
      analyzePatterns();
      generateForecast();
    }
    
  } catch (error) {
    document.getElementById('logError').textContent = 'Failed to fetch weather data: ' + error.message;
    document.getElementById('logError').classList.remove('hidden');
  } finally {
    document.getElementById('logLoading').classList.add('hidden');
  }
}

function displayEntries() {
  const container = document.getElementById('logEntries');
  if (journalEntries.length === 0) {
    container.innerHTML = '<p style="color: #999;">No entries yet. Log your first symptoms above!</p>';
    return;
  }
  
  container.innerHTML = journalEntries.map(entry => `
    <div class="log-entry">
      <div class="log-date">${new Date(entry.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
      <div style="margin: 10px 0;">
        Pain: ${entry.symptoms.pain} | Fatigue: ${entry.symptoms.fatigue} | 
        Brain Fog: ${entry.symptoms.brainFog} | Mood: ${entry.symptoms.mood}
      </div>
      <div class="weather-data">
        🌡️ ${entry.weather.temperature}°C | 💧 ${entry.weather.humidity}% | 
        🌀 ${entry.weather.pressure} hPa (${entry.weather.pressureChange6h > 0 ? '+' : ''}${entry.weather.pressureChange6h} hPa/6h) | 
        💨 ${entry.weather.wind} km/h
      </div>
    </div>
  `).join('');
}

function analyzePatterns() {
  if (journalEntries.length < 3) return;
  
  document.getElementById('analysisCard').classList.remove('hidden');
  
  // Calculate correlations
  const correlations = {
    temperature: calculateCorrelations('temperature'),
    humidity: calculateCorrelations('humidity'),
    pressure: calculateCorrelations('pressure'),
    pressureChange: calculateCorrelations('pressureChange6h')
  };
  
  // Display stats
  const avgPain = (journalEntries.reduce((sum, e) => sum + e.symptoms.pain, 0) / journalEntries.length).toFixed(1);
  const avgFatigue = (journalEntries.reduce((sum, e) => sum + e.symptoms.fatigue, 0) / journalEntries.length).toFixed(1);
  
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-box">
      <div class="stat-value">${journalEntries.length}</div>
      <div class="stat-label">Total Entries</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${avgPain}</div>
      <div class="stat-label">Avg Pain</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${avgFatigue}</div>
      <div class="stat-label">Avg Fatigue</div>
    </div>
  `;
  
  // Generate insights
  generateInsights(correlations);
  
  // Create charts
  createCorrelationCharts(correlations);
}

function calculateCorrelations(weatherVar) {
  const symptoms = ['pain', 'fatigue', 'brainFog', 'mood'];
  const results = {};
  
  symptoms.forEach(symptom => {
    const x = journalEntries.map(e => parseFloat(e.weather[weatherVar]));
    const y = journalEntries.map(e => e.symptoms[symptom]);
    
    results[symptom] = {
      correlation: pearsonCorrelation(x, y),
      data: journalEntries.map(e => ({
        x: parseFloat(e.weather[weatherVar]),
        y: e.symptoms[symptom]
      }))
    };
  });
  
  return results;
}

function pearsonCorrelation(x, y) {
  const n = x.length;
  const sumX = x.reduce((a, b) => a + b, 0);
  const sumY = y.reduce((a, b) => a + b, 0);
  const sumXY = x.reduce((sum, xi, i) => sum + xi * y[i], 0);
  const sumX2 = x.reduce((sum, xi) => sum + xi * xi, 0);
  const sumY2 = y.reduce((sum, yi) => sum + yi * yi, 0);
  
  const numerator = n * sumXY - sumX * sumY;
  const denominator = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));
  
  return denominator === 0 ? 0 : numerator / denominator;
}

function generateInsights(correlations) {
  const insights = [];
  
  // Find strongest correlations
  Object.entries(correlations).forEach(([weather, symptoms]) => {
    Object.entries(symptoms).forEach(([symptom, data]) => {
      if (Math.abs(data.correlation) > 0.5) {
        const direction = data.correlation > 0 ? 'increases' : 'decreases';
        const weatherLabel = weather === 'pressureChange6h' ? 'pressure drops' : `${weather} ${direction}`;
        insights.push(`<strong>${symptom.charAt(0).toUpperCase() + symptom.slice(1)}</strong> ${direction} when ${weatherLabel} (correlation: ${(data.correlation * 100).toFixed(0)}%)`);
      }
    });
  });
  
  // Pressure change specific insight
  const pressureChangeData = journalEntries.map(e => ({
    change: parseFloat(e.weather.pressureChange6h),
    pain: e.symptoms.pain
  }));
  
  const severePainDays = pressureChangeData.filter(d => d.pain >= 4);
  if (severePainDays.length > 0) {
    const avgChangeOnBadDays = severePainDays.reduce((sum, d) => sum + d.change, 0) / severePainDays.length;
    if (avgChangeOnBadDays < -3) {
      insights.push(`<strong>Trigger Alert:</strong> Your pain tends to spike when pressure drops more than ${Math.abs(avgChangeOnBadDays).toFixed(1)} hPa in 6 hours`);
    }
  }
  
  const container = document.getElementById('insights');
  if (insights.length === 0) {
    container.innerHTML = '<p style="color: #999;">Keep logging to discover your personal weather triggers!</p>';
  } else {
    container.innerHTML = insights.map(insight => `<div class="insight">${insight}</div>`).join('');
  }
}

function createCorrelationCharts(correlations) {
  const container = document.getElementById('correlationCharts');
  container.innerHTML = '';
  
  const weatherLabels = {
    temperature: 'Temperature (°C)',
    humidity: 'Humidity (%)',
    pressure: 'Pressure (hPa)',
    pressureChange: 'Pressure Change (6h)'
  };
  
  Object.entries(correlations).forEach(([weather, symptoms]) => {
    const strongestSymptom = Object.entries(symptoms)
      .reduce((max, [s, d]) => Math.abs(d.correlation) > Math.abs(max.correlation) ? { name: s, ...d } : max, 
              { correlation: 0, name: '', data: [] });
    
    if (Math.abs(strongestSymptom.correlation) > 0.3) {
      const chartDiv = document.createElement('div');
      chartDiv.className = 'chart-container';
      chartDiv.innerHTML = `<canvas id="chart-${weather}"></canvas>`;
      container.appendChild(chartDiv);
      
      const ctx = document.getElementById(`chart-${weather}`).getContext('2d');
      new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            label: `${strongestSymptom.name} vs ${weatherLabels[weather]}`,
            data: strongestSymptom.data,
            backgroundColor: 'rgba(102, 126, 234, 0.5)',
            borderColor: 'rgba(102, 126, 234, 1)',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: `${weatherLabels[weather]} Impact (r=${strongestSymptom.correlation.toFixed(2)})`
            }
          },
          scales: {
            x: { title: { display: true, text: weatherLabels[weather] } },
            y: { title: { display: true, text: 'Severity (1-5)' }, min: 1, max: 5 }
          }
        }
      });
    }
  });
}

async function generateForecast() {
  if (journalEntries.length < 3) return;
  
  document.getElementById('forecastCard').classList.remove('hidden');
  document.getElementById('forecastLoading').classList.remove('hidden');
  
  try {
    const today = new Date();
    const endDate = new Date(today);
    endDate.setDate(today.getDate() + 3);
    
    const response = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${locationData.latitude}&longitude=${locationData.longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&hourly=pressure_msl&timezone=auto&forecast_days=4`
    );
    const forecast = await response.json();
    
    const forecastDays = [];
    for (let i = 1; i <= 3; i++) {
      const date = new Date(today);
      date.setDate(today.getDate() + i);
      
      // Get pressure data for that day
      const dayStart = i * 24;
      const dayPressures = forecast.hourly.pressure_msl.slice(dayStart, dayStart + 24);
      const avgPressure = dayPressures.reduce((a, b) => a + b, 0) / dayPressures.length;
      const pressureChange = dayPressures.length >= 6 ? 
        dayPressures[23] - dayPressures[0] : 0;
      
      // Calculate risk based on patterns
      let risk = 'low';
      let reasons = [];
      
      if (pressureChange < -5) {
        risk = 'high';
        reasons.push('Rapid pressure drop detected');
      } else if (pressureChange < -3) {
        risk = 'medium';
        reasons.push('Moderate pressure drop');
      }
      
      if (avgPressure < 1010) {
        if (risk === 'low') risk = 'medium';
        reasons.push('Low pressure system');
      }
      
      forecastDays.push({
        date: date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
        tempMax: forecast.daily.temperature_2m_max[i].toFixed(0),
        tempMin: forecast.daily.temperature_2m_min[i].toFixed(0),
        pressure: avgPressure.toFixed(1),
        pressureChange: pressureChange.toFixed(1),
        precipitation: forecast.daily.precipitation_probability_max[i],
        risk,
        reasons
      });
    }
    
    const container = document.getElementById('forecastContainer');
    container.innerHTML = forecastDays.map(day => `
      <div class="forecast-card risk-${day.risk}">
        <h3>${day.date} - ${day.risk.toUpperCase()} RISK</h3>
        <div style="margin: 10px 0;">
          🌡️ ${day.tempMin}°C - ${day.tempMax}°C | 
          🌀 ${day.pressure} hPa (${day.pressureChange > 0 ? '+' : ''}${day.pressureChange} hPa change) | 
          💧 ${day.precipitation}% rain
        </div>
        ${day.reasons.length > 0 ? `<div style="margin-top: 10px; font-style: italic;">⚠️ ${day.reasons.join(', ')}</div>` : ''}
      </div>
    `).join('');
    
  } catch (error) {
    document.getElementById('forecastContainer').innerHTML = `<div class="error">Failed to load forecast: ${error.message}</div>`;
  } finally {
    document.getElementById('forecastLoading').classList.add('hidden');
  }
}

// Initialize app
loadData();
</script>
</body>
</html>
