<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascension — Daily AI Gen</title>
  <meta name="description" content="A turn-based strategy game where you bid divine essence to claim sinking islands, but over-inflate them and they float away — dragging connected neighbors into the void.">
  <meta property="og:title" content="Ascension — Daily AI Gen">
  <meta property="og:description" content="A turn-based strategy game where you bid divine essence to claim sinking islands, but over-inflate them and they float away — dragging connected neighbors into the void.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-05/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-05/">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(180deg, #1a2332 0%, #2d4159 100%);
    color: #e8d4b0;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    color: #ffd700;
  }
  
  .subtitle {
    margin-bottom: 20px;
    opacity: 0.8;
    font-style: italic;
  }
  
  .stats {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.3);
    padding: 15px 30px;
    border-radius: 10px;
    border: 2px solid #4a6380;
  }
  
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .stat-label {
    font-size: 0.9em;
    opacity: 0.7;
    margin-bottom: 5px;
  }
  
  .stat-value {
    font-size: 1.5em;
    font-weight: bold;
    color: #ffd700;
  }
  
  .board {
    display: grid;
    grid-template-columns: repeat(4, 140px);
    gap: 20px;
    margin-bottom: 30px;
    padding: 30px;
    background: rgba(0,0,0,0.2);
    border-radius: 15px;
  }
  
  .island {
    width: 140px;
    height: 140px;
    background: linear-gradient(135deg, #3d5a4d 0%, #2a4036 100%);
    border: 3px solid #5a7a6a;
    border-radius: 15px;
    padding: 10px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  .island:hover:not(.floating):not(.gone) {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(255,215,0,0.3);
  }
  
  .island.player {
    border-color: #ffd700;
    background: linear-gradient(135deg, #5a6d3d 0%, #3d4a2a 100%);
  }
  
  .island.ai {
    border-color: #ff6b6b;
    background: linear-gradient(135deg, #6d3d3d 0%, #4a2a2a 100%);
  }
  
  .island.floating {
    animation: floatAway 2s ease-out forwards;
    pointer-events: none;
  }
  
  .island.gone {
    opacity: 0;
    pointer-events: none;
  }
  
  @keyframes floatAway {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-300px) scale(0.5); opacity: 0; }
  }
  
  .island-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  
  .island-name {
    font-weight: bold;
    font-size: 0.9em;
  }
  
  .island-prestige {
    font-size: 1.3em;
    font-weight: bold;
    color: #ffd700;
    text-align: center;
    margin: 10px 0;
  }
  
  .island-limit {
    font-size: 0.8em;
    opacity: 0.7;
    text-align: center;
  }
  
  .bridge-indicator {
    font-size: 0.75em;
    opacity: 0.6;
    margin-top: 5px;
  }
  
  .controls {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }
  
  button {
    padding: 12px 24px;
    font-size: 1em;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #4a6380 0%, #3d5269 100%);
    color: #e8d4b0;
    border: 2px solid #5a7a9a;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  button:hover:not(:disabled) {
    background: linear-gradient(135deg, #5a7a9a 0%, #4a6380 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  
  button.primary {
    background: linear-gradient(135deg, #d4af37 0%, #a88c2f 100%);
    border-color: #ffd700;
    color: #1a2332;
    font-weight: bold;
  }
  
  button.primary:hover:not(:disabled) {
    background: linear-gradient(135deg, #ffd700 0%, #d4af37 100%);
  }
  
  .selected {
    box-shadow: 0 0 20px rgba(255,215,0,0.6) !important;
    border-width: 4px !important;
  }
  
  .log {
    width: 100%;
    max-width: 640px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 0.9em;
  }
  
  .log-entry {
    margin-bottom: 5px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  
  .log-entry:last-child {
    border-bottom: none;
  }
  
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  
  .modal.show {
    display: flex;
  }
  
  .modal-content {
    background: linear-gradient(135deg, #2d4159 0%, #1a2332 100%);
    padding: 40px;
    border-radius: 15px;
    border: 3px solid #ffd700;
    text-align: center;
    max-width: 500px;
  }
  
  .modal-content h2 {
    font-size: 2em;
    margin-bottom: 20px;
    color: #ffd700;
  }
  
  .modal-content p {
    margin-bottom: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <h1>⛰️ Ascension ⛰️</h1>
  <p class="subtitle">Claim islands with divine essence — but over-inflate and they float away...</p>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Your Essence</div>
      <div class="stat-value" id="playerEssence">100</div>
    </div>
    <div class="stat">
      <div class="stat-label">Your Islands</div>
      <div class="stat-value" id="playerIslands">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Turn</div>
      <div class="stat-value" id="turnCounter">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">Islands Remaining</div>
      <div class="stat-value" id="islandsRemaining">12</div>
    </div>
  </div>
  
  <div class="board" id="board"></div>
  
  <div class="controls">
    <button id="investBtn" class="primary" disabled>Invest 10 Essence</button>
    <button id="bridgeBtn" disabled>Build Bridge (20 Essence)</button>
    <button id="endTurnBtn">End Turn</button>
    <button id="restartBtn">New Game</button>
  </div>
  
  <div class="log" id="log"></div>
  
  <div class="modal" id="gameOverModal">
    <div class="modal-content">
      <h2 id="gameOverTitle"></h2>
      <p id="gameOverMessage"></p>
      <button class="primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const ISLAND_NAMES = ['Aether', 'Boreas', 'Caelum', 'Dione', 'Elara', 'Fenris', 'Gaia', 'Helios', 'Iris', 'Juno', 'Kronos', 'Luna'];
    const INVEST_COST = 10;
    const BRIDGE_COST = 20;
    const MAX_TURNS = 15;
    
    let gameState = {
      playerEssence: 100,
      turn: 1,
      islands: [],
      selectedIsland: null,
      bridgeFrom: null,
      gameOver: false
    };
    
    class Island {
      constructor(id, name) {
        this.id = id;
        this.name = name;
        this.prestige = 0;
        this.limit = Math.floor(Math.random() * 30) + 30; // 30-60
        this.owner = null; // null, 'player', 'ai1', 'ai2'
        this.bridges = [];
        this.floating = false;
        this.gone = false;
      }
      
      inflate(amount) {
        this.prestige += amount;
        if (this.prestige >= this.limit) {
          return true; // triggers liftoff
        }
        return false;
      }
    }
    
    function initGame() {
      gameState = {
        playerEssence: 100,
        turn: 1,
        islands: [],
        selectedIsland: null,
        bridgeFrom: null,
        gameOver: false
      };
      
      for (let i = 0; i < 12; i++) {
        gameState.islands.push(new Island(i, ISLAND_NAMES[i]));
      }
      
      renderBoard();
      updateStats();
      updateControls();
      addLog('The archipelago is sinking. Claim islands before they vanish into the void.');
    }
    
    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      
      gameState.islands.forEach(island => {
        const div = document.createElement('div');
        div.className = 'island';
        if (island.owner === 'player') div.classList.add('player');
        if (island.owner?.startsWith('ai')) div.classList.add('ai');
        if (island.floating) div.classList.add('floating');
        if (island.gone) div.classList.add('gone');
        if (gameState.selectedIsland === island.id) div.classList.add('selected');
        
        const bridgeText = island.bridges.length > 0 ? `🌉 ${island.bridges.length}` : '';
        
        div.innerHTML = `
          <div class="island-header">
            <div class="island-name">${island.name}</div>
            ${island.owner === 'player' ? '👑' : island.owner ? '🤖' : ''}
          </div>
          <div class="island-prestige">${island.prestige}</div>
          <div class="island-limit">Limit: ${island.limit}</div>
          <div class="bridge-indicator">${bridgeText}</div>
        `;
        
        div.onclick = () => selectIsland(island.id);
        board.appendChild(div);
      });
    }
    
    function selectIsland(id) {
      if (gameState.gameOver) return;
      const island = gameState.islands[id];
      if (island.floating || island.gone) return;
      
      gameState.selectedIsland = id;
      renderBoard();
      updateControls();
    }
    
    function invest() {
      const island = gameState.islands[gameState.selectedIsland];
      if (!island || island.floating || island.gone) return;
      if (gameState.playerEssence < INVEST_COST) return;
      
      gameState.playerEssence -= INVEST_COST;
      const liftoff = island.inflate(INVEST_COST);
      
      if (!island.owner) {
        island.owner = 'player';
        addLog(`⛰️ You claimed ${island.name}!`);
      } else {
        addLog(`✨ You invested in ${island.name} (${island.prestige}/${island.limit})`);
      }
      
      if (liftoff) {
        triggerLiftoff(island);
      }
      
      updateStats();
      renderBoard();
      updateControls();
    }
    
    function buildBridge() {
      if (!gameState.bridgeFrom) {
        const island = gameState.islands[gameState.selectedIsland];
        if (!island || island.floating || island.gone) return;
        if (island.owner !== 'player') {
          addLog('❌ You can only build bridges from your own islands.');
          return;
        }
        gameState.bridgeFrom = gameState.selectedIsland;
        addLog(`🌉 Select destination island for bridge from ${island.name}...`);
        updateControls();
      } else {
        const from = gameState.islands[gameState.bridgeFrom];
        const to = gameState.islands[gameState.selectedIsland];
        
        if (!to || to.floating || to.gone || to.id === from.id) {
          gameState.bridgeFrom = null;
          updateControls();
          return;
        }
        
        if (from.bridges.includes(to.id) || to.bridges.includes(from.id)) {
          addLog('❌ Bridge already exists.');
          gameState.bridgeFrom = null;
          updateControls();
          return;
        }
        
        if (gameState.playerEssence < BRIDGE_COST) {
          gameState.bridgeFrom = null;
          updateControls();
          return;
        }
        
        gameState.playerEssence -= BRIDGE_COST;
        from.bridges.push(to.id);
        to.bridges.push(from.id);
        
        addLog(`🌉 Built bridge: ${from.name} ↔ ${to.name}`);
        gameState.bridgeFrom = null;
        updateStats();
        renderBoard();
        updateControls();
      }
    }
    
    function triggerLiftoff(island) {
      island.floating = true;
      const chain = getConnectedIslands(island.id);
      
      addLog(`🎈 ${island.name} inflated beyond limit and lifted off!`);
      
      if (chain.length > 1) {
        addLog(`⛓️ ${chain.length - 1} connected island(s) yanked upward!`);
        chain.forEach(id => {
          if (id !== island.id) {
            gameState.islands[id].floating = true;
          }
        });
      }
      
      setTimeout(() => {
        chain.forEach(id => {
          gameState.islands[id].gone = true;
        });
        renderBoard();
        updateStats();
        checkGameOver();
      }, 2000);
      
      renderBoard();
    }
    
    function getConnectedIslands(startId, visited = new Set()) {
      visited.add(startId);
      const island = gameState.islands[startId];
      
      island.bridges.forEach(bridgeId => {
        if (!visited.has(bridgeId)) {
          getConnectedIslands(bridgeId, visited);
        }
      });
      
      return Array.from(visited);
    }
    
    function aiTurn() {
      const aiIds = ['ai1', 'ai2'];
      
      aiIds.forEach(aiId => {
        const availableIslands = gameState.islands.filter(i => !i.floating && !i.gone);
        if (availableIslands.length === 0) return;
        
        // AI strategy: prefer unclaimed, or sabotage player islands near limit
        let target;
        const playerIslands = availableIslands.filter(i => i.owner === 'player');
        const dangerousPlayer = playerIslands.filter(i => i.prestige > i.limit * 0.7);
        
        if (dangerousPlayer.length > 0 && Math.random() > 0.5) {
          // Sabotage
          target = dangerousPlayer[Math.floor(Math.random() * dangerousPlayer.length)];
        } else {
          // Claim or reinforce
          const unclaimed = availableIslands.filter(i => !i.owner);
          const owned = availableIslands.filter(i => i.owner === aiId);
          
          if (unclaimed.length > 0 && Math.random() > 0.3) {
            target = unclaimed[Math.floor(Math.random() * unclaimed.length)];
          } else if (owned.length > 0) {
            target = owned[Math.floor(Math.random() * owned.length)];
          } else {
            target = availableIslands[Math.floor(Math.random() * availableIslands.length)];
          }
        }
        
        const investAmount = Math.floor(Math.random() * 15) + 5;
        const liftoff = target.inflate(investAmount);
        
        if (!target.owner) {
          target.owner = aiId;
          addLog(`🤖 AI claimed ${target.name}`);
        } else {
          addLog(`🤖 AI invested in ${target.name} (${target.prestige}/${target.limit})`);
        }
        
        if (liftoff) {
          triggerLiftoff(target);
        }
      });
      
      updateStats();
      renderBoard();
    }
    
    function endTurn() {
      if (gameState.gameOver) return;
      
      aiTurn();
      
      gameState.turn++;
      gameState.playerEssence += 15; // income per turn
      
      updateStats();
      updateControls();
      checkGameOver();
    }
    
    function checkGameOver() {
      const remaining = gameState.islands.filter(i => !i.gone);
      
      if (remaining.length === 0 || gameState.turn > MAX_TURNS) {
        gameState.gameOver = true;
        
        const playerCount = gameState.islands.filter(i => i.owner === 'player' && !i.gone).length;
        const ai1Count = gameState.islands.filter(i => i.owner === 'ai1' && !i.gone).length;
        const ai2Count = gameState.islands.filter(i => i.owner === 'ai2' && !i.gone).length;
        
        const modal = document.getElementById('gameOverModal');
        const title = document.getElementById('gameOverTitle');
        const message = document.getElementById('gameOverMessage');
        
        if (playerCount > ai1Count && playerCount > ai2Count) {
          title.textContent = '👑 Divine Victory!';
          message.textContent = `You claimed ${playerCount} islands and outlasted your rivals. The remaining archipelago is yours.`;
        } else {
          title.textContent = '💀 Ascension Failed';
          message.textContent = `The AI claimed more territory. You held ${playerCount} islands, but it wasn't enough.`;
        }
        
        modal.classList.add('show');
      }
    }
    
    function updateStats() {
      document.getElementById('playerEssence').textContent = gameState.playerEssence;
      document.getElementById('playerIslands').textContent = 
        gameState.islands.filter(i => i.owner === 'player' && !i.gone).length;
      document.getElementById('turnCounter').textContent = gameState.turn;
      document.getElementById('islandsRemaining').textContent = 
        gameState.islands.filter(i => !i.gone).length;
    }
    
    function updateControls() {
      const investBtn = document.getElementById('investBtn');
      const bridgeBtn = document.getElementById('bridgeBtn');
      
      const island = gameState.islands[gameState.selectedIsland];
      const canInvest = island && !island.floating && !island.gone && gameState.playerEssence >= INVEST_COST;
      const canBridge = island && !island.floating && !island.gone && gameState.playerEssence >= BRIDGE_COST;
      
      investBtn.disabled = !canInvest;
      bridgeBtn.disabled = !canBridge;
      
      if (gameState.bridgeFrom !== null) {
        bridgeBtn.textContent = 'Select Destination';
      } else {
        bridgeBtn.textContent = 'Build Bridge (20 Essence)';
      }
    }
    
    function addLog(text) {
      const log = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `Turn ${gameState.turn}: ${text}`;
      log.insertBefore(entry, log.firstChild);
      
      while (log.children.length > 20) {
        log.removeChild(log.lastChild);
      }
    }
    
    document.getElementById('investBtn').onclick = invest;
    document.getElementById('bridgeBtn').onclick = buildBridge;
    document.getElementById('endTurnBtn').onclick = endTurn;
    document.getElementById('restartBtn').onclick = () => location.reload();
    
    initGame();
  </script>
</body>
</html>
