<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal Erosion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    cursor: none;
    font-family: 'Georgia', serif;
  }
  canvas {
    display: block;
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 160, 140, 0.4);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 2s;
  }
  #cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 1px solid rgba(255, 200, 150, 0.3);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 10;
    transition: width 0.3s, height 0.3s;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="cursor"></div>
<div id="info">move to erode time — click to scatter — scroll to change force</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H;
let mouse = { x: -1000, y: -1000, down: false };
let forceRadius = 120;
let particles = [];
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (particles.length === 0) initParticles();
}

function getTextPixels(text, fontSize) {
  const offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d');
  offCtx.fillStyle = '#fff';
  offCtx.font = `bold ${fontSize}px Georgia, serif`;
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.fillText(text, W / 2, H / 2);
  
  const imageData = offCtx.getImageData(0, 0, W, H);
  const pixels = [];
  const gap = 4;
  for (let y = 0; y < H; y += gap) {
    for (let x = 0; x < W; x += gap) {
      const i = (y * W + x) * 4;
      if (imageData.data[i] > 128) {
        pixels.push({ x, y });
      }
    }
  }
  return pixels;
}

function initParticles() {
  let fontSize = Math.min(W * 0.13, 180);
  const dateText = '2026.02.22';
  const pixels = getTextPixels(dateText, fontSize);
  
  particles = pixels.map(p => {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * Math.max(W, H) * 0.8;
    return {
      x: W / 2 + Math.cos(angle) * dist,
      y: H / 2 + Math.sin(angle) * dist,
      homeX: p.x,
      homeY: p.y,
      vx: 0,
      vy: 0,
      size: 1.5 + Math.random() * 1.5,
      hue: 20 + Math.random() * 30,
      saturation: 30 + Math.random() * 40,
      lightness: 50 + Math.random() * 30,
      alpha: 0.6 + Math.random() * 0.4,
      erosion: 0,
      phase: Math.random() * Math.PI * 2,
      returnSpeed: 0.01 + Math.random() * 0.03,
      friction: 0.92 + Math.random() * 0.05
    };
  });
}

function update() {
  time += 0.016;
  const mx = mouse.x;
  const my = mouse.y;
  const fr = forceRadius;
  const fr2 = fr * fr;
  const clickForce = mouse.down ? 8 : 1;
  
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    
    // Mouse repulsion
    const dx = p.x - mx;
    const dy = p.y - my;
    const dist2 = dx * dx + dy * dy;
    
    if (dist2 < fr2 && dist2 > 0.1) {
      const dist = Math.sqrt(dist2);
      const force = (1 - dist / fr) * 4 * clickForce;
      const angle = Math.atan2(dy, dx);
      p.vx += Math.cos(angle) * force;
      p.vy += Math.sin(angle) * force;
      p.erosion = Math.min(1, p.erosion + 0.05);
    }
    
    // Return home
    const hx = p.homeX - p.x;
    const hy = p.homeY - p.y;
    const homeDist = Math.sqrt(hx * hx + hy * hy);
    
    if (homeDist > 0.5) {
      const returnForce = p.returnSpeed * (1 - p.erosion * 0.7);
      p.vx += hx * returnForce;
      p.vy += hy * returnForce;
    }
    
    // Gentle wandering when eroded
    if (p.erosion > 0.3) {
      p.vx += Math.sin(time * 0.7 + p.phase) * 0.15 * p.erosion;
      p.vy += Math.cos(time * 0.5 + p.phase * 1.3) * 0.15 * p.erosion;
    }
    
    // Gravity-like pull downward when eroded
    if (p.erosion > 0.5) {
      p.vy += 0.08 * p.erosion;
    }
    
    p.vx *= p.friction;
    p.vy *= p.friction;
    p.x += p.vx;
    p.y += p.vy;
    
    // Erosion decay
    p.erosion *= 0.995;
    
    // Wrap around edges softly
    if (p.x < -50) p.x = W + 50;
    if (p.x > W + 50) p.x = -50;
    if (p.y < -50) p.y = H + 50;
    if (p.y > H + 50) p.y = -50;
  }
}

function draw() {
  // Fade trail
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const distFromHome = Math.sqrt(
      (p.x - p.homeX) ** 2 + (p.y - p.homeY) ** 2
    );
    
    const erosionColor = p.erosion;
    const hue = p.hue + erosionColor * 20 + Math.sin(time + p.phase) * 5;
    const sat = p.saturation - erosionColor * 20;
    const light = p.lightness + erosionColor * 15;
    const alpha = p.alpha * (1 - erosionColor * 0.3) * Math.min(1, 1 - distFromHome / (Math.max(W, H) * 0.6) + 0.4);
    
    const size = p.size * (1 + erosionColor * 0.8 + Math.sin(time * 2 + p.phase) * 0.1);
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
    ctx.fill();
    
    // Glow for eroded particles
    if (erosionColor > 0.4) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue + 10}, ${sat + 20}%, ${light + 10}%, ${erosionColor * 0.08})`;
      ctx.fill();
    }
  }
  
  // Draw connections between nearby eroded particles
  let connectionCount = 0;
  for (let i = 0; i < particles.length && connectionCount < 500; i += 3) {
    const p = particles[i];
    if (p.erosion < 0.3) continue;
    for (let j = i + 3; j < particles.length && connectionCount < 500; j += 3) {
      const q = particles[j];
      if (q.erosion < 0.3) continue;
      const dx = p.x - q.x;
      const dy = p.y - q.y;
      const dist = dx * dx + dy * dy;
      if (dist < 2500) {
        const alpha = (1 - dist / 2500) * Math.min(p.erosion, q.erosion) * 0.15;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `hsla(30, 40%, 60%, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        connectionCount++;
      }
    }
  }
  
  // Mouse cursor glow
  if (mouse.x > 0) {
    const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, forceRadius);
    gradient.addColorStop(0, `hsla(35, 60%, 70%, ${mouse.down ? 0.08 : 0.03})`);
    gradient.addColorStop(1, 'hsla(35, 60%, 70%, 0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, forceRadius, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  
  // Subtle date watermark
  ctx.save();
  ctx.globalAlpha = 0.03 + Math.sin(time * 0.3) * 0.01;
  ctx.font = `bold ${Math.min(W * 0.05, 50)}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#b4a08c';
  ctx.fillText('February 22, 2026', W / 2, H * 0.15);
  ctx.restore();
  
  // Countdown or info
  const target = new Date('2026-02-22T00:00:00');
  const now = new Date();
  const diff = target - now;
  if (diff > 0) {
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.font = '13px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#b4a08c';
    ctx.fillText(`${days}d ${hours}h ${mins}m until this moment`, W / 2, H * 0.88);
    ctx.restore();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Events
window.addEventListener('resize', () => {
  const hadParticles = particles.length > 0;
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (hadParticles) {
    particles = [];
    initParticles();
  }
});

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

window.addEventListener('mousedown', e => {
  mouse.down = true;
  cursorEl.style.width = '40px';
  cursorEl.style.height = '40px';
  cursorEl.style.borderColor = 'rgba(255, 200, 150, 0.6)';
});

window.addEventListener('mouseup', () => {
  mouse.down = false;
  cursorEl.style.width = '20px';
  cursorEl.style.height = '20px';
  cursorEl.style.borderColor = 'rgba(255, 200, 150, 0.3)';
});

window.addEventListener('wheel', e => {
  forceRadius = Math.max(40, Math.min(300, forceRadius + e.deltaY * 0.3));
});

window.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
}, { passive: false });

window.addEventListener('touchstart', e => {
  mouse.down = true;
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
});

window.addEventListener('touchend', () => {
  mouse.down = false;
  mouse.x = -1000;
  mouse.y = -1000;
});

// Fade info text
setTimeout(() => {
  document.getElementById('info').style.opacity = '0';
}, 6000);

resize();
loop();
</script>
</body>
</html>
