<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidsspiral 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    cursor: grab;
  }
  body:active { cursor: grabbing; }
  canvas { display: block; }
  #info {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #info h1 {
    font-size: 1.4em;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #ff6bff, #6bfff0, #ffeb6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  #info p {
    font-size: 0.85em;
    opacity: 0.6;
  }
  #tooltip {
    position: fixed;
    background: rgba(10,10,30,0.9);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 16px;
    pointer-events: none;
    z-index: 20;
    display: none;
    font-size: 0.85em;
    backdrop-filter: blur(10px);
  }
  #tooltip .date { color: #6bfff0; font-weight: bold; font-size: 1.1em; }
  #tooltip .days { color: #ff6bff; }
  #countdown {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #countdown .big {
    font-size: 3em;
    font-weight: bold;
    background: linear-gradient(90deg, #ff6bff, #6bfff0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #countdown .label { opacity: 0.5; font-size: 0.8em; margin-top: 4px; }
</style>
</head>
<body>
<div id="info">
  <h1>Tidsspiral → 2026-02-22</h1>
  <p>Dra för att rotera · Scrolla för att zooma · Hovra över dagar</p>
</div>
<div id="tooltip"></div>
<div id="countdown">
  <div class="big" id="countNum"></div>
  <div class="label">dagar kvar till 2026-02-22</div>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const countNum = document.getElementById('countNum');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const TARGET = new Date('2026-02-22T00:00:00');
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const totalDays = Math.ceil((TARGET - TODAY) / (1000*60*60*24));
countNum.textContent = totalDays;

// Generate days
const days = [];
for (let i = 0; i <= totalDays; i++) {
  const d = new Date(TODAY);
  d.setDate(d.getDate() + i);
  const t = i / totalDays;
  const angle = t * Math.PI * 12; // 6 full rotations
  const radius = 50 + t * 250;
  const y3d = (t - 0.5) * 500;
  days.push({
    date: d,
    index: i,
    t,
    angle,
    radius,
    x3d: Math.cos(angle) * radius,
    y3d,
    z3d: Math.sin(angle) * radius,
    sx: 0, sy: 0, sz: 0, // screen coords
    size: 2 + (1 - t) * 3,
    isWeekend: d.getDay() === 0 || d.getDay() === 6,
    isTarget: i === totalDays,
    isToday: i === 0,
    month: d.getMonth(),
  });
}

// Camera
let rotX = -0.3;
let rotY = 0;
let zoom = 1;
let dragX = 0, dragY = 0;
let isDragging = false;
let lastMX = 0, lastMY = 0;
let autoRotate = true;
let mouseX = -1000, mouseY = -1000;

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  autoRotate = false;
  lastMX = e.clientX;
  lastMY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (isDragging) {
    rotY += (e.clientX - lastMX) * 0.005;
    rotX += (e.clientY - lastMY) * 0.005;
    rotX = Math.max(-1.5, Math.min(1.5, rotX));
    lastMX = e.clientX;
    lastMY = e.clientY;
  }
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(0.3, Math.min(3, zoom));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    autoRotate = false;
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
  }
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isDragging && e.touches.length === 1) {
    rotY += (e.touches[0].clientX - lastMX) * 0.005;
    rotX += (e.touches[0].clientY - lastMY) * 0.005;
    rotX = Math.max(-1.5, Math.min(1.5, rotX));
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => isDragging = false);

const monthColors = [
  [255,100,150],[255,150,100],[255,220,100],[150,255,100],
  [100,255,180],[100,230,255],[100,150,255],[150,100,255],
  [220,100,255],[255,100,220],[255,130,130],[200,200,255]
];

function project(x, y, z) {
  // Rotate Y
  let cx = x * Math.cos(rotY) - z * Math.sin(rotY);
  let cz = x * Math.sin(rotY) + z * Math.cos(rotY);
  // Rotate X
  let cy = y * Math.cos(rotX) - cz * Math.sin(rotX);
  let cz2 = y * Math.sin(rotX) + cz * Math.cos(rotX);
  
  const perspective = 800;
  const scale = perspective / (perspective + cz2) * zoom;
  return {
    x: W/2 + cx * scale,
    y: H/2 + cy * scale,
    scale,
    z: cz2
  };
}

const monthNames = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const dayNames = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];

function formatDate(d) {
  return `${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
}

// Particles / stars background
const stars = Array.from({length: 200}, () => ({
  x: Math.random() * 2 - 1,
  y: Math.random() * 2 - 1,
  z: Math.random() * 2 - 1,
  size: Math.random() * 1.5 + 0.5
}));

let time = 0;
let hoveredDay = null;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  
  if (autoRotate) {
    rotY += 0.003;
  }
  
  ctx.fillStyle = 'rgba(10,10,26,0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  stars.forEach(s => {
    const p = project(s.x * 600, s.y * 600, s.z * 600);
    if (p.scale > 0) {
      ctx.fillStyle = `rgba(255,255,255,${0.3 * p.scale})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, s.size * p.scale * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  
  // Spiral trail
  const trailPoints = [];
  for (let i = 0; i <= 200; i++) {
    const t = i / 200;
    const angle = t * Math.PI * 12;
    const radius = 50 + t * 250;
    const y3d = (t - 0.5) * 500;
    const p = project(
      Math.cos(angle) * radius,
      y3d,
      Math.sin(angle) * radius
    );
    trailPoints.push(p);
  }
  
  ctx.strokeStyle = 'rgba(107,255,240,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  trailPoints.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  
  // Sort days by z for depth
  const projected = days.map(d => {
    const wobble = Math.sin(time * 2 + d.index * 0.1) * 5;
    const p = project(d.x3d, d.y3d + wobble, d.z3d);
    return { ...d, sx: p.x, sy: p.y, scale: p.scale, depth: p.z };
  });
  projected.sort((a, b) => b.depth - a.depth);
  
  hoveredDay = null;
  
  projected.forEach(d => {
    if (d.scale <= 0) return;
    
    const mc = monthColors[d.month];
    const alpha = Math.min(1, d.scale * 0.8 + 0.2);
    let size = d.size * d.scale;
    
    // Check hover
    const dx = mouseX - d.sx;
    const dy = mouseY - d.sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const isHovered = dist < Math.max(size * 2, 12);
    
    if (isHovered && (!hoveredDay || d.depth < hoveredDay.depth)) {
      hoveredDay = d;
    }
    
    if (d.isTarget) {
      // Target date - pulsing golden star
      const pulse = 1 + Math.sin(time * 4) * 0.4;
      size = 12 * d.scale * pulse;
      
      // Glow
      const grd = ctx.createRadialGradient(d.sx, d.sy, 0, d.sx, d.sy, size * 3);
      grd.addColorStop(0, `rgba(255,235,107,${0.5 * alpha})`);
      grd.addColorStop(1, 'rgba(255,235,107,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(d.sx, d.sy, size * 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Star shape
      ctx.fillStyle = `rgba(255,235,107,${alpha})`;
      drawStar(d.sx, d.sy, size, 5);
      
      // Label
      ctx.fillStyle = `rgba(255,235,107,${alpha})`;
      ctx.font = `${Math.max(10, 14 * d.scale)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('2026-02-22', d.sx, d.sy - size - 8);
    } else if (d.isToday) {
      // Today - bright white
      size = 8 * d.scale;
      const grd = ctx.createRadialGradient(d.sx, d.sy, 0, d.sx, d.sy, size * 2);
      grd.addColorStop(0, `rgba(255,255,255,${0.6 * alpha})`);
      grd.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(d.sx, d.sy, size * 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(d.sx, d.sy, size, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.font = `${Math.max(10, 12 * d.scale)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('IDAG', d.sx, d.sy - size - 6);
    } else {
      // Normal day
      if (isHovered && d === hoveredDay) size *= 2.5;
      
      ctx.fillStyle = d.isWeekend 
        ? `rgba(${mc[0]},${mc[1]},${mc[2]},${alpha * 0.9})`
        : `rgba(${mc[0]},${mc[1]},${mc[2]},${alpha * 0.6})`;
      ctx.beginPath();
      ctx.arc(d.sx, d.sy, size, 0, Math.PI * 2);
      ctx.fill();
      
      if (d.isWeekend) {
        ctx.fillStyle = `rgba(${mc[0]},${mc[1]},${mc[2]},${alpha * 0.15})`;
        ctx.beginPath();
        ctx.arc(d.sx, d.sy, size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  });
  
  // Tooltip
  if (hoveredDay && !hoveredDay.isTarget && !hoveredDay.isToday) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mouseX + 15) + 'px';
    tooltip.style.top = (mouseY - 30) + 'px';
    const daysFromNow = hoveredDay.index;
    const daysToTarget = totalDays - hoveredDay.index;
    tooltip.innerHTML = `<div class="date">${formatDate(hoveredDay.date)}</div>
      <div class="days">Dag ${daysFromNow} av ${totalDays} · ${daysToTarget} dagar kvar</div>`;
  } else {
    tooltip.style.display = 'none';
  }
  
  // Connection lines from today to nearby hovered
  if (hoveredDay) {
    const todayP = projected.find(d => d.isToday);
    if (todayP) {
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(todayP.sx, todayP.sy);
      ctx.lineTo(hoveredDay.sx, hoveredDay.sy);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  
  // Update countdown
  const now = new Date();
  const remaining = Math.ceil((TARGET - now) / (1000*60*60*24));
  countNum.textContent = remaining;
}

function drawStar(cx, cy, size, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.4;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

animate();
</script>
</body>
</html>
