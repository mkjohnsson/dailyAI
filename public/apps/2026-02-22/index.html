<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Valentine — 2026.02.22</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0612;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Georgia', serif;
  }
  canvas {
    display: block;
  }
  #ui {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255, 180, 200, 0.8);
    font-size: 14px;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255, 100, 150, 0.5);
    z-index: 10;
  }
  #ui h1 {
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: 3px;
  }
  #ui p {
    font-size: 12px;
    opacity: 0.7;
  }
  #date {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: rgba(255, 180, 200, 0.4);
    font-size: 12px;
    letter-spacing: 2px;
  }
  #counter {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255, 180, 200, 0.6);
    font-size: 13px;
    text-shadow: 0 0 10px rgba(255, 100, 150, 0.3);
  }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: rgba(255, 180, 200, 0.5);
    font-size: 11px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="ui">
  <h1>✦ ORBITAL VALENTINE ✦</h1>
  <p>click to birth hearts into the cosmos</p>
</div>
<div id="counter">bodies: <span id="count">0</span> | merges: <span id="merges">0</span></div>
<div id="controls">SPACE: clear &nbsp;|&nbsp; R: reverse gravity &nbsp;|&nbsp; D: drag mode</div>
<div id="date">2026 · 02 · 22</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let bodies = [];
let trails = [];
let mergeCount = 0;
let reversed = false;
let dragMode = false;
let dragging = null;
let mouseX = 0, mouseY = 0;
let time = 0;

const G = 800;
const MAX_TRAIL = 120;
const COLORS = [
  '#ff6b9d', '#c44569', '#f8a5c2', '#e77f67',
  '#cf6a87', '#e15f41', '#f3a683', '#f7d794',
  '#dff9fb', '#c7ecee', '#ff9ff3', '#feca57',
  '#ff6348', '#ee5a24', '#FDA7DF', '#D980FA'
];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Body {
  constructor(x, y, vx, vy, mass) {
    this.x = x;
    this.y = y;
    this.vx = vx || (Math.random() - 0.5) * 2;
    this.vy = vy || (Math.random() - 0.5) * 2;
    this.mass = mass || 3 + Math.random() * 5;
    this.radius = Math.sqrt(this.mass) * 3;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.trail = [];
    this.alive = true;
    this.age = 0;
    this.pulseOffset = Math.random() * Math.PI * 2;
    this.id = Math.random();
  }

  get r() {
    return this.radius * (1 + 0.1 * Math.sin(time * 3 + this.pulseOffset));
  }

  update(dt) {
    this.age += dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Soft boundary wrapping with padding
    const pad = 50;
    if (this.x < -pad) this.x = W + pad;
    if (this.x > W + pad) this.x = -pad;
    if (this.y < -pad) this.y = H + pad;
    if (this.y > H + pad) this.y = -pad;

    this.trail.push({ x: this.x, y: this.y, color: this.color, age: 0 });
    if (this.trail.length > MAX_TRAIL) this.trail.shift();
    this.trail.forEach(t => t.age += dt);
  }

  drawHeart(cx, cy, size) {
    ctx.beginPath();
    const s = size;
    const topY = cy - s * 0.4;
    ctx.moveTo(cx, cy + s * 0.6);
    ctx.bezierCurveTo(cx - s * 1.2, cy - s * 0.2, cx - s * 0.7, topY - s * 0.8, cx, topY);
    ctx.bezierCurveTo(cx + s * 0.7, topY - s * 0.8, cx + s * 1.2, cy - s * 0.2, cx, cy + s * 0.6);
    ctx.closePath();
  }

  draw() {
    // Draw trail
    for (let i = 1; i < this.trail.length; i++) {
      const t = this.trail[i];
      const prev = this.trail[i - 1];
      const alpha = (i / this.trail.length) * 0.4;
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = t.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = Math.sqrt(this.mass) * 0.8 * (i / this.trail.length);
      ctx.stroke();
    }

    // Glow
    const glowR = this.r * 3;
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    grd.addColorStop(0, this.color + '40');
    grd.addColorStop(1, this.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Heart shape
    const sz = this.r;
    ctx.save();
    // Rotate heart in direction of velocity
    const angle = Math.atan2(this.vy, this.vx) + Math.PI / 2;
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    this.drawHeart(0, 0, sz);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.fill();

    // Inner highlight
    this.drawHeart(0, -sz * 0.05, sz * 0.5);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    ctx.restore();
  }
}

function applyGravity(dt) {
  const sign = reversed ? -1 : 1;
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i];
      const b = bodies[j];
      if (!a.alive || !b.alive) continue;

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) dist = 1;

      // Check merge
      if (dist < a.radius + b.radius && !reversed) {
        merge(a, b);
        continue;
      }

      const force = sign * G * a.mass * b.mass / (dist * dist);
      const fx = force * dx / dist;
      const fy = force * dy / dist;

      a.vx += fx / a.mass * dt;
      a.vy += fy / a.mass * dt;
      b.vx -= fx / b.mass * dt;
      b.vy -= fy / b.mass * dt;
    }
  }
}

function merge(a, b) {
  const totalMass = a.mass + b.mass;
  const nx = (a.x * a.mass + b.x * b.mass) / totalMass;
  const ny = (a.y * a.mass + b.y * b.mass) / totalMass;
  const nvx = (a.vx * a.mass + b.vx * b.mass) / totalMass;
  const nvy = (a.vy * a.mass + b.vy * b.mass) / totalMass;

  b.alive = false;
  a.x = nx;
  a.y = ny;
  a.vx = nvx;
  a.vy = nvy;
  a.mass = totalMass;
  a.radius = Math.sqrt(a.mass) * 3;

  // Blend colors
  if (Math.random() > 0.5) a.color = b.color;

  // Spawn particles
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 20 + Math.random() * 60;
    trails.push({
      x: nx, y: ny,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: a.color,
      size: 1 + Math.random() * 3
    });
  }

  mergeCount++;
  document.getElementById('merges').textContent = mergeCount;
}

function spawnBody(x, y, vx, vy) {
  const b = new Body(x, y, vx, vy);
  bodies.push(b);
  document.getElementById('count').textContent = bodies.length;
}

function spawnCluster(x, y, n) {
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const dist = 20 + Math.random() * 30;
    const speed = 30 + Math.random() * 40;
    spawnBody(
      x + Math.cos(angle) * dist,
      y + Math.sin(angle) * dist,
      Math.cos(angle + Math.PI / 2) * speed / 30,
      Math.sin(angle + Math.PI / 2) * speed / 30
    );
  }
}

let clickStart = null;
canvas.addEventListener('mousedown', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  clickStart = { x: e.clientX, y: e.clientY, time: Date.now() };

  if (dragMode) {
    for (const b of bodies) {
      const dx = b.x - e.clientX;
      const dy = b.y - e.clientY;
      if (Math.sqrt(dx * dx + dy * dy) < b.radius * 2) {
        dragging = b;
        break;
      }
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (dragging) {
    dragging.x = e.clientX;
    dragging.y = e.clientY;
    dragging.vx = 0;
    dragging.vy = 0;
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragging) {
    dragging = null;
    return;
  }
  if (clickStart) {
    const dt = Date.now() - clickStart.time;
    const dx = (e.clientX - clickStart.x);
    const dy = (e.clientY - clickStart.y);
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 30) {
      // Fling spawn
      spawnBody(clickStart.x, clickStart.y, -dx * 0.05, -dy * 0.05);
    } else if (dt > 400) {
      // Long press: cluster
      spawnCluster(e.clientX, e.clientY, 5);
    } else {
      spawnBody(e.clientX, e.clientY);
    }
    clickStart = null;
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  spawnBody(t.clientX, t.clientY);
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    bodies = [];
    trails = [];
    mergeCount = 0;
    document.getElementById('count').textContent = 0;
    document.getElementById('merges').textContent = 0;
  }
  if (e.code === 'KeyR') {
    reversed = !reversed;
  }
  if (e.code === 'KeyD') {
    dragMode = !dragMode;
    document.body.style.cursor = dragMode ? 'grab' : 'crosshair';
  }
});

// Seed with initial bodies
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const cx = W / 2;
  const cy = H / 2;
  const dist = 150;
  spawnBody(
    cx + Math.cos(angle) * dist,
    cy + Math.sin(angle) * dist,
    Math.cos(angle + Math.PI / 2) * 1.5,
    Math.sin(angle + Math.PI / 2) * 1.5
  );
}

let lastTime = performance.now();

function drawStars() {
  // Static seed-based stars
  const seed = 42;
  for (let i = 0; i < 200; i++) {
    const sx = ((i * 7919 + seed) % W);
    const sy = ((i * 6271 + seed * 3) % H);
    const brightness = 0.2 + 0.3 * Math.sin(time * 0.5 + i);
    ctx.fillStyle = `rgba(255, 220, 240, ${brightness})`;
    ctx.fillRect(sx, sy, 1, 1);
  }
}

function drawConnectionLines() {
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i];
      const b = bodies[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        const alpha = (1 - dist / 200) * 0.15;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(255, 180, 200, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  time += dt;

  // Background with slight fade for trail effect
  ctx.fillStyle = 'rgba(10, 6, 18, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawStars();

  // Update particles
  trails = trails.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 1.5;
    p.vx *= 0.98;
    p.vy *= 0.98;
    if (p.life > 0) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.floor(p.life * 200).toString(16).padStart(2, '0');
      ctx.fill();
      return true;
    }
    return false;
  });

  // Apply gravity
  applyGravity(dt);

  // Remove dead
  bodies = bodies.filter(b => b.alive);
  document.getElementById('count').textContent = bodies.length;

  drawConnectionLines();

  // Update and draw bodies
  for (const b of bodies) {
    b.update(dt);
    b.draw();
  }

  // Draw slingshot line
  if (clickStart && !dragging) {
    ctx.beginPath();
    ctx.moveTo(clickStart.x, clickStart.y);
    ctx.lineTo(mouseX, mouseY);
    ctx.strokeStyle = 'rgba(255, 180, 200, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow at start
    const dx = clickStart.x - mouseX;
    const dy = clickStart.y - mouseY;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(clickStart.x, clickStart.y);
    ctx.lineTo(
      clickStart.x + Math.cos(angle - 0.3) * 15,
      clickStart.y + Math.sin(angle - 0.3) * 15
    );
    ctx.moveTo(clickStart.x, clickStart.y);
    ctx.lineTo(
      clickStart.x + Math.cos(angle + 0.3) * 15,
      clickStart.y + Math.sin(angle + 0.3) * 15
    );
    ctx.strokeStyle = 'rgba(255, 180, 200, 0.5)';
    ctx.stroke();
  }

  // Center of mass indicator
  if (bodies.length > 0) {
    let totalMass = 0, cmx = 0, cmy = 0;
    for (const b of bodies) {
      cmx += b.x * b.mass;
      cmy += b.y * b.mass;
      totalMass += b.mass;
    }
    cmx /= totalMass;
    cmy /= totalMass;

    ctx.beginPath();
    ctx.arc(cmx, cmy, 3 + Math.sin(time * 4) * 1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fill();
  }
}

requestAnimationFrame(animate);
</script>
</body>
</html>
