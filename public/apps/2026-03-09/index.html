<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmurate — Daily AI Gen</title>
  <meta name="description" content="You breed swarms of glowing agents and watch them navigate a hostile, evolving landscape that learns from your tactics.">
  <meta property="og:title" content="Murmurate — Daily AI Gen">
  <meta property="og:description" content="You breed swarms of glowing agents and watch them navigate a hostile, evolving landscape that learns from your tactics.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-09/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-09/">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    color: #4af;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #canvas {
    flex: 1;
    display: block;
    background: #000;
  }
  #controls {
    background: #111;
    padding: 15px;
    border-top: 1px solid #222;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .slider-group label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input[type="range"] {
    width: 120px;
    height: 4px;
    background: #222;
    outline: none;
    -webkit-appearance: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #4af;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #4af;
    cursor: pointer;
    border: none;
  }
  button {
    background: #222;
    border: 1px solid #4af;
    color: #4af;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  button:hover {
    background: #4af;
    color: #000;
  }
  #stats {
    font-size: 11px;
    line-height: 1.6;
    margin-left: auto;
  }
  .value {
    color: #8f8;
    font-weight: bold;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div class="slider-group">
    <label>Cohesion: <span class="value" id="cohVal">50</span></label>
    <input type="range" id="cohesion" min="0" max="100" value="50">
  </div>
  <div class="slider-group">
    <label>Drift: <span class="value" id="driftVal">50</span></label>
    <input type="range" id="drift" min="0" max="100" value="50">
  </div>
  <div class="slider-group">
    <label>Panic: <span class="value" id="panicVal">50</span></label>
    <input type="range" id="panic" min="0" max="100" value="50">
  </div>
  <button id="release">Release Generation</button>
  <div id="stats">
    <div>Gen: <span class="value" id="genNum">1</span></div>
    <div>Alive: <span class="value" id="alive">0</span></div>
    <div>Crossed: <span class="value" id="crossed">0</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 80;
}
resize();
window.addEventListener('resize', resize);

// Stats
let generation = 1;
let totalCrossed = 0;

// DNA sliders
const cohSlider = document.getElementById('cohesion');
const driftSlider = document.getElementById('drift');
const panicSlider = document.getElementById('panic');
const releaseBtn = document.getElementById('release');

cohSlider.oninput = () => document.getElementById('cohVal').textContent = cohSlider.value;
driftSlider.oninput = () => document.getElementById('driftVal').textContent = driftSlider.value;
panicSlider.oninput = () => document.getElementById('panicVal').textContent = panicSlider.value;

// Obstacles (landscape learns)
class Obstacle {
  constructor(type, x, y, params) {
    this.type = type;
    this.x = x;
    this.y = y;
    this.params = params;
    this.age = 0;
  }
  
  update() {
    this.age++;
    if (this.type === 'field') {
      this.params.phase += 0.02;
    } else if (this.type === 'dead') {
      this.params.pulse = Math.sin(this.age * 0.05) * 10;
    } else if (this.type === 'trap') {
      this.params.angle += 0.03;
    }
  }
  
  draw() {
    ctx.save();
    ctx.globalAlpha = 0.6;
    
    if (this.type === 'field') {
      // Moving interference field
      const r = this.params.radius + Math.sin(this.params.phase) * 20;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
      grad.addColorStop(0, 'rgba(255,80,80,0.3)');
      grad.addColorStop(1, 'rgba(255,80,80,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(this.x - r, this.y - r, r * 2, r * 2);
    } else if (this.type === 'dead') {
      // Signal dead zone
      const r = this.params.radius + this.params.pulse;
      ctx.fillStyle = 'rgba(50,50,50,0.5)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'trap') {
      // Attraction trap (spiral)
      ctx.strokeStyle = 'rgba(255,200,80,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 100; i++) {
        const angle = this.params.angle + i * 0.3;
        const r = i * 2;
        const px = this.x + Math.cos(angle) * r;
        const py = this.y + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    
    ctx.restore();
  }
  
  affectsAgent(agent) {
    const dx = agent.x - this.x;
    const dy = agent.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (this.type === 'field') {
      const r = this.params.radius + Math.sin(this.params.phase) * 20;
      if (dist < r) {
        // Push away
        const force = (r - dist) / r * 0.5;
        agent.vx += (dx / dist) * force;
        agent.vy += (dy / dist) * force;
        agent.stress += 0.5;
      }
    } else if (this.type === 'dead') {
      const r = this.params.radius + this.params.pulse;
      if (dist < r) {
        // Slow down, lose cohesion
        agent.vx *= 0.95;
        agent.vy *= 0.95;
        agent.stress += 0.3;
        return true;
      }
    } else if (this.type === 'trap') {
      if (dist < 200) {
        // Pull toward center in spiral
        const pull = (200 - dist) / 200 * 0.3;
        agent.vx -= (dx / dist) * pull;
        agent.vy -= (dy / dist) * pull;
        // Add tangential force
        agent.vx += -dy / dist * pull * 0.5;
        agent.vy += dx / dist * pull * 0.5;
        agent.stress += 0.4;
      }
    }
    return false;
  }
}

// Agent
class Agent {
  constructor(dna) {
    this.x = 50;
    this.y = H / 2 + (Math.random() - 0.5) * H * 0.3;
    this.vx = Math.random() * 2 + 1;
    this.vy = (Math.random() - 0.5) * 2;
    this.dna = dna;
    this.alive = true;
    this.stress = 0;
    this.crossed = false;
    this.trail = [];
  }
  
  update(agents, obstacles) {
    if (!this.alive) return;
    
    this.stress *= 0.98;
    
    // Cohesion
    let cx = 0, cy = 0, count = 0;
    agents.forEach(other => {
      if (other !== this && other.alive) {
        const dx = other.x - this.x;
        const dy = other.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          cx += other.x;
          cy += other.y;
          count++;
        }
      }
    });
    
    if (count > 0) {
      cx /= count;
      cy /= count;
      const cohForce = this.dna.cohesion / 100 * 0.05;
      this.vx += (cx - this.x) * cohForce;
      this.vy += (cy - this.y) * cohForce;
    }
    
    // Drift (randomness)
    const driftForce = this.dna.drift / 100 * 0.5;
    this.vx += (Math.random() - 0.5) * driftForce;
    this.vy += (Math.random() - 0.5) * driftForce;
    
    // Panic response
    if (this.stress > this.dna.panic / 100 * 50) {
      // Panic: speed up, less predictable
      this.vx += (Math.random() - 0.5) * 2;
      this.vy += (Math.random() - 0.5) * 2;
    }
    
    // Goal attraction (right side)
    const goalX = W - 50;
    const goalY = H / 2;
    const gdx = goalX - this.x;
    const gdy = goalY - this.y;
    const goalDist = Math.sqrt(gdx * gdx + gdy * gdy);
    this.vx += (gdx / goalDist) * 0.02;
    this.vy += (gdy / goalDist) * 0.02;
    
    // Apply obstacles
    obstacles.forEach(obs => {
      obs.affectsAgent(this);
    });
    
    // Damping
    this.vx *= 0.98;
    this.vy *= 0.98;
    
    // Speed limit
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 5) {
      this.vx = (this.vx / speed) * 5;
      this.vy = (this.vy / speed) * 5;
    }
    
    // Move
    this.x += this.vx;
    this.y += this.vy;
    
    // Trail
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 20) this.trail.shift();
    
    // Death conditions
    if (this.y < 0 || this.y > H || this.stress > 100) {
      this.alive = false;
    }
    
    // Success
    if (this.x > W - 100 && !this.crossed) {
      this.crossed = true;
      totalCrossed++;
    }
  }
  
  draw() {
    if (!this.alive && this.trail.length === 0) return;
    
    ctx.save();
    
    // Trail
    if (this.trail.length > 1) {
      ctx.strokeStyle = this.alive ? 'rgba(68,170,255,0.3)' : 'rgba(100,100,100,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.stroke();
    }
    
    // Agent
    if (this.alive) {
      const brightness = this.crossed ? 150 : 100;
      const hue = this.crossed ? 120 : 200;
      ctx.fillStyle = `hsl(${hue}, 100%, ${brightness - this.stress}%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Stress indicator
      if (this.stress > 30) {
        ctx.strokeStyle = `rgba(255,100,100,${this.stress / 100})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    
    ctx.restore();
  }
}

// Game state
let agents = [];
let obstacles = [];
let successHistory = [];

function initObstacles() {
  obstacles = [];
  
  // Base obstacles
  const midX = W / 2;
  obstacles.push(new Obstacle('field', midX - 100, H * 0.3, {radius: 80, phase: 0}));
  obstacles.push(new Obstacle('field', midX + 50, H * 0.7, {radius: 80, phase: Math.PI}));
  obstacles.push(new Obstacle('dead', midX - 50, H * 0.5, {radius: 60, pulse: 0}));
  obstacles.push(new Obstacle('trap', midX + 150, H * 0.4, {angle: 0}));
  
  // Learning: add more obstacles based on success rate
  if (successHistory.length > 2) {
    const recentSuccess = successHistory.slice(-3).reduce((a, b) => a + b, 0) / 3;
    
    if (recentSuccess > 0.6) {
      // Too easy, add obstacles
      obstacles.push(new Obstacle('field', midX, H * 0.2, {radius: 60, phase: Math.PI / 2}));
      obstacles.push(new Obstacle('trap', midX - 100, H * 0.6, {angle: Math.PI}));
    }
    
    if (recentSuccess > 0.8) {
      obstacles.push(new Obstacle('dead', midX + 100, H * 0.3, {radius: 70, pulse: 0}));
    }
  }
}

function releaseGeneration() {
  const dna = {
    cohesion: parseInt(cohSlider.value),
    drift: parseInt(driftSlider.value),
    panic: parseInt(panicSlider.value)
  };
  
  // Clear old dead agents
  agents = agents.filter(a => a.alive);
  
  // Release 30 new agents
  for (let i = 0; i < 30; i++) {
    agents.push(new Agent(dna));
  }
  
  generation++;
  initObstacles();
}

releaseBtn.addEventListener('click', releaseGeneration);

// Initial setup
initObstacles();
releaseGeneration();

// Animation loop
function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, W, H);
  
  // Start zone
  ctx.fillStyle = 'rgba(68,170,255,0.1)';
  ctx.fillRect(0, 0, 100, H);
  
  // End zone
  ctx.fillStyle = 'rgba(136,255,136,0.1)';
  ctx.fillRect(W - 100, 0, 100, H);
  
  // Update and draw obstacles
  obstacles.forEach(obs => {
    obs.update();
    obs.draw();
  });
  
  // Update and draw agents
  agents.forEach(agent => {
    agent.update(agents, obstacles);
    agent.draw();
  });
  
  // Update stats
  const alive = agents.filter(a => a.alive).length;
  const crossed = agents.filter(a => a.crossed).length;
  document.getElementById('genNum').textContent = generation;
  document.getElementById('alive').textContent = alive;
  document.getElementById('crossed').textContent = totalCrossed;
  
  // Track success rate
  if (alive === 0 && agents.length > 0) {
    const successRate = crossed / agents.length;
    successHistory.push(successRate);
    if (successHistory.length > 10) successHistory.shift();
  }
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
