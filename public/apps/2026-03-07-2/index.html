<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressuredrop — Barometric Pressure Monitor — Daily AI Gen</title>
  <meta name="description" content="A severe weather monitoring tool that reveals barometric pressure trends and their rate of change — the critical metric that forecasts storms before they arrive.">
  <meta property="og:title" content="Pressuredrop — Daily AI Gen">
  <meta property="og:description" content="A severe weather monitoring tool that reveals barometric pressure trends and their rate of change — the critical metric that forecasts storms before they arrive.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-07-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-07-2/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #00ff88;
        }
        .tagline {
            color: #aaa;
            font-size: 0.9em;
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
        }
        #locationInput {
            flex: 1;
            padding: 15px;
            font-size: 1em;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(0,255,136,0.3);
            color: #fff;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        #locationInput::placeholder {
            color: #888;
        }
        #searchBtn {
            padding: 15px 30px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            color: #000;
            transition: all 0.3s;
        }
        #searchBtn:hover {
            background: #00cc6a;
            transform: translateY(-2px);
        }
        #searchBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }
        .location-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0,255,136,0.2);
            border-radius: 10px;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .location-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #00ff88;
        }
        .remove-btn {
            background: rgba(255,50,50,0.7);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .remove-btn:hover {
            background: rgba(255,50,50,1);
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid;
        }
        .metric-label {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 5px;
        }
        .metric-value {
            font-size: 1.8em;
            font-weight: bold;
        }
        .rate-stable { border-color: #00ff88; }
        .rate-dropping { border-color: #ffaa00; }
        .rate-severe { border-color: #ff3333; }
        .severity-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .severity-stable { border-color: #00ff88; }
        .severity-moderate { border-color: #ffaa00; }
        .severity-severe { border-color: #ff3333; }
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 15px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #00ff88;
        }
        .error {
            text-align: center;
            padding: 20px;
            background: rgba(255,50,50,0.2);
            border: 2px solid #ff3333;
            border-radius: 5px;
            margin: 20px;
        }
        .spinner {
            border: 4px solid rgba(0,255,136,0.3);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PRESSUREDROP</h1>
        <div class="tagline">Barometric Pressure Monitoring • Real-Time Storm Prediction</div>
    </div>

    <div class="search-container">
        <input type="text" id="locationInput" placeholder="Enter U.S. location (e.g., Miami, FL or Denver, CO)">
        <button id="searchBtn">MONITOR</button>
    </div>

    <div id="dashboard" class="dashboard"></div>

    <div class="info-footer">
        Data from Open-Meteo API • Pressure rate ≥24 mb/24h drop = Bombogenesis threshold
    </div>

    <script>
        let locations = [];
        let charts = {};

        const searchBtn = document.getElementById('searchBtn');
        const locationInput = document.getElementById('locationInput');
        const dashboard = document.getElementById('dashboard');

        locationInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        searchBtn.addEventListener('click', async () => {
            const query = locationInput.value.trim();
            if (!query) return;

            searchBtn.disabled = true;
            searchBtn.textContent = 'SEARCHING...';

            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`);
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    alert('Location not found. Try another search.');
                    return;
                }

                const location = geoData.results[0];
                const locationId = `${location.latitude}_${location.longitude}`;

                if (locations.find(l => l.id === locationId)) {
                    alert('Location already monitored.');
                    return;
                }

                const weatherRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&hourly=surface_pressure,precipitation,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&forecast_days=2`
                );
                const weatherData = await weatherRes.json();

                const newLocation = {
                    id: locationId,
                    name: `${location.name}, ${location.admin1 || location.country}`,
                    lat: location.latitude,
                    lon: location.longitude,
                    data: weatherData
                };

                locations.push(newLocation);
                renderLocation(newLocation);
                locationInput.value = '';

            } catch (error) {
                console.error(error);
                alert('Error fetching data. Please try again.');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'MONITOR';
            }
        });

        function renderLocation(location) {
            const card = document.createElement('div');
            card.className = 'location-card';
            card.id = `card-${location.id}`;

            const hourly = location.data.hourly;
            const pressures = hourly.surface_pressure;
            const times = hourly.time;
            const precip = hourly.precipitation;
            const windSpeed = hourly.wind_speed_10m;

            // Calculate rate of change (mb/hr over next 24 hours)
            const currentPressure = pressures[0];
            const pressure24h = pressures[Math.min(24, pressures.length - 1)];
            const rateChange = ((pressure24h - currentPressure) / 24).toFixed(2);
            const totalDrop24h = (pressure24h - currentPressure).toFixed(1);

            // Determine severity
            let rateClass, severityClass, severityText;
            const absRate = Math.abs(parseFloat(rateChange));
            const totalDropAbs = Math.abs(parseFloat(totalDrop24h));

            if (totalDropAbs >= 24) {
                rateClass = 'rate-severe';
                severityClass = 'severity-severe';
                severityText = `⚠️ BOMBOGENESIS CONDITIONS — Pressure dropping ${totalDrop24h} mb in 24 hours. Rapid intensification likely. Expect severe weather development: damaging winds, heavy precipitation, possible thunderstorms.`;
            } else if (absRate >= 0.5 || totalDropAbs >= 10) {
                rateClass = 'rate-dropping';
                severityClass = 'severity-moderate';
                severityText = `⚡ Significant pressure change detected. ${totalDrop24h} mb drop over 24h. Conditions favor weather system development. Monitor for deteriorating conditions.`;
            } else {
                rateClass = 'rate-stable';
                severityClass = 'severity-stable';
                severityText = `✓ Stable atmospheric conditions. Pressure change minimal (${totalDrop24h} mb/24h). No significant weather development expected.`;
            }

            const currentWind = windSpeed[0].toFixed(1);
            const maxPrecip = Math.max(...precip).toFixed(2);

            card.innerHTML = `
                <div class="card-header">
                    <div class="location-name">${location.name}</div>
                    <button class="remove-btn" onclick="removeLocation('${location.id}')">✕</button>
                </div>
                
                <div class="metrics">
                    <div class="metric ${rateClass}">
                        <div class="metric-label">RATE OF CHANGE</div>
                        <div class="metric-value">${rateChange} mb/hr</div>
                    </div>
                    <div class="metric ${rateClass}">
                        <div class="metric-label">24-HR PRESSURE Δ</div>
                        <div class="metric-value">${totalDrop24h} mb</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">CURRENT PRESSURE</div>
                        <div class="metric-value">${currentPressure.toFixed(1)} mb</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">WIND SPEED</div>
                        <div class="metric-value">${currentWind} mph</div>
                    </div>
                </div>

                <div class="severity-box ${severityClass}">
                    ${severityText}
                </div>

                <div class="chart-container">
                    <canvas id="chart-${location.id}"></canvas>
                </div>

                <div style="font-size: 0.8em; color: #888; text-align: center;">
                    Max precipitation (48h): ${maxPrecip}" • Updated: ${new Date().toLocaleTimeString()}
                </div>
            `;

            dashboard.appendChild(card);

            // Create chart
            const ctx = document.getElementById(`chart-${location.id}`).getContext('2d');
            const labels = times.slice(0, 48).map(t => {
                const d = new Date(t);
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit' });
            });

            charts[location.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Pressure (mb)',
                            data: pressures.slice(0, 48),
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0,255,136,0.1)',
                            yAxisID: 'y',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Wind Speed (mph)',
                            data: windSpeed.slice(0, 48),
                            borderColor: '#ffaa00',
                            backgroundColor: 'rgba(255,170,0,0.1)',
                            yAxisID: 'y1',
                            tension: 0.3
                        },
                        {
                            label: 'Precipitation (in)',
                            data: precip.slice(0, 48),
                            borderColor: '#3399ff',
                            backgroundColor: 'rgba(51,153,255,0.3)',
                            yAxisID: 'y2',
                            type: 'bar'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#eee' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#aaa',
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            ticks: { color: '#00ff88' },
                            grid: { color: 'rgba(0,255,136,0.1)' },
                            title: {
                                display: true,
                                text: 'Pressure (mb)',
                                color: '#00ff88'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            ticks: { color: '#ffaa00' },
                            grid: { drawOnChartArea: false },
                            title: {
                                display: true,
                                text: 'Wind (mph)',
                                color: '#ffaa00'
                            }
                        },
                        y2: {
                            type: 'linear',
                            display: false,
                            position: 'right',
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        function removeLocation(id) {
            locations = locations.filter(l => l.id !== id);
            const card = document.getElementById(`card-${id}`);
            if (card) card.remove();
            if (charts[id]) {
                charts[id].destroy();
                delete charts[id];
            }
        }
    </script>
</body>
</html>
