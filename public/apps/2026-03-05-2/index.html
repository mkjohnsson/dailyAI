<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dayspan — Daily AI Gen</title>
  <meta name="description" content="A side-by-side daylight timeline that maps sunrise-to-sunset windows for multiple cities on a shared 24-hour UTC axis, letting you drag a time needle to discover darkness overlaps and day-length differences across the globe.">
  <meta property="og:title" content="Dayspan — Daily AI Gen">
  <meta property="og:description" content="A side-by-side daylight timeline that maps sunrise-to-sunset windows for multiple cities on a shared 24-hour UTC axis, letting you drag a time needle to discover darkness overlaps and day-length differences across the globe.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-05-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-05-2/">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0e1a;
  color: #e0e6ed;
  padding: 20px;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  color: #ffd700;
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #8b9cb6;
  margin-bottom: 30px;
}

.controls {
  background: #151b2b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 30px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  align-items: center;
}

.date-control {
  display: flex;
  gap: 10px;
  align-items: center;
}

.date-control label {
  color: #8b9cb6;
}

input[type="date"] {
  background: #0a0e1a;
  border: 1px solid #2a3f5f;
  color: #e0e6ed;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
}

.city-selector {
  flex: 1;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.city-btn {
  background: #1e2a3f;
  border: 2px solid #2a3f5f;
  color: #8b9cb6;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
}

.city-btn.active {
  background: #2d5a8f;
  border-color: #4a90e2;
  color: #fff;
}

.city-btn:hover {
  border-color: #4a90e2;
}

.timeline-container {
  position: relative;
  background: #151b2b;
  border-radius: 12px;
  padding: 30px 20px;
  min-height: 400px;
}

.loading {
  text-align: center;
  padding: 60px;
  color: #8b9cb6;
  font-size: 18px;
}

.error {
  text-align: center;
  padding: 40px;
  color: #ff6b6b;
  background: #2a1515;
  border-radius: 8px;
  margin: 20px 0;
}

.utc-axis {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  padding: 0 40px;
  border-bottom: 2px solid #2a3f5f;
  padding-bottom: 10px;
}

.utc-hour {
  font-size: 11px;
  color: #5a6f8f;
  width: 4.166%;
  text-align: center;
}

.city-rows {
  position: relative;
}

.city-row {
  display: flex;
  align-items: center;
  margin-bottom: 25px;
  position: relative;
}

.city-label {
  width: 180px;
  font-weight: 600;
  color: #fff;
  font-size: 15px;
}

.city-info {
  font-size: 11px;
  color: #6a7f9f;
  margin-top: 2px;
}

.timeline-track {
  flex: 1;
  height: 50px;
  background: #0a0e1a;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
}

.darkness-band {
  position: absolute;
  height: 100%;
  background: #1a1f2e;
  border-left: 1px solid #2a3f5f;
  border-right: 1px solid #2a3f5f;
}

.daylight-band {
  position: absolute;
  height: 100%;
  background: linear-gradient(to right, #ffa500, #ffd700, #ffed4e, #ffd700, #ffa500);
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

.twilight-band {
  position: absolute;
  height: 100%;
  background: linear-gradient(90deg, #4a5a7a, #7a8aa0);
}

.time-marker {
  font-size: 10px;
  color: #8b9cb6;
  position: absolute;
  top: -18px;
}

.needle-container {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
  pointer-events: none;
}

.needle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #ff4757;
  box-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
  cursor: ew-resize;
  pointer-events: all;
}

.needle::before {
  content: '';
  position: absolute;
  top: -8px;
  left: -5px;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid #ff4757;
}

.needle-time {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4757;
  color: #fff;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
}

.overlap-info {
  background: #1e2a3f;
  border-radius: 8px;
  padding: 15px;
  margin-top: 20px;
  border-left: 3px solid #4a90e2;
}

.overlap-info h3 {
  color: #4a90e2;
  font-size: 14px;
  margin-bottom: 10px;
}

.overlap-item {
  font-size: 13px;
  color: #8b9cb6;
  margin: 5px 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.stat-card {
  background: #1e2a3f;
  padding: 15px;
  border-radius: 8px;
  border-left: 3px solid #ffd700;
}

.stat-label {
  font-size: 12px;
  color: #8b9cb6;
  margin-bottom: 5px;
}

.stat-value {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
}

.dragging {
  cursor: ew-resize;
}
</style>
</head>
<body>
<div class="container">
  <h1>Dayspan</h1>
  <p class="subtitle">Global daylight timeline explorer</p>
  
  <div class="controls">
    <div class="date-control">
      <label for="date-picker">Date:</label>
      <input type="date" id="date-picker">
    </div>
    <div class="city-selector" id="city-selector"></div>
  </div>

  <div class="timeline-container" id="timeline-container">
    <div class="loading" id="loading">Select cities to begin...</div>
  </div>
</div>

<script>
const CITIES = [
  { name: 'New York', lat: 40.7128, lng: -74.0060, tz: 'EST' },
  { name: 'London', lat: 51.5074, lng: -0.1278, tz: 'GMT' },
  { name: 'Tokyo', lat: 35.6762, lng: 139.6503, tz: 'JST' },
  { name: 'Sydney', lat: -33.8688, lng: 151.2093, tz: 'AEDT' },
  { name: 'Dubai', lat: 25.2048, lng: 55.2708, tz: 'GST' },
  { name: 'Singapore', lat: 1.3521, lng: 103.8198, tz: 'SGT' },
  { name: 'São Paulo', lat: -23.5505, lng: -46.6333, tz: 'BRT' },
  { name: 'Mumbai', lat: 19.0760, lng: 72.8777, tz: 'IST' },
  { name: 'Los Angeles', lat: 34.0522, lng: -118.2437, tz: 'PST' },
  { name: 'Paris', lat: 48.8566, lng: 2.3522, tz: 'CET' },
  { name: 'Reykjavik', lat: 64.1466, lng: -21.9426, tz: 'GMT' },
  { name: 'Bangkok', lat: 13.7563, lng: 100.5018, tz: 'ICT' }
];

let selectedCities = new Set();
let cityData = {};
let currentDate = new Date();
let needlePosition = 0.5; // 0 to 1 representing UTC time
let isDragging = false;

// Initialize
function init() {
  const datePicker = document.getElementById('date-picker');
  datePicker.value = currentDate.toISOString().split('T')[0];
  datePicker.addEventListener('change', (e) => {
    currentDate = new Date(e.target.value + 'T12:00:00');
    if (selectedCities.size > 0) {
      fetchAllCityData();
    }
  });

  // Create city buttons
  const selector = document.getElementById('city-selector');
  CITIES.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'city-btn';
    btn.textContent = city.name;
    btn.onclick = () => toggleCity(city.name, btn);
    selector.appendChild(btn);
  });

  // Set UTC needle to current time
  const now = new Date();
  const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60;
  needlePosition = utcHours / 24;
}

function toggleCity(cityName, btn) {
  if (selectedCities.has(cityName)) {
    selectedCities.delete(cityName);
    btn.classList.remove('active');
  } else {
    selectedCities.add(cityName);
    btn.classList.add('active');
  }

  if (selectedCities.size > 0) {
    fetchAllCityData();
  } else {
    document.getElementById('timeline-container').innerHTML = 
      '<div class="loading">Select cities to begin...</div>';
  }
}

async function fetchAllCityData() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = '<div class="loading">Loading daylight data...</div>';
  
  cityData = {};
  const dateStr = currentDate.toISOString().split('T')[0];

  try {
    const promises = Array.from(selectedCities).map(async cityName => {
      const city = CITIES.find(c => c.name === cityName);
      const url = `https://api.sunrise-sunset.org/json?lat=${city.lat}&lng=${city.lng}&date=${dateStr}&formatted=0`;
      
      const response = await fetch(url);
      if (!response.ok) throw new Error('API request failed');
      
      const data = await response.json();
      if (data.status !== 'OK') throw new Error('API returned error status');
      
      cityData[cityName] = {
        ...city,
        sunrise: new Date(data.results.sunrise),
        sunset: new Date(data.results.sunset),
        civilTwilightBegin: new Date(data.results.civil_twilight_begin),
        civilTwilightEnd: new Date(data.results.civil_twilight_end),
        dayLength: data.results.day_length
      };
    });

    await Promise.all(promises);
    renderTimeline();
  } catch (error) {
    container.innerHTML = `<div class="error">Error loading data: ${error.message}. Please try again.</div>`;
  }
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  
  let html = `
    <div class="utc-axis">
      ${Array.from({length: 25}, (_, i) => 
        `<div class="utc-hour">${i === 24 ? '00' : String(i).padStart(2, '0')}</div>`
      ).join('')}
    </div>
    <div class="city-rows" id="city-rows">
  `;

  Object.values(cityData).forEach(city => {
    const sunriseUTC = city.sunrise.getUTCHours() + city.sunrise.getUTCMinutes() / 60;
    const sunsetUTC = city.sunset.getUTCHours() + city.sunset.getUTCMinutes() / 60;
    const twilightBeginUTC = city.civilTwilightBegin.getUTCHours() + city.civilTwilightBegin.getUTCMinutes() / 60;
    const twilightEndUTC = city.civilTwilightEnd.getUTCHours() + city.civilTwilightEnd.getUTCMinutes() / 60;

    const daylightStart = (sunriseUTC / 24) * 100;
    const daylightWidth = ((sunsetUTC - sunriseUTC) / 24) * 100;
    
    const twilightMorningStart = (twilightBeginUTC / 24) * 100;
    const twilightMorningWidth = ((sunriseUTC - twilightBeginUTC) / 24) * 100;
    
    const twilightEveningStart = (sunsetUTC / 24) * 100;
    const twilightEveningWidth = ((twilightEndUTC - sunsetUTC) / 24) * 100;

    const hours = Math.floor(city.dayLength / 3600);
    const minutes = Math.floor((city.dayLength % 3600) / 60);

    html += `
      <div class="city-row">
        <div class="city-label">
          ${city.name}
          <div class="city-info">${hours}h ${minutes}m daylight</div>
        </div>
        <div class="timeline-track">
          <div class="darkness-band" style="left: 0; width: 100%"></div>
          <div class="twilight-band" style="left: ${twilightMorningStart}%; width: ${twilightMorningWidth}%"></div>
          <div class="daylight-band" style="left: ${daylightStart}%; width: ${daylightWidth}%"></div>
          <div class="twilight-band" style="left: ${twilightEveningStart}%; width: ${twilightEveningWidth}%"></div>
          <div class="time-marker" style="left: ${daylightStart}%">${formatTime(city.sunrise)}</div>
          <div class="time-marker" style="left: ${daylightStart + daylightWidth}%">${formatTime(city.sunset)}</div>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  // Add needle
  const needleLeft = needlePosition * 100;
  const needleTime = new Date();
  needleTime.setUTCHours(Math.floor(needlePosition * 24));
  needleTime.setUTCMinutes((needlePosition * 24 * 60) % 60);
  
  html += `
    <div class="needle-container" id="needle-container">
      <div class="needle" id="needle" style="left: ${needleLeft}%">
        <div class="needle-time">${formatUTCTime(needleTime)}</div>
      </div>
    </div>
  `;

  // Add overlap analysis
  html += renderOverlapAnalysis();

  // Add stats
  html += renderStats();

  container.innerHTML = html;

  // Attach needle drag events
  setupNeedleDrag();
}

function renderOverlapAnalysis() {
  const cities = Object.values(cityData);
  if (cities.length < 2) return '';

  const currentUTCHour = needlePosition * 24;
  const overlaps = [];

  for (let i = 0; i < cities.length; i++) {
    for (let j = i + 1; j < cities.length; j++) {
      const city1 = cities[i];
      const city2 = cities[j];

      const c1Dark = isDark(city1, currentUTCHour);
      const c2Dark = isDark(city2, currentUTCHour);

      if (c1Dark && c2Dark) {
        overlaps.push(`${city1.name} ↔ ${city2.name}: Both in darkness`);
      }
    }
  }

  if (overlaps.length === 0) return '';

  return `
    <div class="overlap-info">
      <h3>Darkness Overlaps at Current Time</h3>
      ${overlaps.map(o => `<div class="overlap-item">🌙 ${o}</div>`).join('')}
    </div>
  `;
}

function renderStats() {
  const cities = Object.values(cityData);
  if (cities.length === 0) return '';

  const dayLengths = cities.map(c => c.dayLength);
  const longest = Math.max(...dayLengths);
  const shortest = Math.min(...dayLengths);
  const longestCity = cities.find(c => c.dayLength === longest);
  const shortestCity = cities.find(c => c.dayLength === shortest);

  const diffSeconds = longest - shortest;
  const diffHours = Math.floor(diffSeconds / 3600);
  const diffMins = Math.floor((diffSeconds % 3600) / 60);

  return `
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Longest Day</div>
        <div class="stat-value">${longestCity.name} (${formatDuration(longest)})</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Shortest Day</div>
        <div class="stat-value">${shortestCity.name} (${formatDuration(shortest)})</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Difference</div>
        <div class="stat-value">${diffHours}h ${diffMins}m</div>
      </div>
    </div>
  `;
}

function isDark(city, utcHour) {
  const sunriseUTC = city.sunrise.getUTCHours() + city.sunrise.getUTCMinutes() / 60;
  const sunsetUTC = city.sunset.getUTCHours() + city.sunset.getUTCMinutes() / 60;
  return utcHour < sunriseUTC || utcHour > sunsetUTC;
}

function setupNeedleDrag() {
  const needle = document.getElementById('needle');
  const container = document.getElementById('needle-container');
  
  needle.addEventListener('mousedown', startDrag);
  container.addEventListener('click', handleContainerClick);
}

function startDrag(e) {
  isDragging = true;
  document.body.classList.add('dragging');
  e.preventDefault();
  
  document.addEventListener('mousemove', drag);
  document.addEventListener('mouseup', stopDrag);
}

function drag(e) {
  if (!isDragging) return;
  
  const container = document.getElementById('needle-container');
  const rect = container.getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
  needlePosition = x / rect.width;
  
  updateNeedlePosition();
}

function stopDrag() {
  isDragging = false;
  document.body.classList.remove('dragging');
  document.removeEventListener('mousemove', drag);
  document.removeEventListener('mouseup', stopDrag);
}

function handleContainerClick(e) {
  if (e.target.id !== 'needle' && e.target.className !== 'needle-time') {
    const container = document.getElementById('needle-container');
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    needlePosition = x / rect.width;
    updateNeedlePosition();
  }
}

function updateNeedlePosition() {
  const needle = document.getElementById('needle');
  const needleLeft = needlePosition * 100;
  needle.style.left = needleLeft + '%';
  
  const needleTime = new Date();
  needleTime.setUTCHours(Math.floor(needlePosition * 24));
  needleTime.setUTCMinutes((needlePosition * 24 * 60) % 60);
  
  needle.querySelector('.needle-time').textContent = formatUTCTime(needleTime);
  
  // Update overlap info
  const overlapContainer = document.querySelector('.overlap-info');
  if (overlapContainer) {
    const newOverlap = renderOverlapAnalysis();
    const parent = overlapContainer.parentElement;
    overlapContainer.remove();
    if (newOverlap) {
      parent.insertAdjacentHTML('beforeend', newOverlap);
    }
  }
}

function formatTime(date) {
  return date.toLocaleTimeString('en-US', { 
    hour: '2-digit', 
    minute: '2-digit',
    hour12: false,
    timeZone: 'UTC'
  });
}

function formatUTCTime(date) {
  return date.toLocaleTimeString('en-US', { 
    hour: '2-digit', 
    minute: '2-digit',
    hour12: false,
    timeZone: 'UTC'
  }) + ' UTC';
}

function formatDuration(seconds) {
  const hours = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  return `${hours}h ${mins}m`;
}

init();
</script>
</body>
</html>
