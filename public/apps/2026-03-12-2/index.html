<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shockrate — Daily AI Gen</title>
  <meta name="description" content="A geopolitical currency impact analyzer that overlays major crisis events on forex timelines to reveal which currencies crashed, recovered, or stayed resilient during global shocks.">
  <meta property="og:title" content="Shockrate — Daily AI Gen">
  <meta property="og:description" content="A geopolitical currency impact analyzer that overlays major crisis events on forex timelines to reveal which currencies crashed, recovered, or stayed resilient during global shocks.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-12-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-12-2/">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: #fff;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.subtitle {
  opacity: 0.9;
  margin-bottom: 30px;
  font-size: 1.1rem;
}

.controls {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
  border: 1px solid rgba(255,255,255,0.2);
}

.input-group {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 100px;
  gap: 15px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
}

input, select {
  background: rgba(255,255,255,0.95);
  color: #1e3c72;
}

input:focus, select:focus {
  outline: 3px solid rgba(255,255,255,0.5);
}

button {
  background: #ff6b6b;
  color: white;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
}

button:hover {
  background: #ee5a52;
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.presets {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
}

.preset-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}

.preset-btn:hover {
  background: rgba(255,255,255,0.3);
  transform: none;
}

.chart-container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 25px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.loading {
  text-align: center;
  padding: 60px;
  font-size: 1.2rem;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  margin-bottom: 25px;
}

.loading::after {
  content: '...';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

.error {
  background: rgba(255,107,107,0.2);
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #ff6b6b;
  margin-bottom: 25px;
}

.events-stack {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
}

.event-tag {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  font-size: 0.9rem;
  border: 2px solid rgba(255,255,255,0.4);
}

.event-color {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.remove-event {
  background: rgba(255,255,255,0.3);
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.analysis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 25px;
}

.analysis-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

.analysis-card h3 {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.8;
  margin-bottom: 10px;
}

.analysis-card .value {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 5px;
}

.analysis-card .verdict {
  font-size: 1rem;
  line-height: 1.5;
  opacity: 0.95;
}

.export-btn {
  background: #4ecdc4;
  margin-top: 10px;
}

.export-btn:hover {
  background: #45b7af;
}

@media (max-width: 768px) {
  .input-group {
    grid-template-columns: 1fr;
  }
  
  h1 {
    font-size: 2rem;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Shockrate</h1>
  <div class="subtitle">Geopolitical event impact on currency exchange rates</div>
  
  <div class="controls">
    <div class="input-group">
      <div>
        <label>Event Name</label>
        <input type="text" id="eventName" placeholder="e.g., Brexit Referendum, Silicon Valley Bank Collapse">
      </div>
      <div>
        <label>Event Date</label>
        <input type="date" id="eventDate">
      </div>
      <div>
        <label>Base Currency</label>
        <select id="baseCurrency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="CHF">CHF</option>
          <option value="AUD">AUD</option>
          <option value="CAD">CAD</option>
          <option value="TRY">TRY</option>
          <option value="RUB">RUB</option>
          <option value="CNY">CNY</option>
          <option value="INR">INR</option>
          <option value="BRL">BRL</option>
        </select>
      </div>
      <div>
        <label>Target</label>
        <select id="targetCurrency">
          <option value="EUR">EUR</option>
          <option value="USD">USD</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="CHF">CHF</option>
          <option value="AUD">AUD</option>
          <option value="CAD">CAD</option>
          <option value="TRY">TRY</option>
          <option value="RUB">RUB</option>
          <option value="CNY">CNY</option>
          <option value="INR">INR</option>
          <option value="BRL">BRL</option>
        </select>
      </div>
    </div>
    
    <button id="analyzeBtn">Analyze Event</button>
    
    <div class="presets">
      <button class="preset-btn" data-event="Brexit Referendum" data-date="2016-06-23" data-base="GBP" data-target="USD">Brexit 2016</button>
      <button class="preset-btn" data-event="COVID-19 WHO Declares Pandemic" data-date="2020-03-11" data-base="USD" data-target="EUR">COVID-19 2020</button>
      <button class="preset-btn" data-event="Russia Ukraine Invasion" data-date="2022-02-24" data-base="RUB" data-target="USD">Ukraine 2022</button>
      <button class="preset-btn" data-event="Silicon Valley Bank Collapse" data-date="2023-03-10" data-base="USD" data-target="CHF">SVB 2023</button>
      <button class="preset-btn" data-event="Trump Election Victory" data-date="2016-11-08" data-base="USD" data-target="EUR">Trump 2016</button>
    </div>
    
    <div class="events-stack" id="eventsStack"></div>
  </div>
  
  <div id="loadingState" class="loading" style="display: none;">
    Fetching exchange rate data
  </div>
  
  <div id="errorState" class="error" style="display: none;"></div>
  
  <div class="chart-container" id="chartContainer" style="display: none;">
    <canvas id="rateChart"></canvas>
  </div>
  
  <div class="analysis" id="analysisContainer"></div>
  
  <button class="export-btn" id="exportBtn" style="display: none;">📊 Export Summary Card</button>
</div>

<script>
const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#6c5ce7', '#fd79a8', '#fdcb6e', '#e17055'];
let chart = null;
let events = [];
let colorIndex = 0;

// Set default date to today
document.getElementById('eventDate').valueAsDate = new Date();

// Preset buttons
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('eventName').value = btn.dataset.event;
    document.getElementById('eventDate').value = btn.dataset.date;
    document.getElementById('baseCurrency').value = btn.dataset.base;
    document.getElementById('targetCurrency').value = btn.dataset.target;
  });
});

// Analyze button
document.getElementById('analyzeBtn').addEventListener('click', analyzeEvent);

function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function addDays(date, days) {
  const result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

async function analyzeEvent() {
  const eventName = document.getElementById('eventName').value.trim();
  const eventDate = document.getElementById('eventDate').value;
  const baseCurrency = document.getElementById('baseCurrency').value;
  const targetCurrency = document.getElementById('targetCurrency').value;
  
  if (!eventName || !eventDate) {
    showError('Please enter an event name and date');
    return;
  }
  
  if (baseCurrency === targetCurrency) {
    showError('Base and target currencies must be different');
    return;
  }
  
  // Check if this exact event already exists
  if (events.some(e => e.name === eventName && e.date === eventDate && e.base === baseCurrency && e.target === targetCurrency)) {
    showError('This event is already on the chart');
    return;
  }
  
  showLoading();
  hideError();
  
  try {
    const eventDateObj = new Date(eventDate);
    const startDate = addDays(eventDateObj, -30);
    const endDate = addDays(eventDateObj, 30);
    
    const url = `https://api.frankfurter.app/${formatDate(startDate)}..${formatDate(endDate)}?from=${baseCurrency}&to=${targetCurrency}`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error('Failed to fetch exchange rate data');
    
    const data = await response.json();
    
    // Transform data
    const dates = Object.keys(data.rates).sort();
    const rates = dates.map(date => data.rates[date][targetCurrency]);
    
    if (rates.length === 0) {
      throw new Error('No data available for this date range');
    }
    
    // Calculate metrics
    const eventIndex = dates.findIndex(d => d === eventDate);
    const preEventRates = rates.slice(0, eventIndex);
    const postEventRates = rates.slice(eventIndex);
    
    const preEventAvg = preEventRates.reduce((a, b) => a + b, 0) / preEventRates.length;
    const preEventStdDev = Math.sqrt(preEventRates.reduce((sum, rate) => sum + Math.pow(rate - preEventAvg, 2), 0) / preEventRates.length);
    const stability = (preEventStdDev / preEventAvg * 100).toFixed(2);
    
    const eventRate = rates[eventIndex];
    const maxDeviation = Math.max(...postEventRates.slice(0, 10).map(r => Math.abs(r - eventRate)));
    const peakDeviation = ((maxDeviation / eventRate) * 100).toFixed(2);
    
    const recoveryThreshold = eventRate * 0.99;
    const recoveryIndex = postEventRates.findIndex((r, i) => i > 5 && Math.abs(r - eventRate) < Math.abs(eventRate * 0.01));
    const recoveryTime = recoveryIndex > 0 ? recoveryIndex : 'N/A';
    
    const dayFiveRate = postEventRates[Math.min(5, postEventRates.length - 1)];
    const dayFiveChange = (((dayFiveRate - eventRate) / eventRate) * 100).toFixed(2);
    
    let verdict = `${baseCurrency} ${dayFiveChange > 0 ? 'gained' : 'lost'} ${Math.abs(dayFiveChange)}% against ${targetCurrency} in 5 days post-event`;
    if (recoveryTime === 'N/A') {
      verdict += ' and has not recovered to pre-event levels.';
    } else {
      verdict += ` and recovered in ${recoveryTime} days.`;
    }
    
    const eventColor = colors[colorIndex % colors.length];
    colorIndex++;
    
    const eventData = {
      name: eventName,
      date: eventDate,
      base: baseCurrency,
      target: targetCurrency,
      dates,
      rates,
      color: eventColor,
      metrics: {
        stability,
        peakDeviation,
        recoveryTime,
        dayFiveChange,
        verdict
      }
    };
    
    events.push(eventData);
    updateChart();
    updateEventTags();
    updateAnalysis();
    hideLoading();
    
    document.getElementById('exportBtn').style.display = 'block';
    
  } catch (error) {
    hideLoading();
    showError(error.message);
  }
}

function updateChart() {
  const ctx = document.getElementById('rateChart');
  document.getElementById('chartContainer').style.display = 'block';
  
  if (chart) {
    chart.destroy();
  }
  
  const datasets = events.map(event => ({
    label: `${event.base}/${event.target} - ${event.name}`,
    data: event.dates.map((date, i) => ({ x: date, y: event.rates[i] })),
    borderColor: event.color,
    backgroundColor: event.color + '33',
    borderWidth: 2,
    pointRadius: 1,
    pointHoverRadius: 5,
    tension: 0.1
  }));
  
  const annotations = {};
  events.forEach((event, i) => {
    annotations[`event${i}`] = {
      type: 'line',
      xMin: event.date,
      xMax: event.date,
      borderColor: event.color,
      borderWidth: 2,
      borderDash: [5, 5],
      label: {
        display: true,
        content: event.name,
        position: 'start',
        backgroundColor: event.color,
        color: 'white',
        font: { size: 10 }
      }
    };
  });
  
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2.5,
      plugins: {
        legend: {
          display: true,
          position: 'top'
        },
        annotation: {
          annotations
        },
        tooltip: {
          mode: 'index',
          intersect: false
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'day',
            displayFormats: { day: 'MMM d' }
          },
          title: { display: true, text: 'Date', color: '#666' }
        },
        y: {
          title: { display: true, text: 'Exchange Rate', color: '#666' },
          ticks: { color: '#666' }
        }
      }
    }
  });
}

function updateEventTags() {
  const container = document.getElementById('eventsStack');
  container.innerHTML = events.map((event, i) => `
    <div class="event-tag">
      <div class="event-color" style="background: ${event.color}"></div>
      <span>${event.name}</span>
      <button class="remove-event" onclick="removeEvent(${i})">×</button>
    </div>
  `).join('');
}

function removeEvent(index) {
  events.splice(index, 1);
  if (events.length === 0) {
    document.getElementById('chartContainer').style.display = 'none';
    document.getElementById('analysisContainer').innerHTML = '';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('eventsStack').innerHTML = '';
  } else {
    updateChart();
    updateEventTags();
    updateAnalysis();
  }
}

function updateAnalysis() {
  const container = document.getElementById('analysisContainer');
  container.innerHTML = events.map(event => `
    <div class="analysis-card" style="border-left: 4px solid ${event.color}">
      <h3>${event.name} (${event.date})</h3>
      <h4 style="margin: 10px 0; opacity: 0.9;">${event.base} → ${event.target}</h4>
      <div style="margin: 15px 0;">
        <div style="font-size: 0.85rem; opacity: 0.7;">Pre-event Volatility</div>
        <div class="value">${event.metrics.stability}%</div>
      </div>
      <div style="margin: 15px 0;">
        <div style="font-size: 0.85rem; opacity: 0.7;">Peak Deviation</div>
        <div class="value">${event.metrics.peakDeviation}%</div>
      </div>
      <div style="margin: 15px 0;">
        <div style="font-size: 0.85rem; opacity: 0.7;">Recovery Time</div>
        <div class="value">${event.metrics.recoveryTime} days</div>
      </div>
      <div class="verdict">${event.metrics.verdict}</div>
    </div>
  `).join('');
}

function showLoading() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
}

function hideLoading() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = false;
}

function showError(message) {
  const errorEl = document.getElementById('errorState');
  errorEl.textContent = '⚠️ ' + message;
  errorEl.style.display = 'block';
}

function hideError() {
  document.getElementById('errorState').style.display = 'none';
}

document.getElementById('exportBtn').addEventListener('click', () => {
  let summary = 'SHOCKRATE ANALYSIS SUMMARY\n';
  summary += '='.repeat(50) + '\n\n';
  
  events.forEach(event => {
    summary += `📍 ${event.name} (${event.date})\n`;
    summary += `   ${event.base} → ${event.target}\n`;
    summary += `   Pre-event Volatility: ${event.metrics.stability}%\n`;
    summary += `   Peak Deviation: ${event.metrics.peakDeviation}%\n`;
    summary += `   Recovery Time: ${event.metrics.recoveryTime} days\n`;
    summary += `   ${event.metrics.verdict}\n\n`;
  });
  
  summary += '\nGenerated by Shockrate\n';
  
  const blob = new Blob([summary], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shockrate-summary.txt';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
