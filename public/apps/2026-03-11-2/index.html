<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threatcast — Daily AI Gen</title>
  <meta name="description" content="Enter any U.S. city to see a 7-day hourly weather threat heatmap with danger scores, daily verdicts, and a draggable trip window to check if your travel time hits hazardous conditions.">
  <meta property="og:title" content="Threatcast — Daily AI Gen">
  <meta property="og:description" content="Enter any U.S. city to see a 7-day hourly weather threat heatmap with danger scores, daily verdicts, and a draggable trip window to check if your travel time hits hazardous conditions.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-11-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-11-2/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.9;
            font-size: 1.1em;
        }
        .input-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            background: #ff6b6b;
            color: white;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #ff5252;
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255,107,107,0.2);
            border: 2px solid #ff6b6b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .results {
            display: none;
        }
        .results.active {
            display: block;
        }
        .location-info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: bold;
        }
        .trip-window-control {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .trip-status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 10px;
        }
        .trip-safe { background: rgba(76,175,80,0.3); border: 2px solid #4caf50; }
        .trip-caution { background: rgba(255,193,7,0.3); border: 2px solid #ffc107; }
        .trip-danger { background: rgba(244,67,54,0.3); border: 2px solid #f44336; }
        .day-block {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .day-title {
            font-size: 1.4em;
            font-weight: bold;
        }
        .verdict {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .verdict-safe { background: #4caf50; }
        .verdict-caution { background: #ffc107; color: #000; }
        .verdict-danger { background: #f44336; }
        .heatmap {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 2px;
            margin-bottom: 15px;
            position: relative;
        }
        .hour-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }
        .hour-cell:hover {
            transform: scale(1.2);
            z-index: 10;
        }
        .threat-0 { background: #4caf50; }
        .threat-1 { background: #8bc34a; }
        .threat-2 { background: #cddc39; }
        .threat-3 { background: #ffeb3b; }
        .threat-4 { background: #ffc107; }
        .threat-5 { background: #ff9800; }
        .threat-6 { background: #ff5722; }
        .threat-7 { background: #f44336; }
        .threat-8 { background: #e91e63; }
        .threat-9 { background: #9c27b0; }
        .threat-10 { background: #6a1b9a; }
        .hour-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 2px;
            font-size: 0.7em;
            margin-bottom: 5px;
            text-align: center;
        }
        .hazards {
            font-size: 0.9em;
            line-height: 1.6;
            opacity: 0.95;
        }
        .tooltip {
            position: fixed;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
            pointer-events: none;
            z-index: 1000;
            display: none;
            max-width: 200px;
        }
        .trip-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            border-radius: 3px;
            pointer-events: none;
        }
        .legend {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Threatcast</h1>
        <div class="subtitle">7-Day Weather Threat Timeline</div>
        
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="cityInput" placeholder="Enter U.S. city (e.g., Denver, CO)" value="Miami, FL">
                <button id="fetchBtn">Analyze Threats</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <div>Fetching weather threat data...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="results" class="results">
            <div class="location-info" id="locationInfo"></div>

            <div class="trip-window-control">
                <div style="margin-bottom: 10px; font-weight: bold;">Trip Window Planner</div>
                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <label>
                        Start Day: 
                        <select id="tripDay" style="margin-left: 5px; padding: 5px; border-radius: 4px; border: none;"></select>
                    </label>
                    <label>
                        Start Hour: 
                        <input type="number" id="tripStartHour" min="0" max="23" value="8" style="width: 60px; padding: 5px; border-radius: 4px; border: none;">
                    </label>
                    <label>
                        Duration (hours): 
                        <input type="number" id="tripDuration" min="1" max="24" value="4" style="width: 60px; padding: 5px; border-radius: 4px; border: none;">
                    </label>
                    <button id="applyTrip" style="background: #4caf50;">Apply</button>
                </div>
                <div id="tripStatus" class="trip-status" style="display: none;"></div>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="legend-color threat-0"></div>Safe</div>
                <div class="legend-item"><div class="legend-color threat-3"></div>Minor</div>
                <div class="legend-item"><div class="legend-color threat-5"></div>Moderate</div>
                <div class="legend-item"><div class="legend-color threat-7"></div>Serious</div>
                <div class="legend-item"><div class="legend-color threat-10"></div>Extreme</div>
            </div>

            <div id="timeline"></div>
        </div>

        <div class="tooltip" id="tooltip"></div>
    </div>

    <script>
        let weatherData = null;
        let tripWindow = null;

        const cityInput = document.getElementById('cityInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const locationInfo = document.getElementById('locationInfo');
        const timeline = document.getElementById('timeline');
        const tooltip = document.getElementById('tooltip');

        fetchBtn.addEventListener('click', fetchWeatherData);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchWeatherData();
        });

        document.getElementById('applyTrip').addEventListener('click', applyTripWindow);

        async function fetchWeatherData() {
            const city = cityInput.value.trim();
            if (!city) return;

            loading.style.display = 'block';
            error.style.display = 'none';
            results.classList.remove('active');
            fetchBtn.disabled = true;

            try {
                // Geocode city
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoRes.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error('City not found. Try "City, State" format.');
                }

                const location = geoData.results[0];
                const { latitude, longitude, name, admin1 } = location;

                // Fetch weather data
                const weatherRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=temperature_2m,precipitation,rain,showers,snowfall,weather_code,wind_speed_10m,wind_gusts_10m,visibility&forecast_days=7&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`
                );
                weatherData = await weatherRes.json();

                displayResults(name, admin1, latitude, longitude);
                
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                fetchBtn.disabled = false;
            }
        }

        function calculateThreatScore(hour) {
            let score = 0;
            const i = hour;

            // Wind gusts (0-5 points)
            const gusts = weatherData.hourly.wind_gusts_10m[i] || 0;
            if (gusts > 60) score += 5;
            else if (gusts > 45) score += 4;
            else if (gusts > 35) score += 3;
            else if (gusts > 25) score += 2;
            else if (gusts > 15) score += 1;

            // Precipitation intensity (0-3 points)
            const precip = (weatherData.hourly.precipitation[i] || 0) + 
                          (weatherData.hourly.rain[i] || 0) + 
                          (weatherData.hourly.showers[i] || 0);
            if (precip > 0.3) score += 3;
            else if (precip > 0.15) score += 2;
            else if (precip > 0.05) score += 1;

            // Snow (0-2 points)
            const snow = weatherData.hourly.snowfall[i] || 0;
            if (snow > 0.2) score += 2;
            else if (snow > 0) score += 1;

            // Thunderstorm codes (0-3 points)
            const code = weatherData.hourly.weather_code[i];
            if ([95, 96, 99].includes(code)) score += 3; // Thunderstorm
            else if ([80, 81, 82].includes(code)) score += 2; // Rain showers
            else if ([85, 86].includes(code)) score += 2; // Snow showers

            // Visibility (0-2 points)
            const vis = weatherData.hourly.visibility[i] || 24000;
            if (vis < 1000) score += 2;
            else if (vis < 5000) score += 1;

            return Math.min(score, 10);
        }

        function getHazards(dayStart, dayEnd) {
            const hazards = [];
            const maxGusts = Math.max(...weatherData.hourly.wind_gusts_10m.slice(dayStart, dayEnd));
            const totalPrecip = weatherData.hourly.precipitation.slice(dayStart, dayEnd)
                .reduce((a, b) => (a || 0) + (b || 0), 0);
            const hasThunderstorm = weatherData.hourly.weather_code.slice(dayStart, dayEnd)
                .some(c => [95, 96, 99].includes(c));
            const minVis = Math.min(...weatherData.hourly.visibility.slice(dayStart, dayEnd));

            if (maxGusts > 35) {
                const peakHour = weatherData.hourly.wind_gusts_10m.slice(dayStart, dayEnd)
                    .indexOf(maxGusts);
                hazards.push(`${Math.round(maxGusts)}mph gusts at ${peakHour}:00`);
            }
            if (totalPrecip > 0.5) {
                hazards.push(`${totalPrecip.toFixed(2)}" total precipitation`);
            }
            if (hasThunderstorm) {
                hazards.push('Thunderstorms expected');
            }
            if (minVis < 5000) {
                hazards.push(`Low visibility ${Math.round(minVis / 1000)}km`);
            }

            return hazards;
        }

        function getVerdict(maxScore) {
            if (maxScore <= 2) return { text: 'Safe to travel', class: 'verdict-safe' };
            if (maxScore <= 5) return { text: 'Delay if possible', class: 'verdict-caution' };
            return { text: 'Shelter recommended', class: 'verdict-danger' };
        }

        function displayResults(name, admin1, lat, lon) {
            locationInfo.textContent = `${name}, ${admin1} (${lat.toFixed(2)}°, ${lon.toFixed(2)}°)`;

            // Populate trip day selector
            const tripDaySelect = document.getElementById('tripDay');
            tripDaySelect.innerHTML = '';
            for (let d = 0; d < 7; d++) {
                const date = new Date(weatherData.hourly.time[d * 24]);
                const option = document.createElement('option');
                option.value = d;
                option.textContent = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                tripDaySelect.appendChild(option);
            }

            timeline.innerHTML = '';

            for (let day = 0; day < 7; day++) {
                const dayStart = day * 24;
                const dayEnd = dayStart + 24;
                const date = new Date(weatherData.hourly.time[dayStart]);

                const dayScores = [];
                for (let h = dayStart; h < dayEnd; h++) {
                    dayScores.push(calculateThreatScore(h));
                }
                const maxScore = Math.max(...dayScores);
                const verdict = getVerdict(maxScore);
                const hazards = getHazards(dayStart, dayEnd);

                const dayBlock = document.createElement('div');
                dayBlock.className = 'day-block';

                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerHTML = `
                    <div class="day-title">${date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</div>
                    <div class="verdict ${verdict.class}">${verdict.text}</div>
                `;

                const hourLabels = document.createElement('div');
                hourLabels.className = 'hour-labels';
                for (let h = 0; h < 24; h++) {
                    const label = document.createElement('div');
                    label.textContent = h % 3 === 0 ? h : '';
                    hourLabels.appendChild(label);
                }

                const heatmap = document.createElement('div');
                heatmap.className = 'heatmap';
                heatmap.dataset.day = day;

                for (let h = 0; h < 24; h++) {
                    const cell = document.createElement('div');
                    const score = dayScores[h];
                    cell.className = `hour-cell threat-${score}`;
                    cell.dataset.hour = h;
                    cell.dataset.globalHour = dayStart + h;
                    cell.dataset.score = score;

                    cell.addEventListener('mouseenter', (e) => showTooltip(e, dayStart + h));
                    cell.addEventListener('mouseleave', hideTooltip);

                    heatmap.appendChild(cell);
                }

                const hazardsList = document.createElement('div');
                hazardsList.className = 'hazards';
                hazardsList.innerHTML = hazards.length > 0 
                    ? `<strong>Hazards:</strong> ${hazards.join(' • ')}`
                    : '<strong>No significant hazards</strong>';

                dayBlock.appendChild(header);
                dayBlock.appendChild(hourLabels);
                dayBlock.appendChild(heatmap);
                dayBlock.appendChild(hazardsList);
                timeline.appendChild(dayBlock);
            }

            results.classList.add('active');
        }

        function showTooltip(e, globalHour) {
            const temp = weatherData.hourly.temperature_2m[globalHour];
            const precip = weatherData.hourly.precipitation[globalHour];
            const gusts = weatherData.hourly.wind_gusts_10m[globalHour];
            const vis = weatherData.hourly.visibility[globalHour];
            const score = calculateThreatScore(globalHour);
            const time = new Date(weatherData.hourly.time[globalHour]);

            tooltip.innerHTML = `
                <strong>${time.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true })}</strong><br>
                Threat: ${score}/10<br>
                Temp: ${Math.round(temp)}°F<br>
                Precip: ${precip?.toFixed(2) || 0}"<br>
                Gusts: ${Math.round(gusts)}mph<br>
                Vis: ${Math.round(vis / 1000)}km
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        function applyTripWindow() {
            const day = parseInt(document.getElementById('tripDay').value);
            const startHour = parseInt(document.getElementById('tripStartHour').value);
            const duration = parseInt(document.getElementById('tripDuration').value);

            // Remove existing overlays
            document.querySelectorAll('.trip-overlay').forEach(el => el.remove());

            tripWindow = { day, startHour, duration };

            const totalHours = day * 24 + startHour;
            const endTotalHours = totalHours + duration;

            // Draw overlay on affected days
            for (let d = 0; d < 7; d++) {
                const dayStart = d * 24;
                const dayEnd = dayStart + 24;
                
                if (endTotalHours <= dayStart || totalHours >= dayEnd) continue;

                const heatmap = document.querySelector(`.heatmap[data-day="${d}"]`);
                const startInDay = Math.max(0, totalHours - dayStart);
                const endInDay = Math.min(24, endTotalHours - dayStart);
                
                const overlay = document.createElement('div');
                overlay.className = 'trip-overlay';
                overlay.style.left = `${(startInDay / 24) * 100}%`;
                overlay.style.width = `${((endInDay - startInDay) / 24) * 100}%`;
                heatmap.appendChild(overlay);
            }

            // Calculate max threat in window
            let maxThreat = 0;
            for (let h = totalHours; h < endTotalHours && h < weatherData.hourly.time.length; h++) {
                maxThreat = Math.max(maxThreat, calculateThreatScore(h));
            }

            const statusDiv = document.getElementById('tripStatus');
            statusDiv.style.display = 'block';
            
            if (maxThreat <= 2) {
                statusDiv.className = 'trip-status trip-safe';
                statusDiv.textContent = '✓ Trip window looks safe!';
            } else if (maxThreat <= 5) {
                statusDiv.className = 'trip-status trip-caution';
                statusDiv.textContent = '⚠ Moderate threats during trip window';
            } else {
                statusDiv.className = 'trip-status trip-danger';
                statusDiv.textContent = '⛔ Dangerous conditions in trip window';
            }
        }
    </script>
</body>
</html>
