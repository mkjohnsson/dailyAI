<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branchfold — Daily AI Gen</title>
  <meta name="description" content="A living city simulator where infrastructure branches like neurons, and you must prevent cascade failures by rotating junctions and pruning overlapping utility lines as population grows.">
  <meta property="og:title" content="Branchfold — Daily AI Gen">
  <meta property="og:description" content="A living city simulator where infrastructure branches like neurons, and you must prevent cascade failures by rotating junctions and pruning overlapping utility lines as population grows.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-02-28-4/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-02-28-4/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff88;
            overflow: hidden;
            cursor: crosshair;
        }
        #canvas {
            display: block;
            background: #050505;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        .warning {
            color: #ff4444;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border: 1px solid #00ff88;
        }
        .btn {
            background: #001a0f;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 12px;
            margin: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
        }
        .btn:hover {
            background: #003322;
        }
        .stat {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="hud">
        <div>BRANCHFOLD v1.2</div>
        <div>━━━━━━━━━━━━━━━</div>
        <div class="stat">POP: <span id="pop">100</span></div>
        <div class="stat">DISTRICTS: <span id="districts">1</span></div>
        <div class="stat">FAILURES: <span id="failures">0</span></div>
        <div id="alert"></div>
    </div>
    <div id="controls">
        <div>LEFT-CLICK: Rotate Junction | RIGHT-CLICK: Prune Branch</div>
        <div style="margin-top:8px;">
            <button class="btn" onclick="game.addDistrict()">EXPAND CITY</button>
            <button class="btn" onclick="game.upgradeTech()">UPGRADE TECH</button>
            <button class="btn" id="pause" onclick="game.togglePause()">PAUSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Branch {
            constructor(x, y, angle, depth, type, parentNode) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.depth = depth;
                this.type = type; // 'power', 'water', 'transit'
                this.length = 40 - depth * 3;
                this.endX = x + Math.cos(angle) * this.length;
                this.endY = y + Math.sin(angle) * this.length;
                this.children = [];
                this.active = true;
                this.flow = 1;
                this.parentNode = parentNode;
                this.failing = false;
            }

            getColor() {
                if (this.failing) return '#ff0000';
                const colors = {
                    power: '#ffff00',
                    water: '#00aaff',
                    transit: '#ff00ff'
                };
                const alpha = this.active ? this.flow : 0.2;
                return colors[this.type] + Math.floor(alpha * 255).toString(16).padStart(2, '0');
            }

            draw() {
                ctx.strokeStyle = this.getColor();
                ctx.lineWidth = Math.max(1, 4 - this.depth);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();

                if (this.failing) {
                    ctx.fillStyle = '#ff000044';
                    ctx.beginPath();
                    ctx.arc(this.endX, this.endY, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Node {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.rotation = 0;
                this.branches = [];
                this.population = 0;
                this.district = null;
            }

            rotate(delta) {
                this.rotation += delta;
                this.updateBranches();
            }

            updateBranches() {
                const branchCount = 2 + Math.floor(Math.random() * 2);
                this.branches = [];
                
                for (let i = 0; i < branchCount; i++) {
                    const angle = this.rotation + (Math.PI * 2 / branchCount) * i;
                    this.growBranch(this.x, this.y, angle, 0);
                }
            }

            growBranch(x, y, angle, depth) {
                if (depth > 4) return;
                
                const branch = new Branch(x, y, angle, depth, this.type, this);
                this.branches.push(branch);

                if (depth < 3 && Math.random() > 0.3) {
                    const splits = Math.random() > 0.5 ? 2 : 1;
                    for (let i = 0; i < splits; i++) {
                        const newAngle = angle + (Math.random() - 0.5) * Math.PI / 2;
                        this.growBranch(branch.endX, branch.endY, newAngle, depth + 1);
                    }
                }
            }

            draw() {
                ctx.fillStyle = this.getColor();
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.stroke();

                this.branches.forEach(b => b.draw());
            }

            getColor() {
                const colors = {
                    power: '#ffff0088',
                    water: '#00aaff88',
                    transit: '#ff00ff88'
                };
                return colors[this.type];
            }

            getAllBranches() {
                return this.branches;
            }
        }

        class District {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.population = 100;
                this.nodes = [];
                this.types = ['power', 'water', 'transit'];
                
                this.types.forEach((type, i) => {
                    const angle = (Math.PI * 2 / 3) * i;
                    const nx = x + Math.cos(angle) * 60;
                    const ny = y + Math.sin(angle) * 60;
                    const node = new Node(nx, ny, type);
                    node.district = this;
                    node.updateBranches();
                    this.nodes.push(node);
                });
            }

            update() {
                this.population += Math.random() * 2;
            }

            draw() {
                ctx.strokeStyle = '#00ff8822';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 80, 0, Math.PI * 2);
                ctx.stroke();

                this.nodes.forEach(n => n.draw());
            }
        }

        const game = {
            districts: [],
            population: 100,
            failures: 0,
            time: 0,
            paused: false,
            techLevel: 1,
            weather: 'clear',
            
            init() {
                this.addDistrict();
                this.loop();
            },

            addDistrict() {
                const angle = Math.random() * Math.PI * 2;
                const distance = 200 + this.districts.length * 150;
                const x = canvas.width / 2 + Math.cos(angle) * distance;
                const y = canvas.height / 2 + Math.sin(angle) * distance;
                
                const district = new District(
                    Math.max(150, Math.min(canvas.width - 150, x)),
                    Math.max(150, Math.min(canvas.height - 150, y))
                );
                this.districts.push(district);
            },

            upgradeTech() {
                if (this.population < this.techLevel * 500) {
                    this.showAlert('Need more population!');
                    return;
                }
                this.techLevel++;
                this.districts.forEach(d => {
                    d.nodes.forEach(n => {
                        if (Math.random() > 0.5) {
                            n.updateBranches();
                        }
                    });
                });
                this.showAlert(`Tech Level ${this.techLevel} unlocked!`);
            },

            togglePause() {
                this.paused = !this.paused;
                document.getElementById('pause').textContent = this.paused ? 'RESUME' : 'PAUSE';
            },

            showAlert(msg) {
                const el = document.getElementById('alert');
                el.textContent = msg;
                el.className = 'warning';
                setTimeout(() => el.textContent = '', 2000);
            },

            checkCollisions() {
                const allBranches = [];
                this.districts.forEach(d => {
                    d.nodes.forEach(n => {
                        allBranches.push(...n.getAllBranches().map(b => ({branch: b, node: n})));
                    });
                });

                let failures = 0;
                allBranches.forEach(({branch: b1, node: n1}) => {
                    b1.failing = false;
                });

                for (let i = 0; i < allBranches.length; i++) {
                    for (let j = i + 1; j < allBranches.length; j++) {
                        const {branch: b1, node: n1} = allBranches[i];
                        const {branch: b2, node: n2} = allBranches[j];
                        
                        if (b1.type === b2.type || n1 === n2) continue;

                        const dx = b1.endX - b2.endX;
                        const dy = b1.endY - b2.endY;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 15) {
                            b1.failing = true;
                            b2.failing = true;
                            b1.flow *= 0.95;
                            b2.flow *= 0.95;
                            failures++;
                        }
                    }
                }

                this.failures = failures;
            },

            update() {
                if (this.paused) return;

                this.time++;
                
                // Population growth
                this.population = 0;
                this.districts.forEach(d => {
                    d.update();
                    this.population += d.population;
                });

                // Weather changes
                if (this.time % 300 === 0) {
                    const weathers = ['clear', 'storm', 'heatwave'];
                    this.weather = weathers[Math.floor(Math.random() * weathers.length)];
                    if (this.weather !== 'clear') {
                        this.showAlert(`Weather: ${this.weather.toUpperCase()}`);
                    }
                }

                // Random migration
                if (this.time % 100 === 0 && this.districts.length > 1) {
                    const from = this.districts[Math.floor(Math.random() * this.districts.length)];
                    const to = this.districts[Math.floor(Math.random() * this.districts.length)];
                    if (from !== to) {
                        const amount = from.population * 0.1;
                        from.population -= amount;
                        to.population += amount;
                    }
                }

                // Auto-expand
                if (this.population > this.districts.length * 800) {
                    this.addDistrict();
                    this.showAlert('New district founded!');
                }

                this.checkCollisions();
            },

            draw() {
                ctx.fillStyle = '#050505';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                this.districts.forEach(d => d.draw());

                // Update HUD
                document.getElementById('pop').textContent = Math.floor(this.population);
                document.getElementById('districts').textContent = this.districts.length;
                document.getElementById('failures').textContent = this.failures;
            },

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            },

            handleClick(x, y, rightClick) {
                let closest = null;
                let minDist = Infinity;

                this.districts.forEach(d => {
                    d.nodes.forEach(n => {
                        const dx = x - n.x;
                        const dy = y - n.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < minDist && dist < 40) {
                            minDist = dist;
                            closest = n;
                        }
                    });
                });

                if (closest) {
                    if (rightClick) {
                        // Prune: reduce branches
                        if (closest.branches.length > 3) {
                            closest.branches = closest.branches.slice(0, -2);
                        }
                    } else {
                        // Rotate
                        closest.rotate(Math.PI / 4);
                    }
                }
            }
        };

        canvas.addEventListener('click', (e) => {
            game.handleClick(e.clientX, e.clientY, false);
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            game.handleClick(e.clientX, e.clientY, true);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        game.init();
    </script>
</body>
</html>
