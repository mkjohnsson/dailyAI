<!DOCTYPE html>

<head>

<title>Coralith — Daily AI Gen</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Courier New', monospace;
    background: #000814;
    color: #ffc8dd;
    overflow: hidden;
    position: relative;
  }
  
  #canvas {
    display: block;
    background: radial-gradient(ellipse at center, #001d3d 0%, #000814 100%);
  }
  
  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 8, 20, 0.85);
    padding: 20px;
    border: 2px solid #3a506b;
    border-radius: 8px;
    width: 280px;
    backdrop-filter: blur(10px);
  }
  
  h1 {
    font-size: 24px;
    margin-bottom: 5px;
    color: #ffc8dd;
  }
  
  .subtitle {
    font-size: 11px;
    color: #6c757d;
    margin-bottom: 15px;
  }
  
  .control-group {
    margin-bottom: 15px;
  }
  
  label {
    display: block;
    font-size: 12px;
    margin-bottom: 5px;
    color: #a8dadc;
  }
  
  input[type="range"] {
    width: 100%;
    height: 6px;
    background: #1d3557;
    outline: none;
    border-radius: 3px;

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;

  }
  
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: #ffc8dd;
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }
  
  .value {
    display: inline-block;
    float: right;

  button {
    width: 100%;

    background: #1d3557;
    color: #ffc8dd;

    font-family: 'Courier New', monospace;

  #stats {

  #slice-control {

    background: rgba(0, 8, 20, 0.85);

  }
  
  #slice-control h3 {

<body>
<canvas id="canvas"></canvas>

<div id="controls">
  <h1>CORALITH</h1>
  <div class="subtitle">Nurture the living reef</div>
  
  <div class="control-group">
    <label>Temperature <span class="value" id="temp-val">24°C</span></label>
    <input type="range" id="temperature" min="18" max="32" value="24" step="0.5">
  </div>
  
  <div class="control-group">
    <label>Light Intensity <span class="value" id="light-val">60%</span></label>
    <input type="range" id="light" min="0" max="100" value="60">
  </div>
  
  <div class="control-group">
    <label>Current Strength <span class="value" id="current-val">50%</span></label>
    <input type="range" id="current" min="0" max="100" value="50">
  </div>
  
  <button id="reset">Reset Reef</button>
</div>

<div id="slice-control">
  <h3>Cross-Section View</h3>
  <div class="control-group">
    <label>Slice Depth <span class="value" id="slice-val">Off</span></label>
    <input type="range" id="slice" min="0" max="100" value="0">
  </div>
</div>

<div id="stats">
  <div class="stat">Reef Age: <span id="age">0</span>s</div>
  <div class="stat">Complexity: <span id="complexity">0</span></div>
  <div class="stat">
    Health: 
    <div class="health-bar">
      <div class="health-fill" id="health-fill" style="width: 100%; background: #06ffa5;"></div>
    </div>
  </div>
  <div class="warning" id="warning"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Simulation state
let reef = {
  branches: [],
  chambers: [],
  organisms: [],
  age: 0,
  health: 100,
  complexity: 0
};

let params = {
  temperature: 24,
  light: 60,
  current: 50,
  sliceDepth: 0
};

// Branch node structure
class Branch {
  constructor(x, y, z, parent = null, generation = 0) {
    this.x = x;
    this.y = y;
    this.z = z;
    this.parent = parent;
    this.generation = generation;
    this.health = 100;
    this.age = 0;
    this.thickness = Math.max(1, 8 - generation);
    this.children = [];
    this.color = this.generateColor();
    this.growthDelay = Math.random() * 60;
  }
  
  generateColor() {
    const temp = params.temperature;
    const light = params.light;
    
    if (this.health < 30) {
      return `rgba(240, 240, 230, ${0.5 + Math.random() * 0.3})`;
    }
    
    const hue = 170 + (temp - 24) * 5 + (light - 50) * 0.3;
    const sat = 60 + light * 0.3;
    const lum = 45 + light * 0.15;
    return `hsla(${hue}, ${sat}%, ${lum}%, 0.8)`;
  }
  
  update() {
    this.age++;
    
    // Health degradation based on parameters
    const tempStress = Math.abs(params.temperature - 25) * 0.5;
    const lightStress = Math.abs(params.light - 60) * 0.2;
    const currentStress = params.current > 80 ? (params.current - 80) * 0.5 : 0;
    
    this.health -= (tempStress + lightStress + currentStress) * 0.01;
    
    // Recovery in good conditions
    if (tempStress < 1 && lightStress < 10 && currentStress === 0) {
      this.health = Math.min(100, this.health + 0.05);
    }
    
    this.color = this.generateColor();
  }
  
  canGrow() {
    return this.age > this.growthDelay && 
           this.health > 40 && 
           this.generation < 7 && 
           this.children.length < 3 &&
           Math.random() < 0.02;
  }
  
  grow() {
    const angle = Math.random() * Math.PI * 2;
    const upward = 0.3 + Math.random() * 0.4;
    const spread = 20 + params.current * 0.3;
    
    const dx = Math.cos(angle) * spread;
    const dy = -upward * 30;
    const dz = Math.sin(angle) * spread;
    
    const newBranch = new Branch(
      this.x + dx,
      this.y + dy,
      this.z + dz,
      this,
      this.generation + 1
    );
    
    this.children.push(newBranch);
    reef.branches.push(newBranch);
    
    // Chance to create a chamber
    if (Math.random() < 0.3 && this.generation > 2) {
      createChamber(newBranch);
    }
  }
}

// Hidden chambers inside the reef
class Chamber {
  constructor(x, y, z, size) {
    this.x = x;
    this.y = y;
    this.z = z;
    this.size = size;
    this.bioluminescence = Math.random();
    this.type = Math.random() < 0.5 ? 'symbiotic' : 'parasitic';
    this.organisms = [];
    
    // Add organisms to chamber
    const count = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      this.organisms.push({
        angle: Math.random() * Math.PI * 2,
        radius: Math.random() * size * 0.4,
        phase: Math.random() * Math.PI * 2,
        speed: 0.02 + Math.random() * 0.03
      });
    }
  }
  
  update() {
    // Organisms move within chamber
    this.organisms.forEach(org => {
      org.phase += org.speed;
    });
    
    // Parasitic chambers harm nearby branches
    if (this.type === 'parasitic' && params.light > 70) {
      // Overgrowth
      this.size *= 1.001;
    }
  }
}

function createChamber(branch) {
  const size = 10 + Math.random() * 15;
  const chamber = new Chamber(branch.x, branch.y, branch.z, size);
  reef.chambers.push(chamber);
}

// Initialize reef
function initReef() {
  reef = {
    branches: [],
    chambers: [],
    organisms: [],
    age: 0,
    health: 100,
    complexity: 0
  };
  
  const root = new Branch(canvas.width / 2, canvas.height - 50, 0, null, 0);
  reef.branches.push(root);
  
  // Initial growth
  for (let i = 0; i < 3; i++) {
    root.grow();
  }
}

// Project 3D to 2D
function project(x, y, z) {
  const perspective = 600;
  const scale = perspective / (perspective + z);
  return {
    x: x * scale + (canvas.width / 2) * (1 - scale),
    y: y * scale + (canvas.height / 2) * (1 - scale),
    scale: scale
  };
}

// Draw the reef
function drawReef() {
  ctx.fillStyle = 'rgba(0, 8, 20, 0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const sliceZ = params.sliceDepth > 0 ? (params.sliceDepth - 50) * 8 : 1000;
  
  // Draw chambers (only visible when sliced)
  reef.chambers.forEach(chamber => {
    if (Math.abs(chamber.z - sliceZ) < 30) {
      const pos = project(chamber.x, chamber.y, chamber.z);
      
      // Chamber glow
      const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, chamber.size * pos.scale);
      
      if (chamber.type === 'symbiotic') {
        gradient.addColorStop(0, `rgba(6, 255, 165, ${chamber.bioluminescence * 0.6})`);
        gradient.addColorStop(1, 'rgba(6, 255, 165, 0)');
      } else {
        gradient.addColorStop(0, `rgba(255, 107, 107, ${0.4})`);
        gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
      }
      
      ctx.fillStyle = gradient;
      ctx.fillRect(pos.x - chamber.size * pos.scale, pos.y - chamber.size * pos.scale,
                   chamber.size * 2 * pos.scale, chamber.size * 2 * pos.scale);
      
      // Draw organisms
      chamber.organisms.forEach(org => {
        const ox = chamber.x + Math.cos(org.angle + org.phase) * org.radius;
        const oy = chamber.y + Math.sin(org.angle + org.phase) * org.radius;
        const oPos = project(ox, oy, chamber.z);
        
        ctx.fillStyle = chamber.type === 'symbiotic' ? '#06ffa5' : '#ff6b6b';
        ctx.beginPath();
        ctx.arc(oPos.x, oPos.y, 2 * oPos.scale, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  });
  
  // Sort branches by z for proper rendering
  const sorted = [...reef.branches].sort((a, b) => b.z - a.z);
  
  // Draw branches
  sorted.forEach(branch => {
    if (branch.parent && branch.z < sliceZ + 30) {
      const start = project(branch.parent.x, branch.parent.y, branch.parent.z);
      const end = project(branch.x, branch.y, branch.z);
      
      const gradient = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
      gradient.addColorStop(0, branch.parent.color);
      gradient.addColorStop(1, branch.color);
      
      ctx.strokeStyle = gradient;
      ctx.lineWidth = branch.thickness * Math.min(start.scale, end.scale);
      ctx.lineCap = 'round';
      
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      
      // Polyp details
      if (branch.health > 50 && Math.random() < 0.1) {
        ctx.fillStyle = `rgba(255, 200, 221, ${0.3 + Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.arc(end.x, end.y, 3 * end.scale, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  });
  
  // Slice indicator
  if (params.sliceDepth > 0) {
    ctx.strokeStyle = 'rgba(168, 218, 220, 0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// Update simulation
function update() {
  reef.age++;
  
  // Update all branches
  let totalHealth = 0;
  reef.branches.forEach(branch => {
    branch.update();
    totalHealth += branch.health;
    
    if (branch.canGrow()) {
      branch.grow();
    }
  });
  
  // Update chambers
  reef.chambers.forEach(chamber => chamber.update());
  
  // Calculate stats
  reef.health = reef.branches.length > 0 ? totalHealth / reef.branches.length : 0;
  reef.complexity = reef.branches.length + reef.chambers.length * 2;
  
  // Warning messages
  let warning = '';
  if (params.temperature < 20 || params.temperature > 30) {
    warning = '⚠ Temperature stress detected';
  } else if (params.light > 80) {
    warning = '⚠ Parasitic bloom from excess light';
  } else if (params.current > 85) {
    warning = '⚠ Strong currents damaging structure';
  } else if (reef.health < 40) {
    warning = '⚠ Reef bleaching in progress';
  }
  
  // Update UI
  document.getElementById('age').textContent = Math.floor(reef.age / 60);
  document.getElementById('complexity').textContent = reef.complexity;
  
  const healthFill = document.getElementById('health-fill');
  healthFill.style.width = reef.health + '%';
  
  if (reef.health > 70) {
    healthFill.style.background = '#06ffa5';
  } else if (reef.health > 40) {
    healthFill.style.background = '#ffd60a';
  } else {
    healthFill.style.background = '#ff6b6b';
  }
  
  document.getElementById('warning').textContent = warning;
}

// Animation loop
function animate() {
  update();
  drawReef();
  requestAnimationFrame(animate);
}

// Event listeners
document.getElementById('temperature').addEventListener('input', (e) => {
  params.temperature = parseFloat(e.target.value);
  document.getElementById('temp-val').textContent = params.temperature + '°C';
});

document.getElementById('light').addEventListener('input', (e) => {
  params.light = parseInt(e.target.value);
  document.getElementById('light-val').textContent = params.light + '%';
});

document.getElementById('current').addEventListener('input', (e) => {
  params.current = parseInt(e.target.value);
  document.getElementById('current-val').textContent = params.current + '%';
});

document.getElementById('slice').addEventListener('input', (e) => {
  params.sliceDepth = parseInt(e.target.value);
  document.getElementById('slice-val').textContent = params.sliceDepth > 0 ? params.sliceDepth + '%' : 'Off';
});

document.getElementById('reset').addEventListener('click', initReef);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Start
initReef();
animate();
</script>
</body>
</html>
