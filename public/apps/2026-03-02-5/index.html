<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurrencyQuake — Daily AI Gen</title>
  <meta name="description" content="A live currency volatility dashboard that ranks global currencies by their strength or weakness against a chosen base, revealing safe havens and crisis pairs through color-coded bars and sparkline charts.">
  <meta property="og:title" content="CurrencyQuake — Daily AI Gen">
  <meta property="og:description" content="A live currency volatility dashboard that ranks global currencies by their strength or weakness against a chosen base, revealing safe havens and crisis pairs through color-coded bars and sparkline charts.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-02-5/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-02-5/">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Courier New', monospace;
  background: #0a0a0a;
  color: #e0e0e0;
  padding: 20px;
  line-height: 1.5;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

header {
  text-align: center;
  margin-bottom: 30px;
  border-bottom: 2px solid #333;
  padding-bottom: 20px;
}

h1 {
  font-size: 2.5em;
  color: #ff6b6b;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.subtitle {
  color: #888;
  font-size: 0.9em;
}

.controls {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: #151515;
  border-radius: 8px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

label {
  font-size: 0.8em;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
}

select, button {
  padding: 10px 15px;
  background: #222;
  border: 1px solid #444;
  color: #e0e0e0;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s;
}

select:hover, button:hover {
  border-color: #ff6b6b;
  background: #2a2a2a;
}

button {
  background: #ff6b6b;
  border: none;
  font-weight: bold;
}

button:hover {
  background: #ff5252;
}

.loading {
  text-align: center;
  padding: 40px;
  font-size: 1.2em;
  color: #ff6b6b;
}

.error {
  background: #2a1515;
  border: 2px solid #ff6b6b;
  padding: 20px;
  border-radius: 8px;
  margin: 20px 0;
  text-align: center;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.stat-card {
  background: #151515;
  padding: 15px;
  border-radius: 8px;
  border-left: 3px solid #ff6b6b;
}

.stat-label {
  font-size: 0.8em;
  color: #888;
  margin-bottom: 5px;
}

.stat-value {
  font-size: 1.5em;
  font-weight: bold;
}

.crisis-pairs {
  background: #151515;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 30px;
  border: 2px solid #ff6b6b;
}

.crisis-pairs h2 {
  color: #ff6b6b;
  margin-bottom: 15px;
  font-size: 1.2em;
}

.crisis-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}

.crisis-item {
  background: #0a0a0a;
  padding: 10px;
  border-radius: 4px;
  font-size: 0.9em;
}

.pair {
  font-weight: bold;
  margin-bottom: 5px;
}

.divergence {
  color: #ff6b6b;
}

.leaderboard {
  background: #151515;
  padding: 20px;
  border-radius: 8px;
}

.leaderboard h2 {
  margin-bottom: 20px;
  color: #e0e0e0;
}

.currency-row {
  display: flex;
  align-items: center;
  padding: 12px;
  margin-bottom: 8px;
  background: #0a0a0a;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.currency-row:hover {
  background: #1a1a1a;
  transform: translateX(5px);
}

.rank {
  width: 40px;
  font-weight: bold;
  color: #666;
}

.currency-code {
  width: 60px;
  font-weight: bold;
  font-size: 1.1em;
}

.bar-container {
  flex: 1;
  height: 30px;
  position: relative;
  margin: 0 15px;
}

.bar {
  height: 100%;
  transition: width 0.5s ease-out;
  display: flex;
  align-items: center;
  padding: 0 10px;
  border-radius: 3px;
}

.bar.positive {
  background: linear-gradient(90deg, #2a5a2a, #4CAF50);
}

.bar.negative {
  background: linear-gradient(90deg, #5a2a2a, #f44336);
}

.change {
  font-weight: bold;
  font-size: 1.1em;
  min-width: 80px;
  text-align: right;
}

.sparkline-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.sparkline-content {
  background: #151515;
  padding: 30px;
  border-radius: 8px;
  max-width: 600px;
  width: 90%;
  border: 2px solid #ff6b6b;
}

.sparkline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.close-btn {
  background: none;
  border: none;
  color: #ff6b6b;
  font-size: 1.5em;
  cursor: pointer;
  padding: 0;
  width: 30px;
  height: 30px;
}

canvas {
  width: 100%;
  height: 200px;
  border: 1px solid #333;
  border-radius: 4px;
}

.last-updated {
  text-align: center;
  margin-top: 20px;
  color: #666;
  font-size: 0.8em;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚡ CURRENCYQUAKE</h1>
    <div class="subtitle">Real-time currency stress monitor • Live volatility tracker</div>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Base Currency</label>
      <select id="baseCurrency">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
        <option value="JPY">JPY</option>
        <option value="CHF">CHF</option>
        <option value="CAD">CAD</option>
        <option value="AUD">AUD</option>
        <option value="CNY">CNY</option>
      </select>
    </div>
    <div class="control-group">
      <label>Lookback Period</label>
      <select id="lookback">
        <option value="7">7 days</option>
        <option value="14">14 days</option>
        <option value="30" selected>30 days</option>
        <option value="90">90 days</option>
      </select>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button id="refreshBtn">↻ Refresh Data</button>
    </div>
  </div>

  <div id="loading" class="loading" style="display: none;">
    ⚡ Fetching live exchange rates...
  </div>

  <div id="error" class="error" style="display: none;"></div>

  <div id="content" style="display: none;">
    <div class="stats" id="stats"></div>
    
    <div class="crisis-pairs">
      <h2>🔥 CRISIS PAIRS — Largest Divergences</h2>
      <div class="crisis-grid" id="crisisGrid"></div>
    </div>

    <div class="leaderboard">
      <h2>Currency Stress Leaderboard</h2>
      <div id="leaderboardContent"></div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>
  </div>
</div>

<div class="sparkline-modal" id="sparklineModal">
  <div class="sparkline-content">
    <div class="sparkline-header">
      <h3 id="sparklineTitle"></h3>
      <button class="close-btn" onclick="closeSparkline()">×</button>
    </div>
    <canvas id="sparklineCanvas"></canvas>
    <div id="sparklineStats" style="margin-top: 15px; font-size: 0.9em; color: #888;"></div>
  </div>
</div>

<script>
let currentData = null;
let historicalData = null;

async function fetchData() {
  const base = document.getElementById('baseCurrency').value;
  const days = parseInt(document.getElementById('lookback').value);
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('content').style.display = 'none';

  try {
    const endDate = new Date();
    const startDate = new Date();
    startDate.setDate(startDate.getDate() - days);

    const formatDate = (date) => date.toISOString().split('T')[0];
    const url = `https://api.frankfurter.app/${formatDate(startDate)}..${formatDate(endDate)}?from=${base}`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error('API request failed');
    
    const data = await response.json();
    historicalData = data;
    
    processData(data, base, days);
    
  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = `⚠️ Error: ${error.message}. Please try again.`;
  }
}

function processData(data, base, days) {
  const rates = data.rates;
  const dates = Object.keys(rates).sort();
  
  if (dates.length < 2) {
    throw new Error('Insufficient data');
  }

  const firstDate = dates[0];
  const lastDate = dates[dates.length - 1];
  
  const currencies = Object.keys(rates[lastDate]);
  const changes = [];

  currencies.forEach(currency => {
    const firstRate = rates[firstDate][currency];
    const lastRate = rates[lastDate][currency];
    
    if (firstRate && lastRate) {
      const percentChange = ((lastRate - firstRate) / firstRate) * 100;
      
      changes.push({
        code: currency,
        change: percentChange,
        firstRate,
        lastRate,
        history: dates.map(date => rates[date][currency] || null)
      });
    }
  });

  changes.sort((a, b) => b.change - a.change);
  currentData = { changes, dates, base, days };
  
  renderDashboard(currentData);
}

function renderDashboard(data) {
  const { changes, dates, base, days } = data;
  
  // Stats
  const strongest = changes[0];
  const weakest = changes[changes.length - 1];
  const avgVolatility = changes.reduce((sum, c) => sum + Math.abs(c.change), 0) / changes.length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Strongest vs ${base}</div>
      <div class="stat-value" style="color: #4CAF50;">${strongest.code} +${strongest.change.toFixed(2)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Weakest vs ${base}</div>
      <div class="stat-value" style="color: #f44336;">${weakest.code} ${weakest.change.toFixed(2)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Volatility</div>
      <div class="stat-value">${avgVolatility.toFixed(2)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Period</div>
      <div class="stat-value">${days} days</div>
    </div>
  `;

  // Crisis pairs
  const crisisPairs = [];
  for (let i = 0; i < Math.min(3, changes.length); i++) {
    for (let j = Math.max(changes.length - 3, 0); j < changes.length; j++) {
      if (i !== j) {
        const divergence = Math.abs(changes[i].change - changes[j].change);
        crisisPairs.push({
          pair: `${changes[i].code}/${changes[j].code}`,
          divergence,
          strong: changes[i].code,
          weak: changes[j].code
        });
      }
    }
  }
  
  crisisPairs.sort((a, b) => b.divergence - a.divergence);
  
  document.getElementById('crisisGrid').innerHTML = crisisPairs.slice(0, 6).map(pair => `
    <div class="crisis-item">
      <div class="pair">${pair.pair}</div>
      <div class="divergence">${pair.divergence.toFixed(2)}% spread</div>
      <div style="font-size: 0.8em; color: #666;">${pair.strong} ↑ ${pair.weak} ↓</div>
    </div>
  `).join('');

  // Leaderboard
  const maxChange = Math.max(...changes.map(c => Math.abs(c.change)));
  
  document.getElementById('leaderboardContent').innerHTML = changes.map((item, index) => {
    const barWidth = (Math.abs(item.change) / maxChange) * 100;
    const isPositive = item.change >= 0;
    
    return `
      <div class="currency-row" onclick="showSparkline('${item.code}')">
        <div class="rank">#${index + 1}</div>
        <div class="currency-code">${item.code}</div>
        <div class="bar-container">
          <div class="bar ${isPositive ? 'positive' : 'negative'}" 
               style="width: ${barWidth}%">
          </div>
        </div>
        <div class="change" style="color: ${isPositive ? '#4CAF50' : '#f44336'}">
          ${isPositive ? '+' : ''}${item.change.toFixed(2)}%
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()}`;
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function showSparkline(code) {
  const currency = currentData.changes.find(c => c.code === code);
  if (!currency) return;

  document.getElementById('sparklineTitle').textContent = `${code} vs ${currentData.base}`;
  document.getElementById('sparklineModal').style.display = 'flex';

  const canvas = document.getElementById('sparklineCanvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 400;

  const history = currency.history.filter(v => v !== null);
  const min = Math.min(...history);
  const max = Math.max(...history);
  const range = max - min;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = (canvas.height / 5) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Line
  ctx.strokeStyle = currency.change >= 0 ? '#4CAF50' : '#f44336';
  ctx.lineWidth = 3;
  ctx.beginPath();

  history.forEach((value, index) => {
    const x = (canvas.width / (history.length - 1)) * index;
    const y = canvas.height - ((value - min) / range) * canvas.height;
    
    if (index === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  });

  ctx.stroke();

  // Points
  history.forEach((value, index) => {
    const x = (canvas.width / (history.length - 1)) * index;
    const y = canvas.height - ((value - min) / range) * canvas.height;
    
    ctx.fillStyle = currency.change >= 0 ? '#4CAF50' : '#f44336';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  document.getElementById('sparklineStats').innerHTML = `
    High: ${max.toFixed(4)} • Low: ${min.toFixed(4)} • 
    Range: ${range.toFixed(4)} • 
    Change: ${currency.change >= 0 ? '+' : ''}${currency.change.toFixed(2)}%
  `;
}

function closeSparkline() {
  document.getElementById('sparklineModal').style.display = 'none';
}

document.getElementById('refreshBtn').addEventListener('click', fetchData);
document.getElementById('baseCurrency').addEventListener('change', fetchData);
document.getElementById('lookback').addEventListener('change', fetchData);

document.getElementById('sparklineModal').addEventListener('click', (e) => {
  if (e.target.id === 'sparklineModal') {
    closeSparkline();
  }
});

// Initial load
fetchData();
</script>
</body>
</html>
