<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREADHORN — Daily AI Gen</title>
  <meta name="description" content="A surreal sound-painting game where you finger-paint waveforms inside a giant brass mouth, then blast your audio abominations at increasingly indifferent cosmic beings to disturb them.">
  <meta property="og:title" content="Dreadhorn — Daily AI Gen">
  <meta property="og:description" content="A surreal sound-painting game where you finger-paint waveforms inside a giant brass mouth, then blast your audio abominations at increasingly indifferent cosmic beings to disturb them.">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a2e; font-family: 'Comic Sans MS', cursive; overflow: hidden; user-select: none; }
#title-screen { position: fixed; inset: 0; background: radial-gradient(circle, #4a1942, #1a0a2e); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
#title-screen h1 { font-size: 5em; color: #ffcc00; text-shadow: 0 0 30px #ff6600, 0 0 60px #ff3300, 4px 4px 0 #8b0000; letter-spacing: 8px; animation: pulse 0.8s ease-in-out infinite alternate; }
#title-screen p { color: #ff9966; font-size: 1.3em; margin-top: 20px; animation: bob 1.5s ease-in-out infinite; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
#game { display: none; width: 100vw; height: 100vh; position: relative; }
#mouth { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 90vw; height: 65vh; background: radial-gradient(ellipse at center bottom, #cc3333 0%, #8b1a1a 40%, #5a0a0a 100%); border-radius: 50% 50% 0 0; border: 8px solid #d4a030; box-shadow: 0 0 40px #d4a030aa, inset 0 -30px 60px #3a0505; overflow: hidden; }
#tongue { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 50%; height: 40%; background: radial-gradient(ellipse, #e85555, #c23a3a); border-radius: 50% 50% 40% 40%; opacity: 0.6; }
#paint-canvas { position: absolute; inset: 0; cursor: crosshair; z-index: 2; }
#teeth-top { position: absolute; top: -5px; left: 0; right: 0; display: flex; justify-content: space-around; z-index: 3; pointer-events: none; }
.tooth { width: 40px; height: 50px; background: #f5f0d0; border-radius: 0 0 12px 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
#uvula { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 30px; height: 55px; background: radial-gradient(#ff6688, #cc3355); border-radius: 50% 50% 50% 50%; z-index: 1; animation: dangle 2s ease-in-out infinite; }
@keyframes dangle { 0%,100% { transform: translateX(-50%) rotate(-5deg); } 50% { transform: translateX(-50%) rotate(5deg); } }
#hud { position: absolute; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 10; pointer-events: none; }
.hud-box { background: #2a1a4ecc; color: #ffcc00; padding: 8px 18px; border-radius: 20px; font-size: 1.1em; border: 2px solid #d4a030; }
#tools { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
.tool-btn { padding: 10px 16px; border-radius: 25px; border: 3px solid #d4a030; background: #3a1a5e; color: #ffcc00; font-family: inherit; font-size: 0.95em; cursor: pointer; transition: all 0.2s; }
.tool-btn:hover { background: #5a2a8e; transform: scale(1.1); }
.tool-btn.active { background: #ff6600; color: #fff; }
#blast-btn { background: #cc0000; color: #fff; font-size: 1.2em; padding: 12px 30px; animation: pulse 0.6s ease-in-out infinite alternate; }
#blast-btn:hover { background: #ff2200; }
#creature-stage { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5; display: none; text-align: center; }
#creature-display { font-size: 5em; transition: transform 0.3s; }
#creature-name { color: #ffcc00; font-size: 1.2em; margin-top: 5px; }
#reaction { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 3em; color: #ff6600; z-index: 20; display: none; text-shadow: 0 0 20px #ffcc00; pointer-events: none; }
#round-info { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); font-size: 2.5em; color: #ffcc00; z-index: 20; display: none; text-align: center; text-shadow: 0 0 20px #ff6600; pointer-events: none; }
.waveform-preview { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 4; pointer-events: none; }
</style>
</head>
<body>
<div id="title-screen">
<h1>DREADHORN</h1>
<p>🎺 TAP TO BECOME THE NOISE GOBLIN 🎺</p>
<p style="font-size:0.8em; color:#aa6644; margin-top:40px;">paint abominations inside the mouth • blast them at stoic beings</p>
</div>
<div id="game">
<div id="hud">
<div class="hud-box" id="score-display">DISTURBED: 0</div>
<div class="hud-box" id="round-display">ROUND 1</div>
<div class="hud-box" id="indiff-display">INDIFFERENCE: 😐</div>
</div>
<div id="mouth">
<div id="uvula"></div>
<div id="tongue"></div>
<canvas id="paint-canvas"></canvas>
<div id="teeth-top"></div>
</div>
<div id="tools">
<button class="tool-btn active" data-sound="honk" onclick="selectTool(this)">🦆 WET HONK</button>
<button class="tool-btn" data-sound="scream" onclick="selectTool(this)">😱 REV SCREAM</button>
<button class="tool-btn" data-sound="gargle" onclick="selectTool(this)">🫧 GARGLE</button>
<button class="tool-btn" data-sound="squelch" onclick="selectTool(this)">🐸 SQUELCH</button>
<button class="tool-btn" id="blast-btn" onclick="blastSound()">🎺 BLAST!</button>
<button class="tool-btn" onclick="clearCanvas()" style="background:#333">🗑️</button>
</div>
<div id="creature-stage">
<div id="creature-display"></div>
<div id="creature-name"></div>
</div>
<div id="reaction"></div>
<div id="round-info"></div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let score = 0, round = 1, painting = false, currentTool = 'honk';
let strokes = [], currentStroke = null, blasting = false;

const creatures = [
  { emoji: '🗿', name: 'Stone Judge', threshold: 15 },
  { emoji: '😺', name: 'Bored Cat', threshold: 25 },
  { emoji: '🦉', name: 'Sleepy Owl', threshold: 30 },
  { emoji: '👁️', name: 'The Unblinking', threshold: 40 },
  { emoji: '🐢', name: 'Ancient Tortoise', threshold: 50 },
  { emoji: '😴', name: 'Sleeping God', threshold: 65 },
  { emoji: '🧊', name: 'The Ice Monarch', threshold: 80 },
  { emoji: '🌑', name: 'Void Snail', threshold: 95 },
  { emoji: '🫥', name: 'The Utterly Unbothered', threshold: 120 },
  { emoji: '♾️', name: 'INFINITY KAREN', threshold: 200 },
];

const toolColors = { honk: '#ffdd00', scream: '#ff3366', gargle: '#33ccff', squelch: '#66ff44' };

document.getElementById('title-screen').addEventListener('click', () => {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  initCanvas();
  audioCtx.resume();
});

function initCanvas() {
  const canvas = document.getElementById('paint-canvas');
  const mouth = document.getElementById('mouth');
  canvas.width = mouth.offsetWidth;
  canvas.height = mouth.offsetHeight;

  // teeth
  const teethDiv = document.getElementById('teeth-top');
  for (let i = 0; i < Math.floor(canvas.width / 50); i++) {
    const t = document.createElement('div');
    t.className = 'tooth';
    t.style.height = (30 + Math.random() * 30) + 'px';
    teethDiv.appendChild(t);
  }

  canvas.addEventListener('pointerdown', startPaint);
  canvas.addEventListener('pointermove', doPaint);
  canvas.addEventListener('pointerup', endPaint);
  canvas.addEventListener('pointerleave', endPaint);
}

function startPaint(e) {
  if (blasting) return;
  painting = true;
  const rect = e.target.getBoundingClientRect();
  currentStroke = { tool: currentTool, points: [{ x: e.clientX - rect.left, y: e.clientY - rect.top }] };
  playPaintSound(currentTool, 0.15);
}

function doPaint(e) {
  if (!painting || !currentStroke || blasting) return;
  const rect = e.target.getBoundingClientRect();
  currentStroke.points.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  renderStrokes();
}

function endPaint() {
  if (currentStroke && currentStroke.points.length > 1) {
    strokes.push(currentStroke);
  }
  currentStroke = null;
  painting = false;
}

function renderStrokes() {
  const canvas = document.getElementById('paint-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const allStrokes = [...strokes];
  if (currentStroke) allStrokes.push(currentStroke);

  allStrokes.forEach(stroke => {
    if (stroke.points.length < 2) return;
    const color = toolColors[stroke.tool];
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 8 + Math.sin(Date.now() / 200) * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
    }
    ctx.stroke();

    // draw blobs at intervals
    for (let i = 0; i < stroke.points.length; i += 8) {
      const p = stroke.points[i];
      ctx.beginPath();
      ctx.fillStyle = color + '88';
      const r = 10 + Math.sin(i + Date.now() / 300) * 6;
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  });
}

function selectTool(btn) {
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTool = btn.dataset.sound;
}

function playPaintSound(tool, vol = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = vol;
  osc.connect(gain).connect(audioCtx.destination);

  if (tool === 'honk') { osc.type = 'sawtooth'; osc.frequency.value = 120 + Math.random() * 80; }
  else if (tool === 'scream') { osc.type = 'square'; osc.frequency.value = 800 + Math.random() * 600; }
  else if (tool === 'gargle') { osc.type = 'triangle'; osc.frequency.value = 200 + Math.random() * 200; }
  else { osc.type = 'sine'; osc.frequency.value = 60 + Math.random() * 40; }

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.stop(audioCtx.currentTime + 0.15);
}

function calculateChaos() {
  let chaos = 0;
  strokes.forEach(s => {
    chaos += s.points.length * 0.5;
    const toolMult = { honk: 1.2, scream: 1.5, gargle: 1.0, squelch: 1.3 };
    chaos *= (toolMult[s.tool] || 1);
    // bonus for wild movement
    for (let i = 1; i < s.points.length; i++) {
      const dx = s.points[i].x - s.points[i-1].x;
      const dy = s.points[i].y - s.points[i-1].y;
      chaos += Math.sqrt(dx*dx + dy*dy) * 0.05;
    }
  });
  // bonus for using multiple tools
  const tools = new Set(strokes.map(s => s.tool));
  chaos *= (1 + (tools.size - 1) * 0.3);
  return Math.floor(chaos);
}

function playBlastSound() {
  const duration = 1.5;
  strokes.forEach((stroke, si) => {
    const delay = si * 0.1;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const distortion = audioCtx.createWaveShaper();

    // make distortion curve
    const samples = 256;
    const curve = new Float32Array(samples);
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / samples - 1;
      curve[i] = (Math.PI + strokes.length * 10) * x / (Math.PI + strokes.length * Math.abs(x));
    }
    distortion.curve = curve;

    const freqMap = { honk: 110, scream: 1200, gargle: 300, squelch: 70 };
    const typeMap = { honk: 'sawtooth', scream: 'square', gargle: 'triangle', squelch: 'sine' };

    osc.type = typeMap[stroke.tool] || 'sawtooth';
    const baseFreq = freqMap[stroke.tool] || 200;
    osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime + delay);

    // warp frequency based on stroke shape
    stroke.points.forEach((p, i) => {
      const t = audioCtx.currentTime + delay + (i / stroke.points.length) * duration;
      const freq = baseFreq + (p.y / 5) + Math.sin(p.x / 20) * 200;
      osc.frequency.linearRampToValueAtTime(freq, t);
    });

    gain.gain.setValueAtTime(0.3, audioCtx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);

    osc.connect(distortion).connect(gain).connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + duration);
  });

  // bonus noise burst
  const bufferSize = audioCtx.sampleRate * 0.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
  noise.connect(noiseGain).connect(audioCtx.destination);
  noise.start();
}

function blastSound() {
  if (blasting || strokes.length === 0) return;
  blasting = true;

  const chaos = calculateChaos();
  const creatureIdx = Math.min(round - 1, creatures.length - 1);
  const creature = creatures[creatureIdx];

  // show creature
  const stage = document.getElementById('creature-stage');
  const display = document.getElementById('creature-display');
  const nameEl = document.getElementById('creature-name');
  stage.style.display = 'block';
  display.textContent = creature.emoji;
  nameEl.textContent = creature.name;

  playBlastSound();

  // shake the mouth
  const mouth = document.getElementById('mouth');
  mouth.style.transition = 'none';
  let shakeCount = 0;
  const shakeInterval = setInterval(() => {
    const x = (Math.random() - 0.5) * 20;
    const y = (Math.random() - 0.5) * 10;
    mouth.style.transform = `translateX(calc(-50% + ${x}px)) translateY(${y}px)`;
    shakeCount++;
    if (shakeCount > 30) {
      clearInterval(shakeInterval);
      mouth.style.transform = 'translateX(-50%)';
    }
  }, 50);

  // evaluate after blast
  setTimeout(() => {
    const disturbed = chaos >= creature.threshold;
    const reaction = document.getElementById('reaction');

    if (disturbed) {
      score++;
      display.style.transform = 'scale(1.5) rotate(20deg)';
      const reactions = ['😫', '🤯', '😤', '💀', '🫠', '😵‍💫'];
      reaction.textContent = reactions[Math.floor(Math.random() * reactions.length)] +
        ' DISTURBED! (' + chaos + '/' + creature.threshold + ')';
      reaction.style.color = '#44ff44';
    } else {
      display.style.transform = 'scale(1)';
      const reactions = ['😐', '🥱', '💤', '🫥', '😑'];
      reaction.textContent = reactions[Math.floor(Math.random() * reactions.length)] +
        ' unmoved... (' + chaos + '/' + creature.threshold + ')';
      reaction.style.color = '#ff4444';
    }

    reaction.style.display = 'block';
    document.getElementById('score-display').textContent = 'DISTURBED: ' + score;

    setTimeout(() => {
      reaction.style.display = 'none';
      stage.style.display = 'none';
      display.style.transform = 'scale(1)';
      round++;
      document.getElementById('round-display').textContent = 'ROUND ' + round;

      const indiffLevel = Math.min(round, creatures.length);
      const indiffEmojis = ['😐','😑','🫤','🥱','💤','🧊','🫥','🕳️','♾️','💀'];
      document.getElementById('indiff-display').textContent =
        'INDIFFERENCE: ' + indiffEmojis[Math.min(indiffLevel-1, indiffEmojis.length-1)];

      // show next round info
      const nextCreature = creatures[Math.min(round - 1, creatures.length - 1)];
      const info = document.getElementById('round-info');
      info.innerHTML = `ROUND ${round}<br>${nextCreature.emoji} ${nextCreature.name}<br><span style="font-size:0.5em">paint your sonic abomination!</span>`;
      info.style.display = 'block';
      setTimeout(() => { info.style.display = 'none'; }, 2000);

      clearCanvas();
      blasting = false;
    }, 2500);
  }, 2000);
}

function clearCanvas() {
  strokes = [];
  const canvas = document.getElementById('paint-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// animate waveform blobs
function animate() {
  if (!blasting) renderStrokes();
  requestAnimationFrame(animate);
}
animate();

// resize handler
window.addEventListener('resize', () => {
  const canvas = document.getElementById('paint-canvas');
  const mouth = document.getElementById('mouth');
  canvas.width = mouth.offsetWidth;
  canvas.height = mouth.offsetHeight;
  renderStrokes();
});
</script>
</body>
</html>
