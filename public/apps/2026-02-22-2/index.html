<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turncoat — Daily AI Gen</title>
  <meta name="description" content="A habit dashboard where good habits visually corrupt and darken when linked bad habits erode them, showing at a glance which strengths are healthy, under siege, or fully compromised.">
  <meta property="og:title" content="Turncoat — Daily AI Gen">
  <meta property="og:description" content="A habit dashboard where good habits visually corrupt and darken when linked bad habits erode them, showing at a glance which strengths are healthy, under siege, or fully compromised.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-02-22-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-02-22-2/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d0f; color: #e0e0e0; min-height: 100vh; }
  
  header { padding: 24px 32px 8px; display: flex; justify-content: space-between; align-items: center; }
  h1 { font-size: 28px; font-weight: 300; letter-spacing: 4px; color: #aaa; }
  h1 span { color: #e74c3c; font-weight: 600; }
  
  .overall-score { text-align: right; }
  .overall-score .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; }
  .overall-score .value { font-size: 36px; font-weight: 200; }
  
  .grid-container { padding: 24px 32px; }
  .habit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  
  .habit-cell {
    border-radius: 12px; padding: 20px; cursor: pointer;
    transition: all 0.5s ease; position: relative; overflow: hidden;
    min-height: 160px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .habit-cell:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .habit-cell .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .habit-cell .streak { font-size: 12px; opacity: 0.8; }
  .habit-cell .streak-num { font-size: 32px; font-weight: 200; }
  .habit-cell .status-tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 8px;
  }
  .habit-cell .corruption-bar {
    position: absolute; bottom: 0; left: 0; height: 4px;
    transition: width 0.5s ease, background 0.5s ease;
  }
  .habit-cell .siege-indicator {
    position: absolute; top: 8px; right: 8px; font-size: 10px;
    padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.3);
  }
  
  .controls { padding: 16px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .controls button {
    background: #1a1a1e; border: 1px solid #333; color: #ccc;
    padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  .controls button:hover { background: #252528; border-color: #555; }
  .controls button.bad { border-color: #e74c3c44; color: #e74c3c; }
  .controls button.bad:hover { background: #2a1515; }
  .controls button.good { border-color: #2ecc7144; color: #2ecc71; }
  .controls button.good:hover { background: #152a18; }
  
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a1e; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%;
    border: 1px solid #333; position: relative;
  }
  .modal h2 { font-weight: 400; margin-bottom: 16px; font-size: 20px; }
  .modal .close-btn {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    color: #666; font-size: 24px; cursor: pointer;
  }
  .modal .close-btn:hover { color: #fff; }
  .modal .detail-row { padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
  .modal .detail-row .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .modal .detail-row .val { margin-top: 4px; }
  .modal .lapse-log { max-height: 150px; overflow-y: auto; margin: 12px 0; }
  .modal .lapse-entry { padding: 6px 10px; margin: 4px 0; background: #221515; border-radius: 6px; font-size: 12px; color: #e74c3c; }
  .modal .reclaim-path {
    background: #152a18; border: 1px solid #2ecc7133; border-radius: 8px;
    padding: 14px; margin-top: 16px; font-size: 13px; color: #2ecc71;
  }
  .modal .reclaim-path .title { font-weight: 600; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  
  .add-section { padding: 16px 32px; }
  .add-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .add-form input, .add-form select {
    background: #1a1a1e; border: 1px solid #333; color: #ccc;
    padding: 8px 12px; border-radius: 6px; font-size: 13px;
  }
  .add-form button {
    background: #2ecc71; color: #0d0d0f; border: none; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-bottom: 12px; }
  
  .day-controls { padding: 8px 32px; display: flex; align-items: center; gap: 16px; }
  .day-controls button {
    background: #1a1a1e; border: 1px solid #444; color: #ccc;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .day-controls button:hover { background: #252528; }
  .day-controls .day-label { font-size: 14px; color: #888; }
  
  .legend { padding: 8px 32px 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>TURN<span>COAT</span></h1>
  <div class="overall-score">
    <div class="label">Integrity Score</div>
    <div class="value" id="overallScore">100</div>
  </div>
</header>

<div class="day-controls">
  <button onclick="simPrevDay()">◀ Prev Day</button>
  <span class="day-label" id="dayLabel">Day 1</span>
  <button onclick="simNextDay()">▶ Next Day</button>
</div>

<div class="controls" id="logControls"></div>

<div class="grid-container">
  <div class="section-title">Your Habit Cells</div>
  <div class="habit-grid" id="habitGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Healthy</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Under Siege</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Compromised</div>
</div>

<div class="add-section">
  <div class="section-title">Add Habits</div>
  <div class="add-form">
    <input id="goodName" placeholder="Good habit name" />
    <button onclick="addGoodHabit()">+ Good</button>
    <input id="badName" placeholder="Bad habit name" style="margin-left:12px" />
    <select id="linkTo"></select>
    <button onclick="addBadHabit()" style="background:#e74c3c">+ Bad (linked)</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let currentDay = 1;
let goodHabits = [
  { id: 'g1', name: 'Exercise', color: '#2ecc71', streak: 7, corruption: 0, lapses: [], loggedDays: [1,2,3,4,5,6,7] },
  { id: 'g2', name: 'Reading', color: '#3498db', streak: 5, corruption: 0, lapses: [], loggedDays: [1,2,3,4,5] },
  { id: 'g3', name: 'Meditation', color: '#9b59b6', streak: 3, corruption: 0, lapses: [], loggedDays: [1,2,3] },
  { id: 'g4', name: 'Cooking', color: '#1abc9c', streak: 4, corruption: 0, lapses: [], loggedDays: [1,2,3,4] },
  { id: 'g5', name: 'Journaling', color: '#e67e22', streak: 6, corruption: 0, lapses: [], loggedDays: [1,2,3,4,5,6] },
];

let badHabits = [
  { id: 'b1', name: 'Binge Eating', linkedTo: 'g1', lapses: [] },
  { id: 'b2', name: 'Doomscrolling', linkedTo: 'g2', lapses: [] },
  { id: 'b3', name: 'Alcohol', linkedTo: 'g3', lapses: [] },
  { id: 'b4', name: 'Fast Food', linkedTo: 'g4', lapses: [] },
  { id: 'b5', name: 'Skipping Sleep', linkedTo: 'g5', lapses: [] },
];

let gIdCounter = 6;
let bIdCounter = 6;

function getStatus(h) {
  if (h.corruption >= 80) return 'compromised';
  if (h.corruption >= 30) return 'siege';
  return 'healthy';
}

function getStatusColor(status) {
  if (status === 'compromised') return '#e74c3c';
  if (status === 'siege') return '#f39c12';
  return '#2ecc71';
}

function getCellBg(h) {
  const status = getStatus(h);
  const corr = h.corruption / 100;
  if (status === 'compromised') {
    return `linear-gradient(135deg, #1a0808 0%, #2d0a0a 50%, #3d1010 100%)`;
  }
  if (status === 'siege') {
    const r = Math.round(30 + corr * 20);
    const g = Math.round(25 - corr * 10);
    const b = Math.round(15);
    return `linear-gradient(135deg, rgb(${r},${g},${b}) 0%, rgb(${r+10},${g+5},${b}) 100%)`;
  }
  // healthy - vibrant based on streak
  const intensity = Math.min(1, h.streak / 10);
  const baseR = parseInt(h.color.slice(1,3), 16);
  const baseG = parseInt(h.color.slice(3,5), 16);
  const baseB = parseInt(h.color.slice(5,7), 16);
  const r = Math.round(15 + baseR * intensity * 0.3);
  const g2 = Math.round(15 + baseG * intensity * 0.3);
  const b2 = Math.round(15 + baseB * intensity * 0.3);
  return `linear-gradient(135deg, rgb(${r},${g2},${b2}) 0%, rgb(${Math.round(r*0.7)},${Math.round(g2*0.7)},${Math.round(b2*0.7)}) 100%)`;
}

function getOverallScore() {
  if (goodHabits.length === 0) return 100;
  let total = 0;
  goodHabits.forEach(h => {
    const health = Math.max(0, 100 - h.corruption);
    const streakBonus = Math.min(20, h.streak * 2);
    total += health + streakBonus;
  });
  const max = goodHabits.length * 120;
  return Math.round((total / max) * 100);
}

function getCellScale(h) {
  const base = 1;
  const streakBoost = Math.min(0.15, h.streak * 0.015);
  const corrReduction = h.corruption * 0.002;
  return base + streakBoost - corrReduction;
}

function render() {
  document.getElementById('dayLabel').textContent = `Day ${currentDay}`;
  
  const score = getOverallScore();
  const scoreEl = document.getElementById('overallScore');
  scoreEl.textContent = score;
  scoreEl.style.color = score >= 70 ? '#2ecc71' : score >= 40 ? '#f39c12' : '#e74c3c';
  
  // Render grid
  const grid = document.getElementById('habitGrid');
  grid.innerHTML = '';
  goodHabits.forEach(h => {
    const status = getStatus(h);
    const statusColor = getStatusColor(status);
    const scale = getCellScale(h);
    const linkedBad = badHabits.filter(b => b.linkedTo === h.id);
    const underAttack = linkedBad.some(b => b.lapses.length > 0);
    
    const cell = document.createElement('div');
    cell.className = 'habit-cell';
    cell.style.background = getCellBg(h);
    cell.style.border = `1px solid ${statusColor}44`;
    cell.style.transform = `scale(${scale})`;
    
    if (status === 'compromised') {
      cell.style.animation = 'none';
      cell.style.boxShadow = '0 0 20px rgba(231,76,60,0.2), inset 0 0 30px rgba(231,76,60,0.1)';
    }
    
    const nameColor = status === 'compromised' ? '#e74c3c' : (status === 'siege' ? '#f39c12' : '#fff');
    
    cell.innerHTML = `
      <div>
        <div class="name" style="color:${nameColor}">${h.name}</div>
        <div class="streak">streak</div>
        <div class="streak-num" style="color:${status === 'compromised' ? '#e74c3c88' : statusColor}">${h.streak}d</div>
      </div>
      <div>
        <span class="status-tag" style="background:${statusColor}22;color:${statusColor}">
          ${status === 'compromised' ? '✕ TURNED' : status === 'siege' ? '⚠ UNDER SIEGE' : '● HEALTHY'}
        </span>
      </div>
      <div class="corruption-bar" style="width:${h.corruption}%;background:${statusColor}"></div>
      ${underAttack ? `<div class="siege-indicator" style="color:${statusColor}">⬤ ${linkedBad.length} threat${linkedBad.length>1?'s':''}</div>` : ''}
    `;
    
    cell.addEventListener('click', () => showModal(h));
    grid.appendChild(cell);
  });
  
  // Render controls
  const controls = document.getElementById('logControls');
  controls.innerHTML = '<span style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px">Log today:</span>';
  
  goodHabits.forEach(h => {
    const logged = h.loggedDays.includes(currentDay);
    const btn = document.createElement('button');
    btn.className = 'good';
    btn.textContent = (logged ? '✓ ' : '+ ') + h.name;
    btn.style.opacity = logged ? 0.5 : 1;
    btn.onclick = () => { logGoodHabit(h.id); };
    controls.appendChild(btn);
  });
  
  badHabits.forEach(b => {
    const lapsedToday = b.lapses.includes(currentDay);
    const btn = document.createElement('button');
    btn.className = 'bad';
    btn.textContent = (lapsedToday ? '⚡ ' : '⚠ ') + b.name;
    btn.style.opacity = lapsedToday ? 0.5 : 1;
    btn.onclick = () => { logBadLapse(b.id); };
    controls.appendChild(btn);
  });
  
  // Update link dropdown
  const sel = document.getElementById('linkTo');
  sel.innerHTML = '';
  goodHabits.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.id;
    opt.textContent = '→ ' + h.name;
    sel.appendChild(opt);
  });
}

function logGoodHabit(id) {
  const h = goodHabits.find(g => g.id === id);
  if (!h || h.loggedDays.includes(currentDay)) return;
  h.loggedDays.push(currentDay);
  recalcStreak(h);
  // Good habit logged: reduce corruption slightly
  h.corruption = Math.max(0, h.corruption - 5);
  render();
}

function logBadLapse(id) {
  const b = badHabits.find(bad => bad.id === id);
  if (!b || b.lapses.includes(currentDay)) return;
  b.lapses.push(currentDay);
  // Corrupt the linked good habit
  const linked = goodHabits.find(g => g.id === b.linkedTo);
  if (linked) {
    linked.corruption = Math.min(100, linked.corruption + 15);
    linked.lapses.push({ day: currentDay, cause: b.name });
    // Break the streak if corruption is high
    if (linked.corruption >= 50) {
      linked.streak = Math.max(0, linked.streak - 1);
    }
  }
  render();
}

function recalcStreak(h) {
  let streak = 0;
  for (let d = currentDay; d >= 1; d--) {
    if (h.loggedDays.includes(d)) streak++;
    else break;
  }
  h.streak = streak;
}

function simNextDay() {
  currentDay++;
  // Natural decay: corruption slowly heals, but missed days reduce streak
  goodHabits.forEach(h => {
    if (!h.loggedDays.includes(currentDay - 1)) {
      // Missed a day
      h.streak = 0;
      h.corruption = Math.min(100, h.corruption + 3);
    } else {
      h.corruption = Math.max(0, h.corruption - 2);
    }
  });
  render();
}

function simPrevDay() {
  if (currentDay > 1) {
    currentDay--;
    render();
  }
}

function showModal(h) {
  const status = getStatus(h);
  const statusColor = getStatusColor(status);
  const linkedBad = badHabits.filter(b => b.linkedTo === h.id);
  const lapseEntries = h.lapses.slice(-10).reverse();
  
  const reclaimDays = status === 'compromised' ? Math.ceil(h.corruption / 5) : 
                      status === 'siege' ? Math.ceil(h.corruption / 7) : 0;
  
  let lapsesHTML = '';
  if (lapseEntries.length > 0) {
    lapsesHTML = `<div class="section-title" style="margin-top:16px">What broke it</div><div class="lapse-log">`;
    lapseEntries.forEach(l => {
      lapsesHTML += `<div class="lapse-entry">Day ${l.day} — ${l.cause}</div>`;
    });
    lapsesHTML += '</div>';
  }
  
  let reclaimHTML = '';
  if (status !== 'healthy') {
    const steps = [];
    steps.push(`Log <strong>${h.name}</strong> for ${reclaimDays} consecutive days`);
    linkedBad.forEach(b => {
      steps.push(`Avoid <strong>${b.name}</strong> (${b.lapses.length} total lapses)`);
    });
    steps.push(`Current corruption will drop ~5% per logged day`);
    
    reclaimHTML = `
      <div class="reclaim-path">
        <div class="title">🛤 Path to Reclaim (~${reclaimDays} days)</div>
        ${steps.map((s,i) => `<div style="margin:4px 0;padding-left:12px;border-left:2px solid #2ecc7144">${i+1}. ${s}</div>`).join('')}
      </div>
    `;
  }
  
  document.getElementById('modalContent').innerHTML = `
    <button class="close-btn" onclick="closeModal()">×</button>
    <h2 style="color:${statusColor}">${h.name}</h2>
    <div class="detail-row">
      <div class="label">Status</div>
      <div class="val" style="color:${statusColor};font-size:16px">
        ${status === 'compromised' ? '✕ COMPROMISED — This habit has turned' : status === 'siege' ? '⚠ UNDER SIEGE — Weakening' : '● HEALTHY — Going strong'}
      </div>
    </div>
    <div class="detail-row">
      <div class="label">Current Streak</div>
      <div class="val">${h.streak} days</div>
    </div>
    <div class="detail-row">
      <div class="label">Corruption Level</div>
      <div class="val">
        <div style="background:#222;border-radius:4px;height:12px;width:100%;margin-top:4px;overflow:hidden">
          <div style="background:${statusColor};height:100%;width:${h.corruption}%;transition:width 0.3s"></div>
        </div>
        <span style="font-size:12px;color:#888">${Math.round(h.corruption)}%</span>
      </div>
    </div>
    <div class="detail-row">
      <div class="label">Linked Threats</div>
      <div class="val">${linkedBad.length > 0 ? linkedBad.map(b => `<span style="color:#e74c3c;margin-right:8px">⚡${b.name} (${b.lapses.length} lapses)</span>`).join('') : '<span style="color:#555">None</span>'}</div>
    </div>
    ${lapsesHTML}
    ${reclaimHTML}
  `;
  
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

const habitColors = ['#2ecc71','#3498db','#9b59b6','#1abc9c','#e67e22','#e74c3c','#f1c40f','#00bcd4','#ff7043','#ab47bc'];

function addGoodHabit() {
  const name = document.getElementById('goodName').value.trim();
  if (!name) return;
  const id = 'g' + (gIdCounter++);
  const color = habitColors[(goodHabits.length) % habitColors.length];
  goodHabits.push({ id, name, color, streak: 0, corruption: 0, lapses: [], loggedDays: [] });
  document.getElementById('goodName').value = '';
  render();
}

function addBadHabit() {
  const name = document.getElementById('badName').value.trim();
  const linkedTo = document.getElementById('linkTo').value;
  if (!name || !linkedTo) return;
  const id = 'b' + (bIdCounter++);
  badHabits.push({ id, name, linkedTo, lapses: [] });
  document.getElementById('badName').value = '';
  render();
}

document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
