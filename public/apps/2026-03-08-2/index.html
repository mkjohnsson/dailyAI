<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shockchart - Crisis Correlation Dashboard — Daily AI Gen</title>
  <meta name="description" content="An interactive crisis correlation dashboard that fetches live crypto and asset data from CoinGecko, lets you annotate geopolitical events on a timeline, and calculates which assets absorbed or amplified shock during crisis moments.">
  <meta property="og:title" content="Shockchart — Daily AI Gen">
  <meta property="og:description" content="An interactive crisis correlation dashboard that fetches live crypto and asset data from CoinGecko, lets you annotate geopolitical events on a timeline, and calculates which assets absorbed or amplified shock during crisis moments.">
  <meta property="og:url" content="https://dailyaigen.com/apps/2026-03-08-2/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dailyaigen.com/apps/2026-03-08-2/">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@3.0.0/index.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', monospace;
  background: #0a0e27;
  color: #e0e0e0;
  padding: 20px;
  line-height: 1.6;
}
.container { max-width: 1400px; margin: 0 auto; }
h1 {
  text-align: center;
  font-size: 2.2rem;
  color: #ff6b6b;
  margin-bottom: 10px;
  letter-spacing: 3px;
}
.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 30px;
  font-size: 0.9rem;
}
.loading {
  text-align: center;
  padding: 60px;
  font-size: 1.2rem;
  color: #ffdd57;
}
.error {
  background: #3d1818;
  border: 2px solid #ff6b6b;
  padding: 20px;
  border-radius: 8px;
  margin: 20px 0;
  color: #ff9999;
}
.controls {
  background: #151932;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  border: 1px solid #2a2f5a;
}
.asset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.asset-card {
  background: #1a1f3a;
  padding: 12px;
  border-radius: 6px;
  border: 2px solid #2a2f5a;
  cursor: pointer;
  transition: all 0.2s;
}
.asset-card:hover { border-color: #4a5f9a; }
.asset-card.selected { border-color: #5dade2; background: #1f2847; }
.asset-name { font-weight: bold; color: #5dade2; margin-bottom: 5px; }
.asset-price { font-size: 1.1rem; color: #fff; }
.asset-change {
  font-size: 0.85rem;
  margin-top: 5px;
}
.positive { color: #4ecdc4; }
.negative { color: #ff6b6b; }
.chart-container {
  background: #151932;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  height: 400px;
  border: 1px solid #2a2f5a;
}
.events-section {
  background: #151932;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  border: 1px solid #2a2f5a;
}
.event-form {
  display: grid;
  grid-template-columns: 200px 1fr 120px;
  gap: 10px;
  margin-bottom: 20px;
}
.event-form input, .event-form button {
  padding: 10px;
  border-radius: 4px;
  border: 1px solid #2a2f5a;
  background: #1a1f3a;
  color: #e0e0e0;
  font-family: inherit;
}
.event-form button {
  background: #5dade2;
  color: #0a0e27;
  font-weight: bold;
  cursor: pointer;
  border: none;
}
.event-form button:hover { background: #7ec8f0; }
.event-list {
  max-height: 200px;
  overflow-y: auto;
}
.event-item {
  background: #1a1f3a;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 4px;
  border-left: 4px solid #ff6b6b;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.event-date { color: #888; font-size: 0.85rem; }
.event-delete {
  background: #3d1818;
  border: none;
  color: #ff6b6b;
  padding: 5px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.analysis-panel {
  background: #151932;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid #2a2f5a;
}
.analysis-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
  margin-top: 15px;
}
.analysis-card {
  background: #1a1f3a;
  padding: 15px;
  border-radius: 6px;
}
.analysis-card h3 {
  color: #5dade2;
  margin-bottom: 10px;
  font-size: 0.9rem;
}
.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #2a2f5a;
}
.metric-label { color: #888; font-size: 0.85rem; }
.metric-value { font-weight: bold; }
.hedge-indicator {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: bold;
  margin-left: 10px;
}
.hedge { background: #1d4d3d; color: #4ecdc4; }
.risk { background: #3d1818; color: #ff6b6b; }
.time-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.time-btn {
  padding: 8px 15px;
  background: #1a1f3a;
  border: 1px solid #2a2f5a;
  color: #e0e0e0;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
}
.time-btn.active {
  background: #5dade2;
  color: #0a0e27;
  border-color: #5dade2;
}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ SHOCKCHART</h1>
  <div class="subtitle">Crisis Correlation Dashboard — Track asset behavior during geopolitical shocks</div>
  
  <div id="loading" class="loading">
    Loading market data from CoinGecko...
  </div>
  
  <div id="error" class="error" style="display:none;"></div>
  
  <div id="app" style="display:none;">
    <div class="controls">
      <h2 style="margin-bottom:15px; color:#5dade2;">📊 Asset Selection</h2>
      <div id="assetGrid" class="asset-grid"></div>
    </div>

    <div class="chart-container">
      <canvas id="priceChart"></canvas>
    </div>

    <div class="events-section">
      <h2 style="margin-bottom:15px; color:#ff6b6b;">📍 Geopolitical Events</h2>
      <div class="event-form">
        <input type="date" id="eventDate" />
        <input type="text" id="eventDesc" placeholder="Event description (e.g., Fed rate hike 75bps)" />
        <button onclick="addEvent()">Add Event</button>
      </div>
      <div id="eventList" class="event-list"></div>
    </div>

    <div class="analysis-panel">
      <h2 style="margin-bottom:15px; color:#5dade2;">🔬 Shock Analysis</h2>
      <div class="time-selector">
        <button class="time-btn active" onclick="setAnalysisWindow('1h')">1 Hour</button>
        <button class="time-btn" onclick="setAnalysisWindow('24h')">24 Hours</button>
        <button class="time-btn" onclick="setAnalysisWindow('7d')">7 Days</button>
      </div>
      <div id="analysisGrid" class="analysis-grid"></div>
    </div>
  </div>
</div>

<script>
let marketData = [];
let selectedAssets = new Set();
let events = [];
let chart = null;
let analysisWindow = '24h';

const TARGET_COINS = [
  'bitcoin', 'ethereum', 'tether', 'usd-coin', 
  'paxos-gold', 'tether-gold', 'binancecoin', 'ripple'
];

async function fetchMarketData() {
  try {
    const response = await fetch(
      `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${TARGET_COINS.join(',')}&order=market_cap_desc&sparkline=true&price_change_percentage=1h,24h,7d`
    );
    
    if (!response.ok) {
      throw new Error(`API Error: ${response.status}`);
    }
    
    const data = await response.json();
    return data;
  } catch (error) {
    throw error;
  }
}

async function init() {
  try {
    marketData = await fetchMarketData();
    
    // Select Bitcoin and Ethereum by default
    selectedAssets.add('bitcoin');
    selectedAssets.add('ethereum');
    
    renderAssetGrid();
    renderChart();
    renderEvents();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    // Set default event date to today
    document.getElementById('eventDate').valueAsDate = new Date();
    
  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `
      <strong>⚠️ Failed to load market data</strong><br>
      ${error.message}<br><br>
      This may be due to CoinGecko API rate limits. Please wait a moment and refresh the page.
    `;
  }
}

function renderAssetGrid() {
  const grid = document.getElementById('assetGrid');
  grid.innerHTML = marketData.map(asset => {
    const change24h = asset.price_change_percentage_24h || 0;
    const isSelected = selectedAssets.has(asset.id);
    const changeClass = change24h >= 0 ? 'positive' : 'negative';
    
    return `
      <div class="asset-card ${isSelected ? 'selected' : ''}" onclick="toggleAsset('${asset.id}')">
        <div class="asset-name">${asset.symbol.toUpperCase()}</div>
        <div class="asset-price">$${asset.current_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
        <div class="asset-change ${changeClass}">
          ${change24h >= 0 ? '▲' : '▼'} ${Math.abs(change24h).toFixed(2)}% (24h)
        </div>
      </div>
    `;
  }).join('');
}

function toggleAsset(assetId) {
  if (selectedAssets.has(assetId)) {
    selectedAssets.delete(assetId);
  } else {
    selectedAssets.add(assetId);
  }
  renderAssetGrid();
  renderChart();
  updateAnalysis();
}

function renderChart() {
  const ctx = document.getElementById('priceChart').getContext('2d');
  
  if (chart) {
    chart.destroy();
  }
  
  const selectedData = marketData.filter(asset => selectedAssets.has(asset.id));
  
  if (selectedData.length === 0) {
    return;
  }
  
  // Use sparkline data (last 7 days)
  const datasets = selectedData.map((asset, index) => {
    const colors = ['#5dade2', '#4ecdc4', '#ff6b6b', '#ffdd57', '#a569bd', '#ec7063', '#52be80', '#f39c12'];
    const color = colors[index % colors.length];
    
    return {
      label: asset.symbol.toUpperCase(),
      data: asset.sparkline_in_7d.price,
      borderColor: color,
      backgroundColor: color + '20',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.2
    };
  });
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array(168).fill('').map((_, i) => i), // 7 days * 24 hours
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#e0e0e0' }
        },
        tooltip: {
          mode: 'index',
          intersect: false
        }
      },
      scales: {
        x: {
          display: false
        },
        y: {
          ticks: { color: '#888' },
          grid: { color: '#2a2f5a' }
        }
      },
      interaction: {
        mode: 'nearest',
        axis: 'x',
        intersect: false
      }
    }
  });
}

function addEvent() {
  const dateInput = document.getElementById('eventDate');
  const descInput = document.getElementById('eventDesc');
  
  if (!dateInput.value || !descInput.value.trim()) {
    alert('Please enter both date and description');
    return;
  }
  
  events.push({
    id: Date.now(),
    date: dateInput.value,
    description: descInput.value.trim(),
    timestamp: new Date(dateInput.value).getTime()
  });
  
  events.sort((a, b) => b.timestamp - a.timestamp);
  
  descInput.value = '';
  renderEvents();
  updateAnalysis();
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  renderEvents();
  updateAnalysis();
}

function renderEvents() {
  const list = document.getElementById('eventList');
  
  if (events.length === 0) {
    list.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">No events added yet. Add geopolitical events to analyze market reactions.</div>';
    return;
  }
  
  list.innerHTML = events.map(event => `
    <div class="event-item">
      <div>
        <strong>${event.description}</strong>
        <div class="event-date">${new Date(event.date).toLocaleDateString()}</div>
      </div>
      <button class="event-delete" onclick="deleteEvent(${event.id})">×</button>
    </div>
  `).join('');
}

function setAnalysisWindow(window) {
  analysisWindow = window;
  document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  updateAnalysis();
}

function updateAnalysis() {
  const grid = document.getElementById('analysisGrid');
  
  if (events.length === 0 || selectedAssets.size === 0) {
    grid.innerHTML = '<div style="color:#888; grid-column: 1/-1; text-align:center; padding:20px;">Add events and select assets to see shock analysis</div>';
    return;
  }
  
  const selectedData = marketData.filter(asset => selectedAssets.has(asset.id));
  
  const windowMap = {
    '1h': 'price_change_percentage_1h_in_currency',
    '24h': 'price_change_percentage_24h',
    '7d': 'price_change_percentage_7d_in_currency'
  };
  
  const changeKey = windowMap[analysisWindow];
  
  grid.innerHTML = selectedData.map(asset => {
    const change = asset[changeKey] || asset.price_change_percentage_24h || 0;
    const avgVolume = asset.total_volume;
    const isHedge = Math.abs(change) < 5; // Less than 5% change = absorbed shock
    const changeClass = change >= 0 ? 'positive' : 'negative';
    
    return `
      <div class="analysis-card">
        <h3>
          ${asset.symbol.toUpperCase()}
          <span class="hedge-indicator ${isHedge ? 'hedge' : 'risk'}">
            ${isHedge ? 'HEDGE' : 'RISK'}
          </span>
        </h3>
        <div class="metric-row">
          <span class="metric-label">Price Change (${analysisWindow})</span>
          <span class="metric-value ${changeClass}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Volume (24h)</span>
          <span class="metric-value">$${(avgVolume / 1e9).toFixed(2)}B</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Market Cap</span>
          <span class="metric-value">$${(asset.market_cap / 1e9).toFixed(2)}B</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Volatility</span>
          <span class="metric-value">${Math.abs(change) < 2 ? 'Low' : Math.abs(change) < 10 ? 'Medium' : 'High'}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Initialize app
init();
</script>
</body>
</html>
