name: Generate Daily App

on:
  workflow_dispatch:      # Triggas av Pi-crontab kl 06:00 (Europe/Stockholm)

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate app
        run: node generate.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push
        run: |
          git config user.email "martin.johnsson@gmail.com"
          git config user.name "Fluffy"
          git add .
          git diff --staged --quiet || git commit -m "feat: app $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: generate
    runs-on: [self-hosted, pi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy
        run: |
          APP_DIR="$HOME/apps/dailyai"
          mkdir -p "$APP_DIR"
          rm -rf "$APP_DIR/public" "$APP_DIR/server"
          cp -r public server "$APP_DIR/"
          cp apps.json "$APP_DIR/"
          cd "$APP_DIR/server"
          npm install --omit=dev

      - name: Restart
        run: pm2 restart dailyai || PORT=5004 pm2 start $HOME/apps/dailyai/server/index.js --name dailyai
