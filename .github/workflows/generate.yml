name: Generate Daily App

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC = 09:00 Stockholm (sommartid)
  workflow_dispatch:      # Kan triggas manuellt

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate app
        run: node generate.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push
        run: |
          git config user.email "martin.johnsson@gmail.com"
          git config user.name "Fluffy"
          git add .
          git diff --staged --quiet || git commit -m "feat: app $(date +%Y-%m-%d)"
          git push
